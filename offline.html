<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline · McCluster</title>
  <meta name="description" content="You're offline — the McCluster app keeps the essentials cached and picks right back up when you reconnect.">
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh; display: grid; place-items: center; text-align: center;
      background: #0a0807; color: #f4efe6; padding: 2rem 1.4rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    img { width: 74px; margin: 0 auto 1.4rem; display: block; }
    h1 { font-family: Impact, "Arial Narrow", sans-serif; font-weight: 400; text-transform: uppercase; font-size: clamp(2rem, 9vw, 3.2rem); line-height: 0.95; }
    h1 b { color: #e5383b; font-weight: 400; }
    p { color: rgba(244, 239, 230, 0.78); max-width: 34ch; margin: 1rem auto 0; line-height: 1.65; font-size: 0.95rem; }
    a { display: inline-block; margin-top: 1.6rem; color: #fff; background: linear-gradient(120deg, #c1121f, #e5383b); text-decoration: none; border-radius: 100px; padding: 0.8em 1.7em; font-size: 0.85rem; letter-spacing: 0.08em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div>
    <img src="assets/img/m-mark.png" alt="M">
    <h1>Off the <b>grid</b></h1>
    <p>No signal right now. Take the breath, two in through the nose, one long out. The set is saved on your device after your first visit, so what you've seen still plays.</p>
    <a href="index.html">Try again</a>
  </div>
</body>
</html>
