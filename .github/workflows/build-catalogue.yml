name: Build catalogue from audio

# The catalogue builds itself: whenever an mp3 lands in assets/audio/ (or the
# metadata changes), scan the folder, measure durations, and regenerate
# data/catalogue.json so the catalogue page reflects whatever music is present.

on:
  workflow_dispatch: {}
  push:
    branches:
      - production
    paths:
      - "assets/audio/**"
      - "data/song-meta.json"
      - "tools/build-catalogue.mjs"
      - ".github/workflows/build-catalogue.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ffmpeg (for durations)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Build the catalogue
        run: node tools/build-catalogue.mjs

      - name: Commit the catalogue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalogue.json
          git diff --cached --quiet && { echo "catalogue unchanged"; exit 0; }
          git commit -m "Rebuild catalogue from audio files"
          for i in 1 2 3 4; do
            git pull --rebase origin production && git push && exit 0
            echo "push race, retry $i" && sleep 5
          done
          exit 1
