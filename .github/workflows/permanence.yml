# Permanence: every production deploy gets an independent, timestamped
# snapshot in the Internet Archive's Wayback Machine. Third-party proof of
# what was published and when — the receipts have receipts.
name: Archive to Wayback

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the Pages deploy to settle
        run: sleep 120
      - name: Request Wayback snapshots of the key pages
        run: |
          BASE="https://mcclusterishere.github.io/McCluster-Portfolio"
          for path in "/" "/resume.html" "/docket-516.html" "/provenance.html" \
                      "/psychology-markers.html" "/hire.html" "/offer.html" \
                      "/ecosystem.html" "/data/evidence-manifest.json"; do
            echo "archiving $BASE$path"
            curl -sS -m 60 -o /dev/null -w "%{http_code}\n" "https://web.archive.org/save/$BASE$path" || true
            sleep 20
          done
