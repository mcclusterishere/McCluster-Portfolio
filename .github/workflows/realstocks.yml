name: Market sweep — the outside board

# Real prices for the real companies on the platform's record. Weekday
# evenings after the US close, plus the button (workflow_dispatch) for
# an on-demand sweep. The site never talks to a market API — it reads
# the JSON this job commits.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 21 * * 1-5" # weekdays 21:30 UTC — after the NYSE close

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pull the closes
        run: node tools/fetch-stocks.mjs

      - name: Commit the board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/realstocks.json
          git diff --cached --quiet || git commit -m "Market sweep: the outside board's closes"
          git push
