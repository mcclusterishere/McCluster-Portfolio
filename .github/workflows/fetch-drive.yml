# The Drive handoff pipe. Chat caps at ~30MB, so big files travel as
# share links: add a job to data/drive-queue.json, push, and this
# workflow downloads each file at full quality on GitHub's servers,
# optionally re-encodes video for the web, and commits the results.
# Runs on every push that touches the queue; jobs whose destination
# already exists are skipped, so the queue is a permanent log.
name: Fetch from Google Drive

on:
  push:
    branches: [production]
    paths: ["data/drive-queue.json"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fetch-drive
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: production }
      - name: Install gdown
        run: pip -q install --upgrade gdown
      - name: Process the queue
        run: |
          set -e
          n=$(jq '.jobs | length' data/drive-queue.json)
          for i in $(seq 0 $((n - 1))); do
            id=$(jq -r ".jobs[$i].file_id" data/drive-queue.json)
            dest=$(jq -r ".jobs[$i].dest" data/drive-queue.json)
            mode=$(jq -r ".jobs[$i].mode // \"raw\"" data/drive-queue.json)
            if [ -e "$dest" ]; then echo "skip (exists): $dest"; continue; fi
            echo "fetching $id -> $dest ($mode)"
            if ! gdown -O /tmp/dl.bin "$id"; then
              echo "::warning::could not fetch $id (still restricted?) — skipping"
              continue
            fi
            mkdir -p "$(dirname "$dest")"
            case "$mode" in
              video-web)
                ffmpeg -y -i /tmp/dl.bin -vf "scale='min(2880,iw)':-2" -c:v libx264 -crf 23 -preset medium \
                  -pix_fmt yuv420p -movflags +faststart -c:a aac -b:a 96k "$dest" ;;
              video-preview)
                ffmpeg -y -i /tmp/dl.bin -vf "scale=960:-2" -c:v libx264 -crf 28 -preset veryfast \
                  -pix_fmt yuv420p -movflags +faststart -an "$dest" ;;
              *)
                cp /tmp/dl.bin "$dest" ;;
            esac
            ls -la "$dest"
          done
      - name: Commit the results
        run: |
          git config user.name "Matthew McCluster"
          git config user.email "matthew@mccluster.org"
          git add -A
          git diff --cached --quiet || git commit -m "Fetch queued Drive files"
          git push origin HEAD:production
