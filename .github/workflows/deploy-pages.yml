name: Deploy to GitHub Pages

# Mirrors this branch into gh-pages, which GitHub Pages serves.
# (GITHUB_TOKEN can't enable Pages itself, so the site is published
# from the gh-pages branch instead of a Pages deployment workflow.)

on:
  push:
    branches:
      - "production"
      - "main"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp asset versions so every deploy busts browser caches
        run: |
          find . -maxdepth 1 -name '*.html' -exec sed -i "s/__STAMP__/${GITHUB_SHA::12}/g" {} +
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Stamp asset versions for deploy" --allow-empty

      - name: Push to gh-pages
        run: git push origin HEAD:refs/heads/gh-pages --force
