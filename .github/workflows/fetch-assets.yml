name: Fetch portfolio assets

# The build environment can't reach the media CDN directly, so this
# workflow downloads the generated clips on a runner, cuts the hero orbit
# into a scroll-scrub frame sequence, and commits everything back.

on:
  push:
    branches:
      - production
    paths:
      - "assets-manifest.json"
      - ".github/workflows/fetch-assets.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download videos and audio from manifest
        run: |
          test -f assets-manifest.json || { echo "no manifest yet"; exit 0; }
          mkdir -p assets/video assets/audio
          jq -r 'to_entries[] | select(.value | type == "string") | "\(.key) \(.value)"' assets-manifest.json | while read -r name url; do
            echo "Fetching video $name"
            curl -fL --retry 4 --retry-delay 3 -o "assets/video/${name}.mp4" "$url"
          done
          jq -r '.audio // {} | to_entries[] | select(.value | startswith("http")) | "\(.key) \(.value)"' assets-manifest.json | while read -r name url; do
            ext="${url##*.}"
            echo "Fetching audio $name ($ext)"
            curl -fL --retry 4 --retry-delay 3 -o "assets/audio/${name}.${ext}" "$url"
          done
          mkdir -p assets/img
          jq -r '.images // {} | to_entries[] | select(.value | startswith("http")) | "\(.key) \(.value)"' assets-manifest.json | while read -r name url; do
            ext="${url##*.}"
            echo "Fetching image $name ($ext)"
            curl -fL --retry 4 --retry-delay 3 -o "assets/img/${name}.${ext}" "$url"
          done
          ls -la assets/video assets/audio

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Extract scroll-scrub frame sequences
        run: |
          test -f assets/video/hero.mp4 || { echo "no hero video"; exit 0; }
          mkdir -p assets/frames
          # regenerate ONLY sequences whose source video is present — never
          # wipe frames whose clips aren't in the manifest (they'd be lost)
          for f in assets/video/*.mp4; do
            n=$(basename "$f" .mp4)
            rm -f assets/frames/${n}_*.jpg
            if [ "$n" = "hero" ]; then scale=1536; q=3; else scale=1280; q=7; fi
            ffmpeg -hide_banner -loglevel error -i "$f" \
              -vf "fps=20,scale=${scale}:-2" -q:v "$q" "assets/frames/${n}_%04d.jpg"
          done
          # rebuild the manifest from EVERY sequence on disk, kept or new
          entries=""
          for first in assets/frames/*_0001.jpg; do
            n=$(basename "$first" _0001.jpg)
            count=$(ls assets/frames/${n}_*.jpg | wc -l | tr -d ' ')
            entries="${entries}\"${n}\": { \"count\": ${count} }, "
          done
          printf '{ %s"fps": 20 }\n' "$entries" > assets/frames/manifest.json
          cat assets/frames/manifest.json
          du -sh assets/frames

      - name: Commit assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A assets
          git diff --cached --quiet && { echo "nothing to commit"; exit 0; }
          git commit -m "Add generated clips and hero frame sequence [skip ci]"
          git push
