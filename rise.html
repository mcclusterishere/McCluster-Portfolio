          '<a class="btn btn--ghost" href="profile.html">Your profile</a>' +
          '<button class="btn btn--ghost" id="rzRedeal" type="button">Re-deal</button></div></div>';
        var rd = document.getElementById("rzRedeal");
        if (rd) rd.addEventListener("click", function () { track("rise_redeal", {}); paintFresh(); });
        track("rise_held", {});
      }
      function paintFresh() {
        stage.innerHTML = '<div class="rz__step"><p class="rz__k">Equity Uprise · the signal</p>' +
          "<h1>What makes<br>you rise?</h1>" +
          '<p class="rz__lede" style="font-size:1.15rem">Most people scroll. <b>You didn&rsquo;t.</b><br><br>' +
          "This is not a quiz. You make <b>real decisions under pressure</b> — and every one drafts your E&#10548; Card, in the open. Two minutes.</p>" +
          '<div class="finale__actions" style="margin-top:1.4rem"><button class="btn btn--ruby" id="rzGo" style="font-size:1.1rem;padding:1rem 2.4rem">RISE &#8599;</button></div></div>';
        $("rzGo").addEventListener("click", function () {
          track("rise_start", {});
          try { localStorage.setItem("mcc_cart", JSON.stringify({ kind: "rise", label: "Your E⤴ Card is half-dealt", href: "rise.html", at: Date.now() })) } catch (eC) {}
          step = 0; paintEntry();
        });
      }
      /* THE DEAL: everyone draws THREE missions from the twelve-scene
         deck — a different hand for different people, and never the same
         hand twice in a row on one device. Short like a job, not a
         personality test. */
      var RUN = (function () {
        var last = [];
        try { last = JSON.parse(localStorage.getItem("mcc_rise_seen")) || []; } catch (e) {}
        var deck = SCENES.map(function (sc, i) {
          return { s: sc, i: i, r: Math.random() + (last.indexOf(i) !== -1 ? 1 : 0) };
        });
        deck.sort(function (a, b) { return a.r - b.r; });
        var hand = deck.slice(0, 3);
        try { localStorage.setItem("mcc_rise_seen", JSON.stringify(hand.map(function (h) { return h.i; }))); } catch (e) {}
        return hand.map(function (h) { return h.s; });
      })();

      function paintEntry() {
        stage.innerHTML = '<div class="rz__step"><p class="rz__meta">The network is forming · select your entry point</p>' +
          "<h1 style=\"font-size:clamp(1.8rem,7vw,2.6rem)\">Where do you enter?</h1>" +
          '<div class="rz__chips">' + ENTRIES.map(function (e, i) {
            return '<button class="rz__chip" data-i="' + i + '"><b>' + e[1] + "</b><small>" + e[2] + "</small></button>";
          }).join("") + "</div></div>";
        wire(function (i) {
          entry = ENTRIES[i];
          Object.keys(entry[3]).forEach(function (k) { A[k] += entry[3][k]; });
          track("quiz_answer", { game: "rise", q: "entry", pick: entry[0] });
          step = 1; paintScene(0);
        });
      }
      function paintScene(si) {
        var s = RUN[si];
        stage.innerHTML = '<div class="rz__step"><p class="rz__meta">Mission ' + (si + 1) + " of " + RUN.length + " · " + s.k + "</p>" +
          "<h1 style=\"font-size:clamp(1.6rem,6.4vw,2.3rem)\">" + s.t + "</h1>" +
          '<p class="rz__lede" style="font-size:0.98rem">' + s.d + "</p>" +
          '<div class="rz__chips">' + s.c.map(function (c, i) {
            return '<button class="rz__chip" data-i="' + i + '"><b>' + c[0] + "</b><small>" + c[1] + "</small></button>";
          }).join("") + '</div><p class="rz__echo" id="rzEcho"></p><div class="rz__forming" id="rzForm"></div></div>';
        wire(function (i) {
          var c = s.c[i];
          Object.keys(c[2]).forEach(function (k) { V[k] += c[2][k]; });
          Object.keys(c[3]).forEach(function (k) { A[k] += c[3][k]; });
          echoes.push(c[4]);
          track("quiz_answer", { game: "rise", q: s.k, pick: c[0] });
          $("rzEcho").textContent = c[4];
          $("rzForm").innerHTML = '<span style="color:rgba(244,239,230,0.7);font-size:0.78rem;letter-spacing:0.2em;text-transform:uppercase;font-weight:800;margin-right:0.2rem">Your card is forming</span>' + gains(c[2]);
          document.querySelectorAll(".rz__chip").forEach(function (b) { b.disabled = true; b.style.opacity = b.getAttribute("data-i") == i ? "1" : "0.3"; });
          setTimeout(function () { si + 1 < RUN.length ? paintScene(si + 1) : paintCard(); }, 2100);
        });
      }
      function wire(fn) {
        var box = stage.querySelector(".rz__chips");
        box.addEventListener("click", function (e) {
          var b = e.target.closest(".rz__chip"); if (!b || b.disabled) return;
          box.classList.add("is-touched");
          fn(+b.getAttribute("data-i"));
        }, { once: false });
      }
      function paintCard() {
        var order = Object.keys(A).sort(function (a, b) { return A[b] - A[a]; });
        var p1 = ARCH[order[0]], p2 = ARCH[order[1]];
        var vmax = Math.max.apply(null, VKEYS.map(function (k) { return V[k]; })) || 1;
        var card = { entry: entry[0], arch: [order[0], order[1]], v: {}, at: new Date().toISOString() };
        VKEYS.forEach(function (k) { card.v[k] = Math.round(40 + (V[k] / vmax) * 58); });
        try {
          localStorage.setItem("mcc_rise", JSON.stringify(card));
          var ob = JSON.parse(localStorage.getItem("mcc_onboard") || "{}");
          ob.rise = card; if (!ob.roles || !ob.roles.length) ob.roles = entry[4];
          localStorage.setItem("mcc_onboard", JSON.stringify(ob));
        } catch (e) {}
        track("rise_done", { arch: card.arch.join("+"), entry: entry[0] });
        try { var c9 = JSON.parse(localStorage.getItem("mcc_cart") || "null"); if (c9 && c9.kind === "rise") localStorage.removeItem("mcc_cart"); } catch (eC2) {}
        var sorted = VKEYS.slice().sort(function (a, b) { return card.v[b] - card.v[a]; });
        stage.innerHTML = '<div class="rz__step"><p class="rz__meta">The pattern formed · your E⤴ Card</p>' +
          '<div class="rz__card">' +
          /* CHASER WORLDS: the card deals a district, not just a title */
          (window.MCC_CHASER ? '<div style="margin-bottom:0.9rem">' + window.MCC_CHASER.banner(order[0]) + "</div>" : "") +
          '<p class="rz__k">' + p1.n.replace("The ", "").replace(" Chaser", "") + " × " + p2.n.replace("The ", "").replace(" Chaser", "") + '</p>' +
          "<h2>" + p1.n.replace(" Chaser", "") + "&ndash;" + p2.n.replace("The ", "") + "</h2>" +
          '<p class="sub">' + p1.line + " <b>" + p2.line + "</b></p>" +
          '<div class="rz__vals">' + sorted.map(function (k) {
            return '<div class="rz__val"><small>' + VLABEL[k] + '</small><span><i data-w="' + card.v[k] + '"></i></span><b>' + card.v[k] + "</b></div>";
          }).join("") + "</div>" +
          '<div class="rz__block"><small>Strength</small><p>' + p1.strength + '</p></div>' +
          '<div class="rz__block"><small>Blind spot</small><p>' + p1.blind + '</p></div>' +
          '<div class="rz__block"><small>Natural roles</small><p>' + p1.roles + '</p></div>' +
          '<div class="rz__block"><small>Your equity needs</small><p>You rise fastest next to <b>' + p1.collab + "</b>.</p></div>" +
          '<div class="rz__block"><small>Recommended first move</small><p><b>' + p1.move + "</b></p></div></div>" +
          '<div class="rz__cta">' +
          /* the velvet rope hands you back: card in hand, walk right in */
          (function () {
            var nx = null;
            try { nx = sessionStorage.getItem("mcc_rope_next"); } catch (eN) {}
            return nx && /^[a-z0-9-]+\.html/.test(nx)
              ? '<a class="btn btn--ruby" href="' + nx + '" style="justify-content:center;width:100%">🃏 Card in hand — continue where you were headed &#8594;</a>'
              : "";
          })() +
          '<div class="rz__door" id="rzDoor"></div>' +
          '<a class="btn btn--ghost" href="market.html#providers" data-cta="rise-collab" style="justify-content:center">See who you should build with &#8594;</a>' +
          '<a class="btn btn--ghost" href="mymission.html" style="justify-content:center;opacity:0.8">Your missions are waiting &#8594;</a></div>' +
          '<p class="rz__lede" style="font-size:0.84rem;margin-top:1rem;color:rgba(244,239,230,0.7)">Your Equity Uprise profile has already begun — the entry point, the values, the archetype all carry into your card. And the card is earned, not answered: from here, what you actually do on the record moves it.</p></div>';
        requestAnimationFrame(function () {
          document.querySelectorAll(".rz__val i").forEach(function (i) { i.style.width = i.getAttribute("data-w") + "%"; });
        });
        if (window.MCC_DOOR && window.MCC_DOOR.mount) {
          window.MCC_DOOR.mount($("rzDoor"), { lede: "Claim this card — it becomes your desk, your ticker, your record.", ticker: true, context: "rise",
            onDone: function () { location.href = "market.html#yours"; } });
        } else {
          $("rzDoor").innerHTML = '<a class="btn btn--ruby" href="welcome.html" style="justify-content:center;width:100%">Claim this card &#8599;</a>';
        }
      }
      paintIntro();
      track("rise_view", {});
    })();
  </script>
</body>
</html>
