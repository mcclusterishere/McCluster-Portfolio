<style>

<script type="module">
import { STR, SHIFTS } from "./strings.js";

/* ============================================================
   BLOCK OPS: NIGHT RUNS — tactical night driving in the real
   Equity Uprise ecosystem. You drive the whip: patrol crews sweep
   the blocks with headlight cones, buildings break their line of
   sight, smoke and spikes are your tools, and every package you
   run belongs to a REAL member off the floor. Deliveries file
   real events — signed in, they feed your game points and your
   ticker. Fixed 60Hz sim, seeded per shift, cars only (nothing
   needs a walk cycle — rotation IS the animation, plus skids,
   flames, cones and beacons).
   ============================================================ */

function mulberry32(a) { return function () {
  a |= 0; a = (a + 0x6D2B79F5) | 0;
  let t = Math.imul(a ^ (a >>> 15), 1 | a);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}; }
let rng = mulberry32(1);

/* ---------- tuning: every number lives here ---------- */
const T = {
  world: 2000,
  whip: { top: 300, accel: 340, hp: 100, regen: 6, regenDelay: 3000, carrySlow: 0.92 },
  nitro: { mul: 1.65, ms: 600, cd: 2400 },
  turret: { rate: 6, dmg: 30, speed: 700, range: 430 },
  patrol: { route: 172, chase: 315, chaseW: 8, chaseCap: 345, hp: 90, dmg: 16, bumpCd: 500,
    cone: 360, half: 0.46, near: 95, fillMs: 450, coolMs: 2600, loseMs: 3500, converge: 480 },
  van: { hp: 320, chase: 265 },
  contract: { base: 120, hotR: 420, hotPay: 30, per: 3 },
  smoke: { r: 95, ms: 4200 },
  spike: { stunMs: 3000, r: 34 },
  shift: { patrols: 3, per: 1, cap: 8 },
  juice: { shake: 8, hitPauseMs: 30, flashMs: 70 },
  shop: [
    ["up_engine", 130, (P) => P.speedMul *= 1.07],
    ["up_plate", 140, (P) => { P.hpMax += 25; P.hp += 25; }],
    ["up_cool", 130, (P) => P.nitroCdMul *= 0.8],
    ["up_turret", 150, (P) => P.dmgMul *= 1.2],
    ["up_smoke", 100, (P) => P.smokes += 2],
    ["up_spike", 100, (P) => P.spikes += 2],
  ],
};

/* ---------- the ecosystem: real members carry the contracts ---------- */
let MEMBERS = [
  { slug: "mccluster", name: "Matthew McCluster", tick: "MCC" },
  { slug: "equity-uprise", name: "Equity Uprise", tick: "EU" },
  { slug: "only-us-studios", name: "Only Us Studios", tick: "OUST" },
  { slug: "only-us-radio", name: "Only Us Radio", tick: "OUSR" },
  { slug: "ocho-gr8", name: "Ocho Gr8", tick: "OCHO" },
  { slug: "hitman-benji", name: "Hitman Benji", tick: "BENJI" },
  { slug: "rahndrx", name: "Rahndrx", tick: "RAHN" },
  { slug: "decibel-studios", name: "Decibel Studios", tick: "DCB" },
  { slug: "revent-space", name: "Revent Space", tick: "RVNT" },
  { slug: "k-cohiba", name: "K-Cohiba", tick: "KCHB" },
  { slug: "daniel-cano", name: "Daniel Cano", tick: "CANO" },
  { slug: "shiloh-church", name: "Shiloh Baptist Church", tick: "SBC" },
];
const SB_URL = "https://fxbkvcrfbbcmrrupdcjt.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4Ymt2Y3JmYmJjbXJydXBkY2p0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0Mjk5NzAsImV4cCI6MjA5OTAwNTk3MH0.ar1MYPC4gF9V7wn3UpTW0Q7PniGJdbBD1UmOKjNqJWU";
// the live floor replaces the bundled list when it answers — always real names
fetch(SB_URL + "/rest/v1/providers?select=slug,name,ticker&status=eq.live&limit=40", {
  headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY },
}).then((r) => (r.ok ? r.json() : null)).then((rows) => {
  if (rows && rows.length > 5) MEMBERS = rows.map((p) => ({ slug: p.slug, name: p.name, tick: (p.ticker || "").toUpperCase() || p.slug }));
}).catch(() => {});
// every run files a real event: signed in on this origin, it feeds your game points
function uid() {
  try {
    const s = JSON.parse(localStorage.getItem("mccdb_session") || "null");
    if (s && s.access_token) return JSON.parse(atob(s.access_token.split(".")[1])).sub || null;
  } catch (e) {}
  return null;
}
function file(name, props) {
  try {
    fetch(SB_URL + "/rest/v1/events", { method: "POST", keepalive: true,
      headers: { "Content-Type": "application/json", apikey: SB_KEY, Prefer: "return=minimal" },
      body: JSON.stringify({ name, path: "game", props: props || {}, uid: uid() }) }).catch(() => {});
  } catch (e) {}
}
/* THE PULL-UP: rolling up to a member's door taps their pocket.
   Once per spot per session here; the back end holds the owner's
   on/off switch and a 30-minute cooldown per spot. */
const pinged = {};
let pingTick = 0;
function pingVisit(slug) {
  if (!slug || pinged[slug]) return;
  pinged[slug] = 1;
  try {
    const s = JSON.parse(localStorage.getItem("mccdb_session") || "null");
    const tok = (s && s.access_token) || SB_KEY;
    fetch(SB_URL + "/rest/v1/rpc/ping_visit", { method: "POST", keepalive: true,
      headers: { "Content-Type": "application/json", apikey: SB_KEY, Authorization: "Bearer " + tok },
      body: JSON.stringify({ p_slug: slug }) }).catch(() => {});
  } catch (e) {}
}

/* ---------- assets ---------- */
const IMGS = {};
["whip", "patrol", "van", "sedan", "crate", "package", "asphalt"].forEach((n) => {
  const im = new Image(); im.src = "./assets/" + n + ".png";
  im.onload = () => { IMGS[n] = im; if (n === "asphalt") makeGround(); };
});
let groundPattern = null;
function makeGround() {
  const t = document.createElement("canvas"); t.width = 256; t.height = 256;
  t.getContext("2d").drawImage(IMGS.asphalt, 0, 0, 256, 256);
  groundPattern = ctx.createPattern(t, "repeat");
}

/* ---------- canvas ---------- */
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const DPR_CAP = 1.5;
let vw = 0, vh = 0;
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, DPR_CAP);
  vw = innerWidth; vh = innerHeight;
  canvas.width = vw * dpr; canvas.height = vh * dpr;
  canvas.style.width = vw + "px"; canvas.style.height = vh + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  placeBtns();
}
addEventListener("resize", resize); addEventListener("orientationchange", resize);

/* ---------- input ---------- */
const BIND = { KeyW: "u", KeyS: "d", KeyA: "l", KeyD: "r", ArrowUp: "u", ArrowDown: "d",
  ArrowLeft: "l", ArrowRight: "r", Space: "nitro", ShiftLeft: "nitro", KeyE: "smoke", KeyQ: "spike" };
const held = new Set();
let nitroPress = false, smokePress = false, spikePress = false; // edge latches — taps never fall between frames
addEventListener("keydown", (e) => {
  const c = BIND[e.code]; if (!c) return;
  held.add(c);
  if (c === "nitro") nitroPress = true;
  if (c === "smoke") smokePress = true;
  if (c === "spike") spikePress = true;
  e.preventDefault();
});
addEventListener("keyup", (e) => { const c = BIND[e.code]; if (c) held.delete(c); });
const mouse = { x: 0, y: 0, down: false };
addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("mousedown", () => { mouse.down = true; });
addEventListener("mouseup", () => { mouse.down = false; });

const sticks = { L: { id: -1, ox: 0, oy: 0, x: 0, y: 0, m: 0 }, R: { id: -1, ox: 0, oy: 0, x: 0, y: 0, m: 0 } };
const BTNS = { nitro: { x: 0, y: 0, r: 34 }, smoke: { x: 0, y: 0, r: 26 }, spike: { x: 0, y: 0, r: 26 } };
function placeBtns() {
  BTNS.nitro.x = vw - 90; BTNS.nitro.y = vh - 214;
  BTNS.smoke.x = vw - 160; BTNS.smoke.y = vh - 258;
  BTNS.spike.x = vw - 52; BTNS.spike.y = vh - 288;
}
const isTouch = matchMedia("(hover: none)").matches;
function onUI(e) { return e.target && e.target.closest && e.target.closest("#ui .panel"); }
function tstart(e) {
  if (onUI(e)) return;
  for (const t of e.changedTouches) {
    let claimed = false;
    for (const k in BTNS) {
      const B = BTNS[k];
      if (Math.hypot(t.clientX - B.x, t.clientY - B.y) < B.r * 1.8) {
        if (k === "nitro") nitroPress = true;
        if (k === "smoke") smokePress = true;
        if (k === "spike") spikePress = true;
        claimed = true; break;
      }
    }
    if (claimed) continue;
    const s = t.clientX < vw / 2 ? sticks.L : sticks.R;
    if (s.id === -1) { s.id = t.identifier; s.ox = t.clientX; s.oy = t.clientY; s.x = 0; s.y = 0; s.m = 0; }
  }
  e.preventDefault();
}
function tmove(e) {
  if (onUI(e)) return;
  for (const t of e.changedTouches) for (const k of ["L", "R"]) {
    const s = sticks[k];
    if (s.id === t.identifier) {
      const dx = t.clientX - s.ox, dy = t.clientY - s.oy, d = Math.hypot(dx, dy);
      if (d > 6) { s.x = dx / d; s.y = dy / d; s.m = Math.min(1, d / 52); } else s.m = 0;
    }
  }
  e.preventDefault();
}
function tend(e) {
  if (onUI(e)) return;
  for (const t of e.changedTouches)
    for (const k of ["L", "R"]) if (sticks[k].id === t.identifier) { sticks[k].id = -1; sticks[k].m = 0; }
  e.preventDefault();
}
addEventListener("touchstart", tstart, { passive: false });
addEventListener("touchmove", tmove, { passive: false });
addEventListener("touchend", tend, { passive: false });
addEventListener("touchcancel", tend, { passive: false });

const CMD = { mx: 0, my: 0, ax: 0, ay: 0, fire: false, nitro: false, smoke: false, spike: false };
function readInput() {
  let mx = 0, my = 0;
  if (held.has("u")) my -= 1; if (held.has("d")) my += 1;
  if (held.has("l")) mx -= 1; if (held.has("r")) mx += 1;
  let ax = 0, ay = 0, fire = false;
  if (sticks.L.m) { mx = sticks.L.x * sticks.L.m; my = sticks.L.y * sticks.L.m; }
  if (sticks.R.m > 0.35) { ax = sticks.R.x; ay = sticks.R.y; fire = true; }
  else if (!isTouch) {
    const dx = mouse.x - vw / 2, dy = mouse.y - vh / 2, d = Math.hypot(dx, dy) || 1;
    ax = dx / d; ay = dy / d; fire = mouse.down;
  }
  for (const gp of navigator.getGamepads?.() ?? []) {
    if (!gp) continue;
    if (Math.hypot(gp.axes[0], gp.axes[1]) > 0.2) { mx = gp.axes[0]; my = gp.axes[1]; }
    if (Math.hypot(gp.axes[2] || 0, gp.axes[3] || 0) > 0.4) {
      const d = Math.hypot(gp.axes[2], gp.axes[3]); ax = gp.axes[2] / d; ay = gp.axes[3] / d; fire = true;
    }
    if (gp.buttons[0]?.pressed || gp.buttons[7]?.pressed) nitroPress = true;
    if (gp.buttons[2]?.pressed) smokePress = true;
    if (gp.buttons[3]?.pressed) spikePress = true;
  }
  const mm = Math.hypot(mx, my); if (mm > 1) { mx /= mm; my /= mm; }
  CMD.mx = mx; CMD.my = my; CMD.ax = ax; CMD.ay = ay; CMD.fire = fire;
  CMD.nitro = nitroPress || held.has("nitro");
  CMD.smoke = smokePress; CMD.spike = spikePress;
  return CMD;
}

/* ---------- world ---------- */
const W = T.world;
// building blocks: they stop the whip, the bullets AND the headlights
const BLOCKS = [
  { x: 260, y: 240, w: 340, h: 220 }, { x: 1420, y: 200, w: 300, h: 260 },
  { x: 300, y: 1500, w: 300, h: 260 }, { x: 1460, y: 1480, w: 280, h: 240 },
  { x: 860, y: 420, w: 280, h: 180 }, { x: 480, y: 880, w: 220, h: 260 },
  { x: 1280, y: 860, w: 240, h: 280 }, { x: 880, y: 1360, w: 260, h: 180 },
];
const CARS = [
  { x: 720, y: 220, w: 200, h: 96 }, { x: 1120, y: 700, w: 96, h: 200 },
  { x: 200, y: 700, w: 96, h: 200 }, { x: 1700, y: 1000, w: 200, h: 96 },
  { x: 760, y: 1080, w: 200, h: 96 }, { x: 1180, y: 1680, w: 200, h: 96 },
];
function inRect(x, y, pad, list) {
  for (let i = 0; i < list.length; i++) {
    const c = list[i];
    if (x > c.x - pad && x < c.x + c.w + pad && y > c.y - pad && y < c.y + c.h + pad) return c;
  }
  return null;
}
function solid(x, y, pad) { return inRect(x, y, pad, BLOCKS) || inRect(x, y, pad, CARS); }
// line of sight: buildings and smoke break it; sampled every 26px — cheap and honest
function canSee(ax, ay, bx, by) {
  const d = Math.hypot(bx - ax, by - ay), n = Math.ceil(d / 26);
  for (let i = 1; i < n; i++) {
    const x = ax + (bx - ax) * (i / n), y = ay + (by - ay) * (i / n);
    if (inRect(x, y, 0, BLOCKS)) return false;
    for (let s = 0; s < smokes.length; s++)
      if (Math.hypot(x - smokes[s].x, y - smokes[s].y) < T.smoke.r) return false;
  }
  return true;
}
function openSpot(minD, fromX, fromY) {
  for (let t = 0; t < 60; t++) {
    const x = 130 + rng() * (W - 260), y = 130 + rng() * (W - 260);
    if (!solid(x, y, 60) && Math.hypot(x - (fromX || 0), y - (fromY || 0)) > (minD || 0)) return { x, y };
  }
  return { x: W / 2, y: W / 2 };
}
/* real members own real buildings: every slab on the map is somebody's
   spot, wears their name, and packages move door to door */
function assignBuildings() {
  BLOCKS.forEach((b, i) => { b.m = MEMBERS[i % MEMBERS.length]; });
}
function doorOf(member) {
  const b = BLOCKS.find((x) => x.m && x.m.slug === member.slug);
  if (!b) return openSpot(300, P ? P.x : 0, P ? P.y : 0);
  return { x: b.x + b.w / 2, y: b.y + b.h + 44 };
}

/* ---------- THE CAMPAIGN: eight nights, three stars each ----------
   Mario energy on Bridgeport asphalt: a world map, a path of missions,
   stars for style — complete it, take no damage, beat the clock. */
const CAMPAIGN = [
  { id: "m1", name: "First Light", type: "deliver", n: 2, patrols: 2, par: 120 },
  { id: "m2", name: "Ghost",       type: "ghost",   n: 2, patrols: 3, par: 150 },
  { id: "m3", name: "The 9:07",    type: "timed",   n: 3, patrols: 3, limit: 170 },
  { id: "m4", name: "Repo Night",  type: "repo",    n: 3, patrols: 4, par: 130 },
  { id: "m5", name: "Heat Wave",   type: "deliver", n: 3, patrols: 5, par: 180 },
  { id: "m6", name: "The Convoy",  type: "boss",    n: 1, patrols: 3, par: 200 },
  { id: "m7", name: "Blackout",    type: "ghost",   n: 3, patrols: 5, par: 240 },
  { id: "m8", name: "The Exchange Run", type: "timed", n: 4, patrols: 6, limit: 250 },
];
const GOALS = {
  deliver: (c) => "Run " + c.n + " packages door to door.",
  ghost:   (c) => "Run " + c.n + " packages — 3★ means NO cone ever sees you.",
  timed:   (c) => c.n + " drops before the clock dies. " + c.limit + "s.",
  repo:    (c) => "Knock out " + c.n + " crew cars. The turret earns tonight.",
  boss:    () => "The armored convoy is moving. End the van — its front is plated, so flank.",
};
let CAMP = { stars: {} };
try { CAMP = JSON.parse(localStorage.getItem("nr_camp")) || { stars: {} }; } catch (e) {}
function campSave() { try { localStorage.setItem("nr_camp", JSON.stringify(CAMP)); } catch (e) {} }
function unlockedCount() {
  let n = 1;
  for (const m of CAMPAIGN) { if (CAMP.stars[m.id]) n++; else break; }
  return Math.min(n, CAMPAIGN.length);
}
let MS = null; // the live mission: {i, cfg, t0, dmg, seen, kills, failed}

/* ---------- state ---------- */
let mode = "title";
let P, patrols, bullets, smokes, spikesArr, parts, skids, floats, contracts, shift, rep, best, streak, tNow;
let shake = 0, hitPause = 0, spotted = false;
best = +(localStorage.getItem("nr_best") || 0);

function resetCore() {
  P = { x: W / 2, y: W / 2 + 120, h: -Math.PI / 2, vel: 0, hp: T.whip.hp, hpMax: T.whip.hp,
    nitroAt: -9e9, nitroUntil: 0, hurtAt: -9e9, fireAt: 0, turret: -Math.PI / 2,
    speedMul: 1, dmgMul: 1, nitroCdMul: 1, smokes: 2, spikes: 2, carrying: null };
  patrols = []; bullets = []; smokes = []; spikesArr = []; parts = []; skids = []; floats = []; contracts = [];
  shift = 0; rep = 0; streak = 0; tNow = 0; spotted = false;
  assignBuildings();
}
function spawnPatrols(n, withVan) {
  patrols.length = 0;
  for (let i = 0; i < n; i++) {
    const van = withVan && i === 0;
    const a = openSpot(600, P.x, P.y);
    const route = [a];
    for (let k = 0; k < 3; k++) route.push(openSpot(300, route[k].x, route[k].y));
    patrols.push({ x: a.x, y: a.y, h: 0, van, hp: van ? T.van.hp : T.patrol.hp,
      route, wp: 1, sus: 0, chase: false, lastSeen: -9e9, stunUntil: 0, bumpAt: -9e9, hitAt: -9e9 });
  }
}
function doorContracts(n) {
  contracts.length = 0;
  const bs = BLOCKS.filter((b) => b.m);
  for (let i = 0; i < n; i++) {
    let A = bs[Math.floor(rng() * bs.length)], B = bs[Math.floor(rng() * bs.length)];
    while (B === A) B = bs[Math.floor(rng() * bs.length)];
    contracts.push({ from: A.m, to: B.m,
      x: A.x + A.w / 2, y: A.y + A.h + 44,
      dx: B.x + B.w / 2, dy: B.y + B.h + 44, state: "waiting" });
  }
}
function newGame(mi) {
  resetCore();
  file("nr_boot", { mission: mi });
  if (mi === "free") { MS = null; nextShift(); return; }
  const cfg = CAMPAIGN[mi];
  MS = { i: mi, cfg, t0: 0, dmg: false, seen: false, kills: 0, vanDead: false };
  rng = mulberry32(4471 + mi * 13);
  spawnPatrols(cfg.patrols, cfg.type === "boss");
  if (cfg.type === "blackout" || cfg.id === "m7") { P.smokes = 4; }
  if (cfg.type === "repo" || cfg.type === "boss") contracts.length = 0;
  else doorContracts(cfg.n);
  if (cfg.limit) MS.deadline = cfg.limit * 1000;
}
function nextShift() {
  shift++;
  rng = mulberry32(20260710 + shift * 7);
  smokes.length = 0; spikesArr.length = 0; bullets.length = 0;
  spawnPatrols(Math.min(T.shift.cap, T.shift.patrols + (shift - 1) * T.shift.per), shift >= 3);
  doorContracts(T.contract.per);
}
function hotPay(c) {
  let n = 0;
  for (let i = 0; i < patrols.length; i++)
    if (Math.hypot(patrols[i].x - c.dx, patrols[i].y - c.dy) < T.contract.hotR) n++;
  return n * T.contract.hotPay;
}
function toastF(txt, col) { floats.push({ x: P.x, y: P.y - 64, txt, c: col || "#e8c877", at: tNow, big: true }); }
function payF(x, y, n) { floats.push({ x, y, txt: "+" + n, c: "#00c805", at: tNow, big: false }); }
function sparks(x, y, c, n) {
  for (let i = 0; i < n; i++) {
    const a = rng() * Math.PI * 2, v = 60 + rng() * 240;
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: 260 + rng() * 260, c });
  }
}

/* ---------- simulation ---------- */
function angTo(a, b) { let d = (b - a) % (Math.PI * 2); if (d > Math.PI) d -= Math.PI * 2; if (d < -Math.PI) d += Math.PI * 2; return d; }
function update(dt, cmds) {
  tNow += dt;
  if (hitPause > 0) { hitPause -= dt; return; }
  const dts = dt / 1000;

  /* the whip: point where you want to go; it arcs like a car */
  const top = T.whip.top * P.speedMul * (P.carrying ? T.whip.carrySlow : 1);
  const boosting = tNow < P.nitroUntil;
  if (cmds.nitro && tNow - P.nitroAt > T.nitro.cd * P.nitroCdMul) {
    P.nitroAt = tNow; P.nitroUntil = tNow + T.nitro.ms;
    sparks(P.x - Math.cos(P.h) * 26, P.y - Math.sin(P.h) * 26, "#ff7a00", 8);
  }
  let want = 0;
  if (cmds.mx || cmds.my) {
    const aim = Math.atan2(cmds.my, cmds.mx);
    const diff = angTo(P.h, aim);
    const rate = (2.4 + 2.6 * (1 - Math.min(1, P.vel / top))) * dts; // pivots slow, sweeps fast
    P.h += Math.max(-rate, Math.min(rate, diff));
    want = Math.min(1, Math.hypot(cmds.mx, cmds.my)) * Math.max(0.35, Math.cos(Math.min(Math.abs(diff), 2) / 2));
    if (Math.abs(diff) > 0.9 && P.vel > top * 0.55) {   // hard turn at speed: the tires talk
      skids.push({ x: P.x - Math.cos(P.h) * 20, y: P.y - Math.sin(P.h) * 20, at: tNow });
    }
  }
  const goal = want * top * (boosting ? T.nitro.mul : 1);
  P.vel += (goal - P.vel) * Math.min(1, dt / (want ? 300 : 220));
  if (boosting) { P.vel = Math.max(P.vel, top * 1.2); skids.push({ x: P.x, y: P.y, at: tNow }); }
  if (P.vel > 2) {
    const nx = P.x + Math.cos(P.h) * P.vel * dts, ny = P.y + Math.sin(P.h) * P.vel * dts;
    if (!solid(nx, P.y, 20)) P.x = nx; else P.vel *= 0.6;
    if (!solid(P.x, ny, 20)) P.y = ny; else P.vel *= 0.6;
    P.x = Math.max(36, Math.min(W - 36, P.x)); P.y = Math.max(36, Math.min(W - 36, P.y));
  }
  if (cmds.ax || cmds.ay) P.turret = Math.atan2(cmds.ay, cmds.ax);
  if (tNow - P.hurtAt > T.whip.regenDelay && P.hp < P.hpMax) P.hp = Math.min(P.hpMax, P.hp + T.whip.regen * dts);

  /* tools */
  if (cmds.smoke && P.smokes > 0) {
    P.smokes--; smokes.push({ x: P.x, y: P.y, at: tNow });
    toastF(STR.smoke, "#9aa2ad"); file("nr_smoke", {});
  }
  if (cmds.spike && P.spikes > 0) {
    P.spikes--; spikesArr.push({ x: P.x - Math.cos(P.h) * 44, y: P.y - Math.sin(P.h) * 44 });
    toastF(STR.spikes, "#e5383b");
  }
  for (let i = smokes.length - 1; i >= 0; i--) if (tNow - smokes[i].at > T.smoke.ms) smokes.splice(i, 1);

  /* turret fire */
  if (cmds.fire && tNow - P.fireAt > 1000 / T.turret.rate) {
    P.fireAt = tNow;
    bullets.push({ x: P.x + Math.cos(P.turret) * 30, y: P.y + Math.sin(P.turret) * 30,
      vx: Math.cos(P.turret) * T.turret.speed, vy: Math.sin(P.turret) * T.turret.speed, born: tNow });
    shake = Math.min(shake + 1.4, T.juice.shake);
  }
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dts; b.y += b.vy * dts;
    let dead = tNow - b.born > (T.turret.range / T.turret.speed) * 1000 || solid(b.x, b.y, 0);
    if (!dead) for (let j = 0; j < patrols.length; j++) {
      const f = patrols[j];
      if (Math.hypot(b.x - f.x, b.y - f.y) < 30) {
        if (f.van) { // armored front: come around
          const inc = Math.atan2(b.y - f.y, b.x - f.x);
          if (Math.abs(angTo(f.h, inc)) > Math.PI - 0.8) { dead = true; sparks(b.x, b.y, "#9aa2ad", 4); break; }
        }
        f.hp -= T.turret.dmg * P.dmgMul; f.hitAt = tNow; dead = true;
        sparks(b.x, b.y, "#e8c877", 5);
        if (f.hp <= 0) {
          const pay = f.van ? 90 : 35;
          rep += pay; payF(f.x, f.y, pay);
          sparks(f.x, f.y, "#ff7a00", 18); hitPause = T.juice.hitPauseMs; shake = T.juice.shake;
          file("nr_knockout", { van: f.van });
          if (MS) { MS.kills++; if (f.van) MS.vanDead = true; }
          patrols.splice(j, 1);
        }
        break;
      }
    }
    if (dead) bullets.splice(i, 1);
  }

  /* the crews: routes, cones, suspicion, the chase */
  spotted = false;
  for (let i = 0; i < patrols.length; i++) {
    const f = patrols[i];
    if (tNow < f.stunUntil) continue;
    const dP = Math.hypot(P.x - f.x, P.y - f.y);
    // can the cone see the whip?
    const coneLen = T.patrol.cone * (shift >= 4 ? 1.15 : 1) * (P.carrying ? 1.12 : 1);
    let sees = false;
    if (dP < T.patrol.near) sees = canSee(f.x, f.y, P.x, P.y);   // nobody parks on their bumper unseen
    else if (dP < coneLen && Math.abs(angTo(f.h, Math.atan2(P.y - f.y, P.x - f.x))) < T.patrol.half) {
      sees = canSee(f.x, f.y, P.x, P.y);
    }
    if (sees) { f.sus = Math.min(1, f.sus + dt / T.patrol.fillMs); f.lastSeen = tNow; }
    else f.sus = Math.max(0, f.sus - dt / T.patrol.coolMs);
    if (f.sus >= 1 && !f.chase) {
      f.chase = true;
      if (MS) MS.seen = true;
      floats.push({ x: f.x, y: f.y - 40, txt: "!", c: "#e5383b", at: tNow, big: true });
      toastF(STR.spotted, "#e5383b");
      for (let j = 0; j < patrols.length; j++)   // the block talks
        if (j !== i && Math.hypot(patrols[j].x - f.x, patrols[j].y - f.y) < T.patrol.converge) patrols[j].sus = Math.max(patrols[j].sus, 0.85);
    }
    if (f.chase && tNow - f.lastSeen > T.patrol.loseMs) { f.chase = false; f.sus = 0; toastF(STR.clear, "#00c805"); }
    if (f.chase) spotted = true;
    // move
    let tx, ty, sp;
    if (f.chase && tNow - f.lastSeen < 800) { tx = P.x; ty = P.y; sp = f.van ? T.van.chase : Math.min(T.patrol.chaseCap, T.patrol.chase + (shift - 1) * T.patrol.chaseW); }
    else if (f.chase) { tx = P.x; ty = P.y; sp = T.patrol.route * 1.3; } // hunting the last spot
    else { const w = f.route[f.wp]; tx = w.x; ty = w.y; sp = T.patrol.route; if (Math.hypot(tx - f.x, ty - f.y) < 50) f.wp = (f.wp + 1) % f.route.length; }
    const aim = Math.atan2(ty - f.y, tx - f.x);
    const diff = angTo(f.h, aim);
    f.h += Math.max(-2.2 * dts, Math.min(2.2 * dts, diff));
    let fx = f.x + Math.cos(f.h) * sp * dts, fy = f.y + Math.sin(f.h) * sp * dts;
    if (!solid(fx, f.y, 20)) f.x = fx;
    if (!solid(f.x, fy, 20)) f.y = fy;
    // spikes pop chasers
    for (let s = spikesArr.length - 1; s >= 0; s--) {
      if (Math.hypot(f.x - spikesArr[s].x, f.y - spikesArr[s].y) < T.spike.r) {
        f.stunUntil = tNow + T.spike.stunMs; f.chase = false; f.sus = 0;
        sparks(f.x, f.y, "#e5383b", 12); spikesArr.splice(s, 1);
        payF(f.x, f.y, 20); rep += 20;
      }
    }
    // contact while chasing: the bump
    if (f.chase && dP < 46 && tNow - f.bumpAt > T.patrol.bumpCd) {
      f.bumpAt = tNow; P.hurtAt = tNow;
      if (MS) MS.dmg = true;
      P.hp -= T.patrol.dmg;
      if (streak) streak = 0;
      shake = T.juice.shake; sparks(P.x, P.y, "#e5383b", 10);
      if (P.hp <= 0) { die(); return; }
    }
  }

  /* the contracts */
  for (let i = 0; i < contracts.length; i++) {
    const c = contracts[i];
    if (c.state === "waiting" && !P.carrying && Math.hypot(P.x - c.x, P.y - c.y) < 52) {
      c.state = "carried"; P.carrying = c;
      toastF(STR.dropoff + ": " + c.to.name + " $" + c.to.tick, "#e8c877");
    }
    if (c.state === "carried" && Math.hypot(P.x - c.dx, P.y - c.dy) < 56) {
      const hot = hotPay(c);
      let pay = T.contract.base + hot;
      streak++;
      if (streak >= 3) pay = Math.round(pay * 1.5);
      rep += pay; payF(P.x, P.y - 40, pay);
      toastF(STR.delivered + " — " + c.to.name + (hot ? " · " + STR.hot + hot : ""), "#00c805");
      file("nr_delivery", { to: c.to.slug, pay, hot: hot > 0 });
      c.state = "done"; P.carrying = null;
      sparks(P.x, P.y, "#00c805", 16); shake = T.juice.shake * 0.7;
    }
  }
  /* the pull-up: near somebody's door, their pocket buzzes (throttled) */
  if (++pingTick % 30 === 0) {
    for (let i = 0; i < BLOCKS.length; i++) {
      const b = BLOCKS[i];
      if (!b.m || pinged[b.m.slug]) continue;
      if (Math.hypot(P.x - (b.x + b.w / 2), P.y - (b.y + b.h + 44)) < 90) pingVisit(b.m.slug);
    }
  }
  /* mission clock + completion — every type has a terminal state */
  if (MS) {
    MS.t0 += dt;
    const cfg = MS.cfg;
    let won = false;
    if ((cfg.type === "deliver" || cfg.type === "ghost" || cfg.type === "timed") &&
        contracts.length && contracts.every((c) => c.state === "done")) won = true;
    if (cfg.type === "repo" && MS.kills >= cfg.n) won = true;
    if (cfg.type === "boss" && MS.vanDead) won = true;
    if (won && mode === "play") { missionWin(); return; }
    if (MS.deadline && MS.t0 > MS.deadline && mode === "play") {
      mode = "map"; toastF("OUT OF TIME", "#e5383b"); paintPanel("result", { stars: 0, failed: true }); return;
    }
  } else if (contracts.every((c) => c.state === "done") && mode === "play") {
    file("nr_shift", { shift, rep });
    mode = "shop"; openShop();
  }

  /* decay */
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.x += p.vx * dts; p.y += p.vy * dts; p.life -= dt;
    if (p.life <= 0) parts.splice(i, 1);
  }
  for (let i = skids.length - 1; i >= 0; i--) if (tNow - skids[i].at > 2600) skids.splice(i, 1);
  if (skids.length > 420) skids.splice(0, skids.length - 420);
  for (let i = floats.length - 1; i >= 0; i--) if (tNow - floats[i].at > 1500) floats.splice(i, 1);
  shake *= 0.88;
}
function die() {
  if (rep > best) { best = rep; localStorage.setItem("nr_best", String(rep)); }
  file("nr_out", { shift, rep });
  if (MS) { mode = "map"; paintPanel("result", { stars: 0, failed: true }); }
  else { mode = "dead"; paintPanel("dead"); }
}
function missionWin() {
  const cfg = MS.cfg, secs = MS.t0 / 1000;
  let stars = 1;
  if (!MS.dmg) stars++;
  if (cfg.type === "ghost" ? !MS.seen : cfg.limit ? MS.t0 < cfg.limit * 750 : secs < cfg.par) stars++;
  CAMP.stars[cfg.id] = Math.max(CAMP.stars[cfg.id] || 0, stars);
  campSave();
  file("nr_mission", { id: cfg.id, stars, rep });
  mode = "map"; paintPanel("result", { stars });
}

/* ---------- render ---------- */
function render() {
  ctx.fillStyle = "#0a0807"; ctx.fillRect(0, 0, vw, vh);
  if (!P) return;
  const sx = shake > 0.4 ? (Math.random() - 0.5) * shake : 0, sy = shake > 0.4 ? (Math.random() - 0.5) * shake : 0;
  const camx = P.x - vw / 2 + Math.cos(P.h) * 40 + sx, camy = P.y - vh / 2 + Math.sin(P.h) * 40 + sy;
  ctx.save(); ctx.translate(-camx, -camy);

  if (groundPattern) { ctx.fillStyle = groundPattern; ctx.fillRect(0, 0, W, W); }
  else { ctx.fillStyle = "#15120f"; ctx.fillRect(0, 0, W, W); }
  ctx.strokeStyle = "rgba(201,157,69,0.5)"; ctx.lineWidth = 6; ctx.strokeRect(18, 18, W - 36, W - 36);

  // skid marks: the night remembers how you drove it
  ctx.strokeStyle = "rgba(0,0,0,0.55)"; ctx.lineWidth = 5; ctx.lineCap = "round";
  for (let i = 0; i < skids.length; i++) {
    const s = skids[i], a = 1 - (tNow - s.at) / 2600;
    ctx.globalAlpha = a * 0.6;
    ctx.beginPath(); ctx.moveTo(s.x - 3, s.y); ctx.lineTo(s.x + 3, s.y); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // headlight cones: what the crews can see, shown honestly
  for (let i = 0; i < patrols.length; i++) {
    const f = patrols[i];
    if (tNow < f.stunUntil) continue;
    const len = T.patrol.cone * (shift >= 4 ? 1.15 : 1) * (P.carrying ? 1.12 : 1);
    const g = ctx.createRadialGradient(f.x, f.y, 20, f.x, f.y, len);
    const hotc = f.chase ? "229,56,59" : f.sus > 0.4 ? "255,122,0" : "244,239,230";
    g.addColorStop(0, "rgba(" + hotc + ",0.28)"); g.addColorStop(1, "rgba(" + hotc + ",0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.moveTo(f.x, f.y);
    ctx.arc(f.x, f.y, len, f.h - T.patrol.half, f.h + T.patrol.half); ctx.closePath(); ctx.fill();
  }

  // buildings: dark slabs with a gold hairline — they break the light
  for (let i = 0; i < BLOCKS.length; i++) {
    const b = BLOCKS[i];
    ctx.fillStyle = "#12100d"; ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = "rgba(201,157,69,0.32)"; ctx.lineWidth = 2; ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = "rgba(244,239,230,0.05)"; ctx.fillRect(b.x + 8, b.y + 8, b.w - 16, 10);
    if (b.m) {  // a real member's building: their sign on the roof, their door on the street
      ctx.textAlign = "center";
      ctx.font = "900 16px system-ui"; ctx.fillStyle = "#e8c877";
      ctx.fillText("$" + b.m.tick, b.x + b.w / 2, b.y + b.h / 2);
      ctx.font = "700 10px system-ui"; ctx.fillStyle = "rgba(244,239,230,0.6)";
      ctx.fillText(String(b.m.name).slice(0, 24), b.x + b.w / 2, b.y + b.h / 2 + 15);
      ctx.fillStyle = "rgba(201,157,69,0.8)"; ctx.fillRect(b.x + b.w / 2 - 4, b.y + b.h - 2, 8, 14);
    }
  }
  for (let i = 0; i < CARS.length; i++) {
    const c = CARS[i];
    if (IMGS.sedan) {
      ctx.save(); ctx.translate(c.x + c.w / 2, c.y + c.h / 2);
      if (c.h > c.w) ctx.rotate(Math.PI / 2);
      ctx.drawImage(IMGS.sedan, -Math.max(c.w, c.h) / 2, -Math.min(c.w, c.h) / 2, Math.max(c.w, c.h), Math.min(c.w, c.h));
      ctx.restore();
    } else { ctx.fillStyle = "#232a31"; ctx.fillRect(c.x, c.y, c.w, c.h); }
  }

  // contracts: beacons breathe; the labels are real members
  for (let i = 0; i < contracts.length; i++) {
    const c = contracts[i];
    if (c.state === "done") continue;
    const tx = c.state === "carried" ? c.dx : c.x, ty = c.state === "carried" ? c.dy : c.y;
    const col = c.state === "carried" ? "#00c805" : "#e8c877";
    const pulse = 16 + Math.sin(tNow / 170 + i) * 6;
    ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.arc(tx, ty, 34 + pulse, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.22; ctx.fillStyle = col;
    ctx.fillRect(tx - 3, ty - 130, 6, 130);       // the beacon column
    ctx.globalAlpha = 1;
    if (c.state === "waiting") drawSprite("package", c.x, c.y, 74, 0);
    ctx.font = "800 13px system-ui"; ctx.textAlign = "center"; ctx.fillStyle = col;
    ctx.fillText((c.state === "carried" ? "→ $" + c.to.tick : "$" + c.from.tick + " → $" + c.to.tick), tx, ty - 46);
  }

  // spikes + smoke
  ctx.fillStyle = "#e5383b";
  for (let i = 0; i < spikesArr.length; i++) {
    const s = spikesArr[i];
    for (let k = -2; k <= 2; k++) { ctx.beginPath(); ctx.moveTo(s.x + k * 12, s.y + 6); ctx.lineTo(s.x + k * 12 + 5, s.y - 7); ctx.lineTo(s.x + k * 12 + 10, s.y + 6); ctx.fill(); }
  }
  for (let i = 0; i < smokes.length; i++) {
    const s = smokes[i], a = 1 - (tNow - s.at) / T.smoke.ms;
    const g = ctx.createRadialGradient(s.x, s.y, 8, s.x, s.y, T.smoke.r);
    g.addColorStop(0, "rgba(154,162,173," + 0.5 * a + ")"); g.addColorStop(1, "rgba(154,162,173,0)");
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(s.x, s.y, T.smoke.r, 0, Math.PI * 2); ctx.fill();
  }

  // the crews
  for (let i = 0; i < patrols.length; i++) {
    const f = patrols[i];
    const flash = tNow - f.hitAt < T.juice.flashMs;
    drawSprite(f.van ? "van" : "patrol", f.x, f.y, f.van ? 104 : 88, f.h + Math.PI / 2, flash);
    if (tNow < f.stunUntil) { ctx.font = "900 16px system-ui"; ctx.textAlign = "center"; ctx.fillStyle = "#e5383b"; ctx.fillText("✖", f.x, f.y - 34); }
    else if (f.sus > 0.05 && !f.chase) {   // suspicion fills over their roof
      ctx.fillStyle = "rgba(244,239,230,0.25)"; ctx.fillRect(f.x - 16, f.y - 38, 32, 5);
      ctx.fillStyle = "#ff7a00"; ctx.fillRect(f.x - 16, f.y - 38, 32 * f.sus, 5);
    }
  }

  // live peers: everybody running the block right now, ghosted gold
  for (const id in PEERS) {
    const q = PEERS[id];
    ctx.globalAlpha = 0.55;
    drawSprite("whip", q.x, q.y, 88, (q.h || 0) + Math.PI / 2);
    ctx.globalAlpha = 1;
    ctx.font = "700 11px system-ui"; ctx.textAlign = "center"; ctx.fillStyle = "#e8c877";
    ctx.fillText(q.n || "runner", q.x, q.y - 36);
  }

  // bullets
  ctx.fillStyle = "#ffd97a";
  for (let i = 0; i < bullets.length; i++) { const b = bullets[i]; ctx.beginPath(); ctx.arc(b.x, b.y, 4.5, 0, Math.PI * 2); ctx.fill(); }

  // the whip + turret + nitro flame
  const boosting = tNow < P.nitroUntil;
  if (boosting) {
    ctx.globalAlpha = 0.5;
    drawSprite("whip", P.x - Math.cos(P.h) * 22, P.y - Math.sin(P.h) * 22, 88, P.h + Math.PI / 2);
    ctx.globalAlpha = 1;
    sparksDrawFlame();
  }
  drawSprite("whip", P.x, P.y, 88, P.h + Math.PI / 2, tNow - P.hurtAt < T.juice.flashMs);
  ctx.strokeStyle = "#e8c877"; ctx.lineWidth = 4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(P.x + Math.cos(P.turret) * 12, P.y + Math.sin(P.turret) * 12);
  ctx.lineTo(P.x + Math.cos(P.turret) * 34, P.y + Math.sin(P.turret) * 34); ctx.stroke();
  if (P.carrying) drawSprite("package", P.x - Math.cos(P.h) * 26, P.y - Math.sin(P.h) * 26, 38, 0);

  // particles + floats
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    ctx.globalAlpha = Math.max(0, p.life / 420); ctx.fillStyle = p.c;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = "center";
  for (let i = 0; i < floats.length; i++) {
    const f = floats[i], age = (tNow - f.at) / 1500;
    ctx.globalAlpha = 1 - age; ctx.fillStyle = f.c;
    ctx.font = (f.big ? "900 22px" : "800 15px") + " system-ui";
    ctx.fillText(f.txt, f.x, f.y - age * 44);
  }
  ctx.globalAlpha = 1;
  // edge arrow to the nearest live objective
  let near = null, nd = 1e9;
  for (let i = 0; i < contracts.length; i++) {
    const c = contracts[i]; if (c.state === "done") continue;
    const tx = c.state === "carried" ? c.dx : (P.carrying ? null : c.x); if (tx == null) continue;
    const ty = c.state === "carried" ? c.dy : c.y;
    const d = Math.hypot(tx - P.x, ty - P.y);
    if (d < nd) { nd = d; near = { x: tx, y: ty, c: c.state === "carried" ? "#00c805" : "#e8c877" }; }
  }
  if (near && nd > 300) {
    const ang = Math.atan2(near.y - P.y, near.x - P.x);
    ctx.save(); ctx.translate(P.x + Math.cos(ang) * 140, P.y + Math.sin(ang) * 140); ctx.rotate(ang);
    ctx.fillStyle = near.c;
    ctx.beginPath(); ctx.moveTo(16, 0); ctx.lineTo(-9, -10); ctx.lineTo(-9, 10); ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.restore();

  // spotted vignette: the pressure is visible
  if (spotted) {
    const g = ctx.createRadialGradient(vw / 2, vh / 2, Math.min(vw, vh) * 0.36, vw / 2, vh / 2, Math.max(vw, vh) * 0.7);
    g.addColorStop(0, "rgba(229,56,59,0)"); g.addColorStop(1, "rgba(229,56,59," + (0.2 + Math.sin(tNow / 160) * 0.08) + ")");
    ctx.fillStyle = g; ctx.fillRect(0, 0, vw, vh);
  }
  hud();
  if (isTouch && mode === "play") touchHud();
}
function sparksDrawFlame() {
  parts.push({ x: P.x - Math.cos(P.h) * 40, y: P.y - Math.sin(P.h) * 40,
    vx: -Math.cos(P.h) * 120 + (Math.random() - 0.5) * 60, vy: -Math.sin(P.h) * 120 + (Math.random() - 0.5) * 60,
    life: 220, c: Math.random() > 0.5 ? "#ff7a00" : "#e8c877" });
}
function drawSprite(n, x, y, size, rot, flash) {
  const im = IMGS[n];
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot || 0);
  if (im) {
    ctx.drawImage(im, -size / 2, -size / 2, size, size);
    if (flash) { ctx.globalCompositeOperation = "source-atop"; ctx.globalAlpha = 0.7; ctx.fillStyle = "#fff"; ctx.fillRect(-size / 2, -size / 2, size, size); }
  } else {
    ctx.fillStyle = n === "whip" ? "#e8c877" : n === "van" ? "#9aa2ad" : n === "patrol" ? "#8e3b45" : "#c99d45";
    ctx.fillRect(-size / 3, -size / 2.2, size / 1.5, size / 1.1);
  }
  ctx.restore();
}
function hud() {
  ctx.textAlign = "left"; ctx.font = "900 18px system-ui";
  ctx.fillStyle = "#f4efe6"; ctx.fillText(STR.rep + " " + rep, 16, 34);
  ctx.font = "800 12px system-ui"; ctx.fillStyle = "rgba(244,239,230,0.6)";
  ctx.fillText(STR.shift + " " + shift + "   " + STR.best + " " + best, 16, 54);
  if (streak >= 2) { ctx.fillStyle = streak >= 3 ? "#ff5000" : "#e8c877"; ctx.fillText(STR.streak + " ×" + streak + (streak >= 3 ? " " + STR.onFire : ""), 16, 72); }
  const bw = Math.min(240, vw - 32);
  ctx.fillStyle = "rgba(244,239,230,0.14)"; ctx.fillRect(vw - bw - 16, 24, bw, 10);
  ctx.fillStyle = P.hp > P.hpMax * 0.35 ? "#00c805" : "#e5383b";
  ctx.fillRect(vw - bw - 16, 24, bw * Math.max(0, P.hp / P.hpMax), 10);
  const cd = Math.min(1, (tNow - P.nitroAt) / (T.nitro.cd * P.nitroCdMul));
  ctx.fillStyle = cd >= 1 ? "#e8c877" : "rgba(232,200,119,0.3)";
  ctx.fillRect(vw - bw - 16, 40, bw * cd, 4);
  const left = contracts.filter((c) => c.state !== "done").length;
  ctx.textAlign = "center"; ctx.font = "800 12px system-ui";
  ctx.fillStyle = P.carrying ? "#00c805" : "#e8c877";
  ctx.fillText(P.carrying
    ? STR.carrying + " → " + P.carrying.to.name + " ($" + P.carrying.to.tick + ")"
    : (contracts.length ? left + " packages on the board — " + STR.pickup : ""), vw / 2, 30);
  if (MS) {  // the mission line: name, goal progress, the clock
    const gl = MS.cfg.type === "repo" ? MS.kills + "/" + MS.cfg.n + " knocked out"
      : MS.cfg.type === "boss" ? (MS.vanDead ? "van down" : "find the van — flank the plating")
      : contracts.filter((c) => c.state === "done").length + "/" + MS.cfg.n + " delivered";
    const tl = MS.deadline ? " · " + Math.max(0, Math.ceil((MS.deadline - MS.t0) / 1000)) + "s left"
      : " · " + Math.floor(MS.t0 / 1000) + "s";
    ctx.font = "800 11px system-ui";
    ctx.fillStyle = MS.deadline && MS.deadline - MS.t0 < 30000 ? "#e5383b" : "#e8c877";
    ctx.fillText((MS.i + 1) + ". " + MS.cfg.name + " — " + gl + tl, vw / 2, 48);
  }
}
function touchHud() {
  for (const k of ["L", "R"]) {
    const s = sticks[k];
    const bx = s.id !== -1 ? s.ox : (k === "L" ? 90 : vw - 90), by = s.id !== -1 ? s.oy : vh - 120;
    ctx.strokeStyle = "rgba(244,239,230,0.25)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(bx, by, 52, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = k === "L" ? "rgba(244,239,230,0.35)" : "rgba(229,56,59,0.45)";
    ctx.beginPath(); ctx.arc(bx + s.x * s.m * 38, by + s.y * s.m * 38, 22, 0, Math.PI * 2); ctx.fill();
  }
  const cd = Math.min(1, (tNow - P.nitroAt) / (T.nitro.cd * P.nitroCdMul));
  drawBtn(BTNS.nitro, cd >= 1 ? "rgba(232,200,119,0.85)" : "rgba(232,200,119,0.25)", STR.nitro, "#0a0807");
  drawBtn(BTNS.smoke, P.smokes ? "rgba(154,162,173,0.8)" : "rgba(154,162,173,0.2)", STR.smoke + " " + P.smokes, "#0a0807");
  drawBtn(BTNS.spike, P.spikes ? "rgba(229,56,59,0.8)" : "rgba(229,56,59,0.2)", STR.spikes + " " + P.spikes, "#f4efe6");
}
function drawBtn(B, fill, label, tc) {
  ctx.fillStyle = fill;
  ctx.beginPath(); ctx.arc(B.x, B.y, B.r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = tc; ctx.font = "900 9px system-ui"; ctx.textAlign = "center";
  ctx.fillText(label, B.x, B.y + 3);
}

/* ---------- panels ---------- */
const ui = document.getElementById("ui");
function storyCard(i) {
  const s = SHIFTS[(i - 1) % SHIFTS.length];
  return '<div class="story"><b>$' + s.tick + " · " + s.from + "</b><p>" + s.line + "</p>" +
    "<small>" + (uid() ? STR.filed : STR.filedAnon) + "</small></div>";
}
function starStr(n) { return "★★★".slice(0, n) + "☆☆☆".slice(0, 3 - n); }
function chrome(show) {
  document.getElementById("chatbtn").style.display = show ? "" : "none";
  document.getElementById("chatbar").style.display = "none";
}
function paintPanel(kind, x) {
  chrome(kind === "none");
  if (kind === "none") { ui.innerHTML = ""; return; }
  if (kind === "map") {
    const un = unlockedCount();
    ui.innerHTML = '<div class="panel"><div><h1 style="font-size:2.3rem">' + STR.title + "</h1>" +
      '<p class="sub">' + STR.chapter + " — the campaign</p>" +
      '<div class="wmap">' + CAMPAIGN.map((m, i) => {
        const got = CAMP.stars[m.id] || 0, locked = i >= un;
        return '<button class="node' + (!locked && !got ? " is-next" : "") + '" data-m="' + i + '"' + (locked ? " disabled" : "") + "><b>" +
          (locked ? "🔒 " : "") + (i + 1) + ". " + m.name + "</b><small>" + m.type.toUpperCase() + '</small><span class="stars">' + starStr(got) + "</span></button>";
      }).join("") +
      '<button class="node" data-m="free"><b>∞ FREE RUN</b><small>endless shifts · the re-up shop</small><span class="stars">' + STR.best + " " + best + "</span></button></div>" +
      '<p class="hint">' + (isTouch ? STR.touchHint : STR.keysHint) + "</p></div></div>";
    ui.querySelectorAll("[data-m]").forEach((b) => b.addEventListener("click", () => {
      const v = b.getAttribute("data-m");
      if (v === "free") { newGame("free"); mode = "play"; paintPanel("none"); }
      else paintPanel("brief", +v);
    }));
  }
  if (kind === "brief") {
    const cfg = CAMPAIGN[x];
    ui.innerHTML = '<div class="panel"><div><h1 style="font-size:1.9rem">' + (x + 1) + ". " + cfg.name + "</h1>" +
      storyCard(x + 1) +
      '<p class="hint" style="color:#e8c877;font-weight:800">' + GOALS[cfg.type](cfg) + "</p>" +
      '<button id="go">' + STR.tapToStart + "</button><br>" +
      '<button id="back" class="skip">← the map</button></div></div>';
    document.getElementById("go").addEventListener("click", () => { newGame(x); mode = "play"; paintPanel("none"); });
    document.getElementById("back").addEventListener("click", () => paintPanel("map"));
  }
  if (kind === "result") {
    const stars = x.stars || 0;
    ui.innerHTML = '<div class="panel"><div><h1 style="font-size:2rem">' + (x.failed ? STR.clockedOut : STR.shiftDone) + "</h1>" +
      '<p class="sub" style="font-size:1.7rem;letter-spacing:0.35em;color:#e8c877">' + starStr(stars) + "</p>" +
      '<p class="sub">' + STR.rep + " " + rep + "</p>" +
      '<p class="hint">' + (uid() ? STR.filed : STR.filedAnon) + "</p>" +
      '<button id="go">' + (x.failed ? STR.runAgain : STR.next) + "</button><br>" +
      '<button id="back" class="skip">← the map</button></div></div>';
    document.getElementById("go").addEventListener("click", () => {
      if (x.failed) { const i = MS ? MS.i : 0; newGame(i); mode = "play"; paintPanel("none"); }
      else paintPanel("brief", Math.min((MS ? MS.i : 0) + 1, CAMPAIGN.length - 1));
    });
    document.getElementById("back").addEventListener("click", () => paintPanel("map"));
  }
  if (kind === "dead") {
    ui.innerHTML = '<div class="panel"><div><h1>' + STR.clockedOut + '</h1>' +
      '<p class="sub">' + STR.rep + " " + rep + " · " + STR.shift + " " + shift +
      (rep >= best && rep > 0 ? " · " + STR.newBest : "") + "</p>" +
      '<button id="go">' + STR.runAgain + "</button><br>" +
      '<button id="back" class="skip">← the map</button></div></div>';
    document.getElementById("go").addEventListener("click", () => { newGame("free"); mode = "play"; paintPanel("none"); });
    document.getElementById("back").addEventListener("click", () => paintPanel("map"));
  }
}
function openShop() {
  const picks = [];
  const pool = T.shop.slice();
  while (picks.length < 3 && pool.length) picks.push(pool.splice(Math.floor(rng() * pool.length), 1)[0]);
  ui.innerHTML = '<div class="panel"><div><h1 style="font-size:1.9rem">' + STR.shiftDone + '</h1>' +
    storyCard(shift + 1) +
    '<p class="sub">' + STR.shopTitle + " · " + STR.rep + " " + rep + '</p>' +
    '<div class="cards">' + picks.map((u, i) =>
      '<button class="card" data-i="' + i + '"' + (rep < u[1] ? " disabled" : "") + "><b>" + STR[u[0]] + "</b><small>" +
      STR[u[0] + "_d"] + '</small><span class="cost">' + u[1] + " " + STR.rep + "</span></button>").join("") +
    '</div><button id="skip" class="skip">' + STR.next + "</button></div></div>";
  ui.querySelectorAll(".card").forEach((b) => b.addEventListener("click", () => {
    const u = picks[+b.getAttribute("data-i")];
    if (rep < u[1]) return;
    rep -= u[1]; u[2](P);
    b.disabled = true;
    ui.querySelectorAll(".card").forEach((cb) => { const uu = picks[+cb.getAttribute("data-i")]; if (rep < uu[1]) cb.disabled = true; });
  }));
  document.getElementById("skip").addEventListener("click", () => { paintPanel("none"); mode = "play"; nextShift(); });
}

/* ---------- the loop ---------- */
const STEP = 1000 / 60;
let acc = 0, last = performance.now(), paused = false, frames = 0, fpsAt = last;
addEventListener("blur", () => { paused = true; });
addEventListener("focus", () => { paused = false; last = performance.now(); });
const dev = new URLSearchParams(location.search).has("dev");
if (dev) {
  document.getElementById("dev").style.display = "block";
  window.__BOwarp = function (x, y) { if (P) { P.x = x; P.y = y; } };
  window.__BO = function () {
    return { mode, rep, shift, streak, spotted, hp: P ? P.hp : null,
      mission: MS ? { i: MS.i, kills: MS.kills, dmg: MS.dmg, seen: MS.seen, t: Math.round(MS.t0 / 1000) } : null,
      stars: CAMP.stars,
      x: P ? P.x : null, y: P ? P.y : null, nitroAt: P ? P.nitroAt : null,
      smokesLeft: P ? P.smokes : null, spikesLeft: P ? P.spikes : null,
      carrying: P && P.carrying ? P.carrying.to.slug : null,
      contracts: (contracts || []).map((c) => ({ s: c.state, x: c.x, y: c.y, dx: c.dx, dy: c.dy })),
      patrols: (patrols || []).map((f) => ({ x: f.x, y: f.y, chase: f.chase, sus: +f.sus.toFixed(2) })) };
  };
}
function frame(now) {
  requestAnimationFrame(frame);
  if (paused) return;
  acc += Math.min(120, now - last); last = now;
  const cmds = readInput();
  while (acc >= STEP) { if (mode === "play") update(STEP, cmds); acc -= STEP; }
  nitroPress = false; smokePress = false; spikePress = false; // latches consumed
  render();
  MP.tick();
  if (dev) {
    frames++;
    if (now - fpsAt >= 500) {
      document.getElementById("dev").textContent = Math.round(frames * 1000 / (now - fpsAt)) + " fps · " +
        ((patrols ? patrols.length : 0) + (bullets ? bullets.length : 0) + (parts ? parts.length : 0)) + " ents";
      frames = 0; fpsAt = now;
    }
  }
}
/* ---------- the block is LIVE: peers + chat over Realtime ---------- */
const PEERS = {};
const MP = (function () {
  let ws = null, hb = 0, live = false, t0 = 0;
  const myId = Math.random().toString(36).slice(2, 9);
  let myName = "RUNNER-" + myId.slice(0, 4).toUpperCase();
  const u = uid();
  if (u) fetch(SB_URL + "/rest/v1/providers?owner=eq." + u + "&select=name&limit=1",
    { headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY } })
    .then((r) => (r.ok ? r.json() : [])).then((rows) => {
      if (rows && rows[0] && rows[0].name) myName = String(rows[0].name).slice(0, 16);
    }).catch(() => {});
  function connect() {
    if (ws) return;
    try { ws = new WebSocket(SB_URL.replace(/^http/, "ws") + "/realtime/v1/websocket?apikey=" + encodeURIComponent(SB_KEY) + "&vsn=1.0.0"); } catch (e) { return; }
    ws.onopen = () => {
      try { ws.send(JSON.stringify({ topic: "realtime:nightruns", event: "phx_join", payload: { config: { broadcast: { self: false } } }, ref: "1" })); } catch (e) {}
      live = true;
      hb = setInterval(() => { try { ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: "hb" })); } catch (e) {} }, 25000);
    };
    ws.onmessage = (ev) => {
      try {
        const m = JSON.parse(ev.data);
        if (m.event !== "broadcast" || !m.payload) return;
        const d = m.payload.payload;
        if (!d || d.id === myId) return;
        if (m.payload.event === "pos") { d.t = Date.now(); PEERS[d.id] = d; }
        if (m.payload.event === "msg") chatLine(d.n, d.msg);
      } catch (e) {}
    };
    ws.onclose = () => { clearInterval(hb); live = false; ws = null; };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
  }
  function send(event, payload) {
    try { ws.send(JSON.stringify({ topic: "realtime:nightruns", event: "broadcast", payload: { type: "broadcast", event, payload }, ref: null })); } catch (e) {}
  }
  function tick() {
    if (!live || mode !== "play" || !P) return;
    const now = Date.now();
    if (now - t0 > 200) { t0 = now; send("pos", { id: myId, x: Math.round(P.x), y: Math.round(P.y), h: +P.h.toFixed(2), n: myName }); }
    for (const id in PEERS) if (now - PEERS[id].t > 6000) delete PEERS[id];
  }
  function say(msg) {
    msg = String(msg || "").slice(0, 90).trim(); if (!msg) return;
    send("msg", { id: myId, n: myName, msg });
    chatLine(myName, msg);
    file("nr_chat", {});
  }
  return { connect, tick, say };
})();
const chatlog = document.getElementById("chatlog"), chatbtn = document.getElementById("chatbtn"),
  chatbar = document.getElementById("chatbar"), chatin = document.getElementById("chatin");
function chatLine(n, msg) {
  const d = document.createElement("div");
  const b = document.createElement("b"); b.textContent = String(n || "runner");
  d.appendChild(b); d.appendChild(document.createTextNode(": " + String(msg || "")));
  chatlog.appendChild(d);
  while (chatlog.children.length > 6) chatlog.removeChild(chatlog.firstChild);
  setTimeout(() => { d.style.opacity = "0"; setTimeout(() => d.remove(), 1100); }, 9000);
}
chatbtn.addEventListener("click", () => { chatbtn.style.display = "none"; chatbar.style.display = "flex"; chatin.focus(); });
chatin.addEventListener("keydown", (e) => {
  e.stopPropagation();   // typing never drives the whip
  if (e.key === "Enter") { MP.say(chatin.value); chatin.value = ""; chatbar.style.display = "none"; chatbtn.style.display = ""; }
  if (e.key === "Escape") { chatbar.style.display = "none"; chatbtn.style.display = ""; }
});
MP.connect();

resize();
paintPanel("map");
requestAnimationFrame(frame);
</script>
