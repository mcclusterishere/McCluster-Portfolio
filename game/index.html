<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>BLOCK OPS · Equity Uprise</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0807; touch-action: none;
    font-family: system-ui, -apple-system, sans-serif; -webkit-user-select: none; user-select: none; }
  canvas { display: block; }
  #dev { position: fixed; top: 4px; left: 4px; color: #0f0; font: 12px monospace; display: none; z-index: 9; }
  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  .panel { position: absolute; inset: 0; display: grid; place-items: center; background: rgba(8,6,5,0.78);
    pointer-events: auto; text-align: center; color: #f4efe6; }
  .panel h1 { font-size: clamp(2.6rem, 12vw, 5rem); letter-spacing: 0.06em; margin: 0 0 0.2rem;
    color: #f4efe6; text-shadow: 0 0 34px rgba(201,157,69,0.55); font-weight: 900; }
  .panel .sub { color: #c99d45; letter-spacing: 0.3em; text-transform: uppercase; font-size: 0.68rem; font-weight: 800; }
  .panel .hint { color: rgba(244,239,230,0.65); font-size: 0.8rem; margin-top: 1rem; line-height: 1.7; }
  .panel button { pointer-events: auto; margin-top: 1.4rem; font: inherit; font-weight: 900; letter-spacing: 0.08em;
    font-size: 1.05rem; color: #0a0807; background: linear-gradient(180deg, #e8c877, #c99d45); border: 0;
    border-radius: 14px; padding: 1rem 2.2rem; cursor: pointer; box-shadow: 0 0 34px rgba(201,157,69,0.45); }
  .panel button:active { transform: scale(0.96); }
  .cards { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1.2rem; flex-wrap: wrap; padding: 0 1rem; }
  .card { pointer-events: auto; width: 8.6rem; border: 1px solid rgba(201,157,69,0.5); border-radius: 14px;
    background: rgba(18,14,11,0.95); color: #f4efe6; font: inherit; padding: 0.9rem 0.7rem; cursor: pointer; }
  .card b { display: block; font-size: 0.9rem; color: #e8c877; }
  .card small { display: block; color: rgba(244,239,230,0.6); font-size: 0.68rem; margin-top: 0.3rem; line-height: 1.4; }
  .card .cost { display: inline-block; margin-top: 0.5rem; font-weight: 900; font-size: 0.78rem; color: #00c805; }
  .card:disabled { opacity: 0.35; cursor: not-allowed; }
  .card:active:not(:disabled) { transform: scale(0.95); }
  .skip { background: none !important; color: rgba(244,239,230,0.6) !important; box-shadow: none !important;
    border: 1px solid rgba(244,239,230,0.25) !important; font-size: 0.85rem !important; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<div id="dev"></div>
<script type="module">
import { STR } from "./strings.js";

/* ============================================================
   BLOCK OPS — top-down tactical street runner.
   Twin-stick: left stick / WASD moves, right stick / mouse aims
   and fires the sound cannon. Dash slips hits and shields.
   Grab packages, run them to the drop, hold the block through
   the waves. Fixed 60Hz simulation, seeded RNG, zero per-frame
   allocations in the hot loop.
   ============================================================ */

/* ---------- deterministic core ---------- */
function mulberry32(a) { return function () {
  a |= 0; a = (a + 0x6D2B79F5) | 0;
  let t = Math.imul(a ^ (a >>> 15), 1 | a);
  t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
  return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
}; }
let seed = (Date.now() / 86400000) | 0;   // one seed per day; replays within a day match
let rng = mulberry32(seed);

/* ---------- tuning: every number lives here ---------- */
const T = {
  world: 1800,
  player: { r: 22, speed: 230, hp: 100, regen: 6, regenDelay: 3000 },
  dash: { speed: 640, ms: 180, cooldown: 1400 },
  gun: { rate: 7, dmg: 34, speed: 640, range: 460, knock: 90 },
  rusher: { r: 20, speed: 150, speedW: 4, speedCap: 230, hp: 60, hpW: 8, dmg: 14, pay: 20 },
  heavy: { r: 26, speed: 92, hp: 240, hpW: 20, dmg: 24, pay: 90, shieldArc: 1.15 },
  crate: { r: 18, hp: 40, count: 6 },
  contract: { pay: 150, carrySlow: 0.9 },
  wave: { base: 4, per: 2, restMs: 900 },
  shop: [
    ["up_speed", 120, (P) => P.speedMul *= 1.08],
    ["up_damage", 150, (P) => P.dmgMul *= 1.2],
    ["up_dash", 130, (P) => P.dashCdMul *= 0.85],
    ["up_hp", 140, (P) => { P.hpMax += 20; P.hp += 20; }],
    ["up_rate", 150, (P) => P.rateMul *= 1.15],
  ],
  juice: { shake: 7, hitPauseMs: 34, flashMs: 70 },
};

/* ---------- assets ---------- */
const IMGS = {};
["runner", "rusher", "heavy", "sedan", "crate", "package", "asphalt"].forEach((n) => {
  const im = new Image(); im.src = "./assets/" + n + ".png";
  im.onload = () => { IMGS[n] = im; if (n === "asphalt") makeGround(); };
});
let groundPattern = null;
function makeGround() {
  const t = document.createElement("canvas"); t.width = 256; t.height = 256;
  t.getContext("2d").drawImage(IMGS.asphalt, 0, 0, 256, 256);
  groundPattern = ctx.createPattern(t, "repeat");
}

/* ---------- canvas ---------- */
const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const DPR_CAP = 1.5;
let vw = 0, vh = 0;
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, DPR_CAP);
  vw = innerWidth; vh = innerHeight;
  canvas.width = vw * dpr; canvas.height = vh * dpr;
  canvas.style.width = vw + "px"; canvas.style.height = vh + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener("resize", resize); addEventListener("orientationchange", resize); resize();

/* ---------- input → one command frame ---------- */
const BIND = { KeyW: "u", KeyS: "d", KeyA: "l", KeyD: "r", ArrowUp: "u", ArrowDown: "d",
  ArrowLeft: "l", ArrowRight: "r", Space: "dash", ShiftLeft: "dash" };
const held = new Set();
addEventListener("keydown", (e) => { const c = BIND[e.code]; if (c) { held.add(c); e.preventDefault(); } });
addEventListener("keyup", (e) => { const c = BIND[e.code]; if (c) held.delete(c); });
const mouse = { x: 0, y: 0, down: false };
addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
addEventListener("mousedown", () => { mouse.down = true; });
addEventListener("mouseup", () => { mouse.down = false; });

// twin virtual sticks — left half moves, right half aims+fires; gold dash button
const sticks = { L: { id: -1, ox: 0, oy: 0, x: 0, y: 0, m: 0 }, R: { id: -1, ox: 0, oy: 0, x: 0, y: 0, m: 0 } };
let dashBtn = { x: 0, y: 0, r: 34, id: -1, hot: false };
const isTouch = matchMedia("(hover: none)").matches;
function tstart(e) {
  for (const t of e.changedTouches) {
    const dx = t.clientX - dashBtn.x, dy = t.clientY - dashBtn.y;
    if (Math.hypot(dx, dy) < dashBtn.r * 1.6) { dashBtn.id = t.identifier; dashBtn.hot = true; continue; }
    const s = t.clientX < vw / 2 ? sticks.L : sticks.R;
    if (s.id === -1) { s.id = t.identifier; s.ox = t.clientX; s.oy = t.clientY; s.x = 0; s.y = 0; s.m = 0; }
  }
  e.preventDefault();
}
function tmove(e) {
  for (const t of e.changedTouches) for (const k of ["L", "R"]) {
    const s = sticks[k];
    if (s.id === t.identifier) {
      const dx = t.clientX - s.ox, dy = t.clientY - s.oy, d = Math.hypot(dx, dy);
      if (d > 6) { s.x = dx / d; s.y = dy / d; s.m = Math.min(1, d / 52); } else { s.m = 0; }
    }
  }
  e.preventDefault();
}
function tend(e) {
  for (const t of e.changedTouches) {
    for (const k of ["L", "R"]) if (sticks[k].id === t.identifier) { sticks[k].id = -1; sticks[k].m = 0; }
    if (dashBtn.id === t.identifier) { dashBtn.id = -1; dashBtn.hot = false; }
  }
  e.preventDefault();
}
addEventListener("touchstart", tstart, { passive: false });
addEventListener("touchmove", tmove, { passive: false });
addEventListener("touchend", tend, { passive: false });
addEventListener("touchcancel", tend, { passive: false });

const CMD = { mx: 0, my: 0, ax: 0, ay: 0, fire: false, dash: false };  // reused every frame
function readInput() {
  let mx = 0, my = 0;
  if (held.has("u")) my -= 1; if (held.has("d")) my += 1;
  if (held.has("l")) mx -= 1; if (held.has("r")) mx += 1;
  let ax = 0, ay = 0, fire = false, dash = held.has("dash") || dashBtn.hot;
  if (sticks.L.m) { mx = sticks.L.x * sticks.L.m; my = sticks.L.y * sticks.L.m; }
  if (sticks.R.m > 0.35) { ax = sticks.R.x; ay = sticks.R.y; fire = true; }
  else if (!isTouch) {
    const dx = mouse.x - vw / 2, dy = mouse.y - vh / 2, d = Math.hypot(dx, dy) || 1;
    ax = dx / d; ay = dy / d; fire = mouse.down;
  }
  for (const gp of navigator.getGamepads?.() ?? []) {
    if (!gp) continue;
    if (Math.hypot(gp.axes[0], gp.axes[1]) > 0.2) { mx = gp.axes[0]; my = gp.axes[1]; }
    if (Math.hypot(gp.axes[2] || 0, gp.axes[3] || 0) > 0.4) {
      const d = Math.hypot(gp.axes[2], gp.axes[3]); ax = gp.axes[2] / d; ay = gp.axes[3] / d; fire = true;
    }
    if (gp.buttons[0]?.pressed || gp.buttons[1]?.pressed || gp.buttons[7]?.pressed) dash = true;
  }
  const mm = Math.hypot(mx, my); if (mm > 1) { mx /= mm; my /= mm; }
  CMD.mx = mx; CMD.my = my; CMD.ax = ax; CMD.ay = ay; CMD.fire = fire; CMD.dash = dash;
  return CMD;
}

/* ---------- state ---------- */
const W = T.world;
let mode = "title";               // title | play | shop | dead
let P, foes, bullets, crates, parts, floats, cars, pack, wave, rep, best, streak, kills, waveLeft, tNow;
let shake = 0, hitPause = 0, restAt = 0;
best = +(localStorage.getItem("bo_best") || 0);

function rect(x, y, w, h) { return { x, y, w, h }; }
function newGame() {
  rng = mulberry32(seed);
  P = { x: W / 2, y: W / 2 + 180, h: -Math.PI / 2, hp: T.player.hp, hpMax: T.player.hp,
    vx: 0, vy: 0, dashUntil: 0, dashAt: -9e9, hurtAt: -9e9, fireAt: 0,
    speedMul: 1, dmgMul: 1, dashCdMul: 1, rateMul: 1, odUntil: 0, carrying: false };
  foes = []; bullets = []; crates = []; parts = []; floats = [];
  cars = [
    rect(320, 300, 240, 110), rect(1240, 260, 110, 240), rect(560, 900, 240, 110),
    rect(1180, 980, 240, 110), rect(300, 1420, 110, 240), rect(1420, 1460, 240, 110),
    rect(860, 520, 110, 240), rect(880, 1320, 240, 110),
  ];
  pack = null; wave = 0; rep = 0; streak = 0; kills = 0; waveLeft = 0; tNow = 0;
  nextWave();
  newContract();
}
function inCar(x, y, pad) {
  for (let i = 0; i < cars.length; i++) {
    const c = cars[i];
    if (x > c.x - pad && x < c.x + c.w + pad && y > c.y - pad && y < c.y + c.h + pad) return c;
  }
  return null;
}
function openSpot(minD) {
  for (let t = 0; t < 40; t++) {
    const x = 140 + rng() * (W - 280), y = 140 + rng() * (W - 280);
    if (!inCar(x, y, 40) && Math.hypot(x - P.x, y - P.y) > minD) return { x, y };
  }
  return { x: W / 2, y: W / 2 };
}
function nextWave() {
  wave++;
  waveLeft = T.wave.base + T.wave.per * wave;
  for (let i = 0; i < Math.floor(wave / 3); i++) spawnFoe(true);
  for (let i = 0; i < T.crate.count; i++) {
    const s = openSpot(200);
    crates.push({ x: s.x, y: s.y, hp: T.crate.hp });
  }
  toastF(STR.wave + " " + wave, "#e8c877");
}
function spawnFoe(heavy) {
  const s = openSpot(420);
  const K = heavy ? T.heavy : T.rusher;
  foes.push({ x: s.x, y: s.y, r: K.r, heavy: !!heavy, h: 0, hitAt: -9e9,
    hp: (heavy ? K.hp + K.hpW * wave : K.hp + K.hpW * wave),
    sp: heavy ? K.speed : Math.min(K.speedCap, K.speed + K.speedW * wave) });
}
function newContract() {
  const a = openSpot(360), b = openSpot(360);
  pack = { x: a.x, y: a.y, dx: b.x, dy: b.y, held: false };
}
function toastF(txt, c) { floats.push({ x: P ? P.x : W / 2, y: (P ? P.y : W / 2) - 60, txt, c, at: tNow, big: true }); }
function payF(x, y, n) { floats.push({ x, y, txt: "+" + n, c: "#00c805", at: tNow, big: false }); }

/* ---------- simulation: fixed 60Hz ---------- */
function update(dt, cmds) {
  tNow += dt;
  if (hitPause > 0) { hitPause -= dt; return; }
  const dts = dt / 1000;

  // player
  const dashing = tNow < P.dashUntil;
  if (cmds.dash && tNow - P.dashAt > T.dash.cooldown * P.dashCdMul && (cmds.mx || cmds.my)) {
    P.dashAt = tNow; P.dashUntil = tNow + T.dash.ms;
    P.vx = cmds.mx; P.vy = cmds.my;
  }
  let sp = T.player.speed * P.speedMul * (P.carrying ? T.contract.carrySlow : 1);
  let nx, ny;
  if (dashing) { nx = P.x + P.vx * T.dash.speed * dts; ny = P.y + P.vy * T.dash.speed * dts; }
  else { nx = P.x + cmds.mx * sp * dts; ny = P.y + cmds.my * sp * dts; }
  if (!inCar(nx, P.y, T.player.r * 0.7)) P.x = nx;
  if (!inCar(P.x, ny, T.player.r * 0.7)) P.y = ny;
  P.x = Math.max(40, Math.min(W - 40, P.x)); P.y = Math.max(40, Math.min(W - 40, P.y));
  if (cmds.ax || cmds.ay) P.h = Math.atan2(cmds.ay, cmds.ax);
  else if (cmds.mx || cmds.my) P.h = Math.atan2(cmds.my, cmds.mx);
  if (tNow - P.hurtAt > T.player.regenDelay && P.hp < P.hpMax) P.hp = Math.min(P.hpMax, P.hp + T.player.regen * dts);

  // fire
  const rate = T.gun.rate * P.rateMul * (tNow < P.odUntil ? 1.6 : 1);
  if (cmds.fire && tNow - P.fireAt > 1000 / rate) {
    P.fireAt = tNow;
    bullets.push({ x: P.x + Math.cos(P.h) * 26, y: P.y + Math.sin(P.h) * 26,
      vx: Math.cos(P.h) * T.gun.speed, vy: Math.sin(P.h) * T.gun.speed, born: tNow });
    shake = Math.min(shake + 1.6, T.juice.shake);
  }

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dts; b.y += b.vy * dts;
    let dead = tNow - b.born > (T.gun.range / T.gun.speed) * 1000 || inCar(b.x, b.y, 0);
    if (!dead) for (let j = 0; j < crates.length; j++) {
      const c = crates[j];
      if (Math.hypot(b.x - c.x, b.y - c.y) < T.crate.r + 4) {
        c.hp -= T.gun.dmg * P.dmgMul; dead = true;
        if (c.hp <= 0) { crateDrop(c); crates.splice(j, 1); }
        break;
      }
    }
    if (!dead) for (let j = 0; j < foes.length; j++) {
      const f = foes[j];
      if (Math.hypot(b.x - f.x, b.y - f.y) < f.r + 5) {
        // heavies block frontal hits: the shield answers head-on play
        if (f.heavy) {
          const inc = Math.atan2(b.y - f.y, b.x - f.x);
          let d = Math.abs(inc - f.h); if (d > Math.PI) d = 2 * Math.PI - d;
          if (d > Math.PI - T.heavy.shieldArc) {
            dead = true; sparks(b.x, b.y, "#9aa2ad", 4);
            break;
          }
        }
        f.hp -= T.gun.dmg * P.dmgMul; f.hitAt = tNow;
        const kb = T.gun.knock / (f.heavy ? 3 : 1);
        f.x += (b.vx / T.gun.speed) * kb * 0.1; f.y += (b.vy / T.gun.speed) * kb * 0.1;
        dead = true; sparks(b.x, b.y, "#e8c877", 5);
        if (f.hp <= 0) {
          const pay = Math.round((f.heavy ? T.heavy.pay : T.rusher.pay) * (streak >= 5 ? 1.5 : 1));
          rep += pay; kills++; streak++; waveLeft--; payF(f.x, f.y, pay);
          sparks(f.x, f.y, f.heavy ? "#9aa2ad" : "#8e3b45", 14);
          hitPause = T.juice.hitPauseMs; shake = T.juice.shake;
          foes.splice(j, 1);
          if (streak === 5) toastF(STR.onFire + " ×1.5", "#ff5000");
        }
        break;
      }
    }
    if (dead) bullets.splice(i, 1);
  }

  // foes chase; cover forces them to path around (simple slide)
  for (let i = 0; i < foes.length; i++) {
    const f = foes[i];
    const dx = P.x - f.x, dy = P.y - f.y, d = Math.hypot(dx, dy) || 1;
    f.h = Math.atan2(dy, dx);
    let fx = f.x + (dx / d) * f.sp * dts, fy = f.y + (dy / d) * f.sp * dts;
    if (inCar(fx, f.y, f.r * 0.7)) fx = f.x + Math.sign(dy) * f.sp * dts * 0.8;
    if (inCar(f.x, fy, f.r * 0.7)) fy = f.y + Math.sign(dx) * f.sp * dts * 0.8;
    if (!inCar(fx, fy, f.r * 0.6)) { f.x = fx; f.y = fy; }
    // separation so packs don't stack into one blob
    for (let j = i + 1; j < foes.length; j++) {
      const g = foes[j], sx = g.x - f.x, sy = g.y - f.y, sd = Math.hypot(sx, sy);
      if (sd > 0 && sd < f.r + g.r) { const push = (f.r + g.r - sd) / 2; f.x -= (sx / sd) * push; f.y -= (sy / sd) * push; g.x += (sx / sd) * push; g.y += (sy / sd) * push; }
    }
    // contact damage — dashing slips through clean
    if (d < f.r + T.player.r && !dashing && tNow - P.hurtAt > 420) {
      P.hurtAt = tNow; P.hp -= f.heavy ? T.heavy.dmg : T.rusher.dmg;
      if (streak) { streak = 0; }
      shake = T.juice.shake; sparks(P.x, P.y, "#e5383b", 8);
      if (P.hp <= 0) { die(); return; }
    }
  }

  // trickle spawns until the wave count is met
  const alive = foes.length;
  const want = Math.min(waveLeft, 3 + Math.floor(wave / 2));
  if (alive < want && waveLeft > alive) spawnFoe(false);

  // the contract
  if (pack) {
    if (!pack.held && Math.hypot(P.x - pack.x, P.y - pack.y) < 40) { pack.held = true; P.carrying = true; toastF(STR.contractDrop, "#e8c877"); }
    if (pack.held && Math.hypot(P.x - pack.dx, P.y - pack.dy) < 46) {
      const pay = Math.round(T.contract.pay * (streak >= 5 ? 1.5 : 1));
      rep += pay; payF(P.x, P.y - 40, pay);
      toastF(STR.delivered, "#00c805");
      pack = null; P.carrying = false;
      setTimeoutSafe(newContract, 1500);
    }
  }

  // wave cleared → the shop
  if (waveLeft <= 0 && foes.length === 0 && mode === "play") {
    mode = "shop"; openShop();
  }

  // particles + floats decay
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i]; p.x += p.vx * dts; p.y += p.vy * dts; p.life -= dt;
    if (p.life <= 0) parts.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--) if (tNow - floats[i].at > 1300) floats.splice(i, 1);
  shake *= 0.88;
}
let pendT = [];
function setTimeoutSafe(fn, ms) { pendT.push({ fn, at: tNow + ms }); }
function runPend() { for (let i = pendT.length - 1; i >= 0; i--) if (tNow >= pendT[i].at) { const f = pendT[i].fn; pendT.splice(i, 1); f(); } }
function sparks(x, y, c, n) {
  for (let i = 0; i < n; i++) {
    const a = rng() * Math.PI * 2, v = 60 + rng() * 220;
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: 260 + rng() * 240, c });
  }
}
function crateDrop(c) {
  const roll = rng();
  sparks(c.x, c.y, "#c99d45", 10);
  if (roll < 0.6) { const n = 15 + Math.floor(rng() * 20); rep += n; payF(c.x, c.y, n); }
  else if (roll < 0.9) { P.hp = Math.min(P.hpMax, P.hp + 30); floats.push({ x: c.x, y: c.y, txt: STR.medkit, c: "#00c805", at: tNow }); }
  else { P.odUntil = tNow + 8000; floats.push({ x: c.x, y: c.y, txt: STR.overdrive, c: "#ff5000", at: tNow }); }
}
function die() {
  mode = "dead";
  if (rep > best) { best = rep; localStorage.setItem("bo_best", String(best)); }
  paintPanel("dead");
}

/* ---------- render ---------- */
function render() {
  ctx.fillStyle = "#0a0807"; ctx.fillRect(0, 0, vw, vh);
  if (!P) return;
  const sx = (shake > 0.4 ? (rng() - 0.5) * shake : 0), sy = (shake > 0.4 ? (rng() - 0.5) * shake : 0);
  const camx = P.x - vw / 2 + Math.cos(P.h) * 34 + sx, camy = P.y - vh / 2 + Math.sin(P.h) * 34 + sy;
  ctx.save(); ctx.translate(-camx, -camy);

  // ground
  if (groundPattern) { ctx.fillStyle = groundPattern; ctx.fillRect(0, 0, W, W); }
  else { ctx.fillStyle = "#15120f"; ctx.fillRect(0, 0, W, W); }
  ctx.strokeStyle = "rgba(201,157,69,0.5)"; ctx.lineWidth = 6; ctx.strokeRect(20, 20, W - 40, W - 40);

  // contract markers
  if (pack) {
    const tx = pack.held ? pack.dx : pack.x, ty = pack.held ? pack.dy : pack.y;
    const pulse = 14 + Math.sin(tNow / 180) * 5;
    ctx.strokeStyle = pack.held ? "#00c805" : "#e8c877"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(tx, ty, 34 + pulse, 0, Math.PI * 2); ctx.stroke();
    if (!pack.held) drawSprite("package", pack.x, pack.y, 84, 0);
    else { ctx.fillStyle = "#00c805"; ctx.beginPath(); ctx.arc(tx, ty, 10, 0, Math.PI * 2); ctx.fill(); }
    // edge arrow toward the objective
    const adx = tx - P.x, ady = ty - P.y, ad = Math.hypot(adx, ady);
    if (ad > 320) {
      const ang = Math.atan2(ady, adx);
      ctx.save(); ctx.translate(P.x + Math.cos(ang) * 130, P.y + Math.sin(ang) * 130); ctx.rotate(ang);
      ctx.fillStyle = pack.held ? "#00c805" : "#e8c877";
      ctx.beginPath(); ctx.moveTo(14, 0); ctx.lineTo(-8, -9); ctx.lineTo(-8, 9); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }

  // cars (cover)
  for (let i = 0; i < cars.length; i++) {
    const c = cars[i];
    if (IMGS.sedan) {
      ctx.save(); ctx.translate(c.x + c.w / 2, c.y + c.h / 2);
      if (c.h > c.w) ctx.rotate(Math.PI / 2);
      ctx.drawImage(IMGS.sedan, -Math.max(c.w, c.h) / 2, -Math.min(c.w, c.h) / 2, Math.max(c.w, c.h), Math.min(c.w, c.h));
      ctx.restore();
    } else { ctx.fillStyle = "#232a31"; ctx.fillRect(c.x, c.y, c.w, c.h); }
  }
  // crates
  for (let i = 0; i < crates.length; i++) drawSprite("crate", crates[i].x, crates[i].y, 72, 0);

  // foes
  for (let i = 0; i < foes.length; i++) {
    const f = foes[i];
    const flash = tNow - f.hitAt < T.juice.flashMs;
    drawSprite(f.heavy ? "heavy" : "rusher", f.x, f.y, f.heavy ? 84 : 66, f.h + Math.PI / 2, flash);
    if (f.heavy) {  // the shield reads: an arc on the facing side
      ctx.strokeStyle = "rgba(154,162,173,0.9)"; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.arc(f.x, f.y, f.r + 7, f.h - T.heavy.shieldArc / 2, f.h + T.heavy.shieldArc / 2); ctx.stroke();
    }
  }

  // bullets — one pass, one style
  ctx.fillStyle = "#ffd97a";
  for (let i = 0; i < bullets.length; i++) {
    const b = bullets[i];
    ctx.beginPath(); ctx.arc(b.x, b.y, 4.5, 0, Math.PI * 2); ctx.fill();
  }

  // the runner
  const dashing = tNow < P.dashUntil;
  if (dashing) { ctx.globalAlpha = 0.45; drawSprite("runner", P.x - Math.cos(P.h) * 18, P.y - Math.sin(P.h) * 18, 70, P.h + Math.PI / 2); ctx.globalAlpha = 1; }
  drawSprite("runner", P.x, P.y, 70, P.h + Math.PI / 2, tNow - P.hurtAt < T.juice.flashMs);
  if (P.carrying) drawSprite("package", P.x - Math.cos(P.h) * 20, P.y - Math.sin(P.h) * 20, 40, 0);

  // particles
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    ctx.globalAlpha = Math.max(0, p.life / 400); ctx.fillStyle = p.c;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // floating text
  ctx.textAlign = "center";
  for (let i = 0; i < floats.length; i++) {
    const f = floats[i], age = (tNow - f.at) / 1300;
    ctx.globalAlpha = 1 - age; ctx.fillStyle = f.c;
    ctx.font = (f.big ? "900 26px" : "800 16px") + " system-ui";
    ctx.fillText(f.txt, f.x, f.y - age * 46);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // HUD
  hud();
  if (isTouch && mode === "play") touchHud();
}
function drawSprite(n, x, y, size, rot, flash) {
  const im = IMGS[n];
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot || 0);
  if (im) {
    ctx.drawImage(im, -size / 2, -size / 2, size, size);
    if (flash) { ctx.globalCompositeOperation = "source-atop"; ctx.globalAlpha = 0.7; ctx.fillStyle = "#fff"; ctx.fillRect(-size / 2, -size / 2, size, size); }
  } else {
    ctx.fillStyle = n === "runner" ? "#e8c877" : n === "heavy" ? "#9aa2ad" : n === "rusher" ? "#8e3b45" : "#c99d45";
    ctx.beginPath(); ctx.arc(0, 0, size / 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#0a0807"; ctx.fillRect(-3, -size / 2.4, 6, size / 4);
  }
  ctx.restore();
}
function hud() {
  // health ring around a small dial, wave, rep, streak — top band
  ctx.textAlign = "left"; ctx.font = "900 18px system-ui";
  ctx.fillStyle = "#f4efe6"; ctx.fillText(STR.rep + " " + rep, 16, 34);
  ctx.font = "800 12px system-ui"; ctx.fillStyle = "rgba(244,239,230,0.6)";
  ctx.fillText(STR.wave + " " + wave + "   " + STR.best + " " + best, 16, 54);
  if (streak >= 2) { ctx.fillStyle = streak >= 5 ? "#ff5000" : "#e8c877"; ctx.fillText(STR.streak + " ×" + streak + (streak >= 5 ? " " + STR.onFire : ""), 16, 72); }
  // HP bar
  const bw = Math.min(240, vw - 32);
  ctx.fillStyle = "rgba(244,239,230,0.14)"; ctx.fillRect(vw - bw - 16, 24, bw, 10);
  ctx.fillStyle = P.hp > P.hpMax * 0.35 ? "#00c805" : "#e5383b";
  ctx.fillRect(vw - bw - 16, 24, bw * Math.max(0, P.hp / P.hpMax), 10);
  // dash pip
  const cd = Math.min(1, (tNow - P.dashAt) / (T.dash.cooldown * P.dashCdMul));
  ctx.fillStyle = cd >= 1 ? "#e8c877" : "rgba(232,200,119,0.3)";
  ctx.fillRect(vw - bw - 16, 40, bw * cd, 4);
  if (pack) {
    ctx.textAlign = "center"; ctx.font = "800 12px system-ui"; ctx.fillStyle = pack.held ? "#00c805" : "#e8c877";
    ctx.fillText(pack.held ? STR.contractDrop : STR.contractPickup, vw / 2, 30);
  }
}
function touchHud() {
  for (const k of ["L", "R"]) {
    const s = sticks[k];
    const bx = s.id !== -1 ? s.ox : (k === "L" ? 90 : vw - 90), by = s.id !== -1 ? s.oy : vh - 120;
    ctx.strokeStyle = "rgba(244,239,230,0.25)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(bx, by, 52, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = k === "L" ? "rgba(244,239,230,0.35)" : "rgba(229,56,59,0.45)";
    ctx.beginPath(); ctx.arc(bx + s.x * s.m * 38, by + s.y * s.m * 38, 22, 0, Math.PI * 2); ctx.fill();
  }
  dashBtn.x = vw - 90; dashBtn.y = vh - 210;
  const cd = Math.min(1, (tNow - P.dashAt) / (T.dash.cooldown * P.dashCdMul));
  ctx.fillStyle = cd >= 1 ? "rgba(232,200,119,0.85)" : "rgba(232,200,119,0.25)";
  ctx.beginPath(); ctx.arc(dashBtn.x, dashBtn.y, dashBtn.r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#0a0807"; ctx.font = "900 11px system-ui"; ctx.textAlign = "center";
  ctx.fillText("DASH", dashBtn.x, dashBtn.y + 4);
}

/* ---------- panels (DOM: title, shop, death) ---------- */
const ui = document.getElementById("ui");
function paintPanel(kind) {
  if (kind === "none") { ui.innerHTML = ""; return; }
  if (kind === "title") {
    ui.innerHTML = '<div class="panel"><div><h1>' + STR.title + '</h1>' +
      '<p class="sub">' + STR.subtitle + '</p>' +
      '<p class="hint">' + (isTouch ? STR.touchHint : STR.keysHint) + '</p>' +
      '<button id="go">' + STR.tapToStart + "</button></div></div>";
    document.getElementById("go").addEventListener("click", () => { newGame(); mode = "play"; paintPanel("none"); });
  }
  if (kind === "dead") {
    ui.innerHTML = '<div class="panel"><div><h1>' + STR.clockedOut + '</h1>' +
      '<p class="sub">' + STR.rep + " " + rep + " · " + STR.wave + " " + wave +
      (rep >= best && rep > 0 ? " · " + STR.newBest : "") + '</p>' +
      '<button id="go">' + STR.runAgain + "</button></div></div>";
    document.getElementById("go").addEventListener("click", () => { newGame(); mode = "play"; paintPanel("none"); });
  }
}
function openShop() {
  const picks = [];
  const pool = T.shop.slice();
  while (picks.length < 3 && pool.length) picks.push(pool.splice(Math.floor(rng() * pool.length), 1)[0]);
  ui.innerHTML = '<div class="panel"><div><h1 style="font-size:2rem">' + STR.waveCleared + '</h1>' +
    '<p class="sub">' + STR.shopTitle + " · " + STR.rep + " " + rep + '</p>' +
    '<div class="cards">' + picks.map((u, i) =>
      '<button class="card" data-i="' + i + '"' + (rep < u[1] ? " disabled" : "") + "><b>" + STR[u[0]] + "</b><small>" +
      STR[u[0] + "_d"] + '</small><span class="cost">' + u[1] + " " + STR.rep + "</span></button>").join("") +
    '</div><button id="skip" class="skip">' + STR.shopSkip + "</button></div></div>";
  ui.querySelectorAll(".card").forEach((b) => b.addEventListener("click", () => {
    const u = picks[+b.getAttribute("data-i")];
    if (rep < u[1]) return;
    rep -= u[1]; u[2](P); closeShop();
  }));
  document.getElementById("skip").addEventListener("click", closeShop);
}
function closeShop() { paintPanel("none"); mode = "play"; nextWave(); }

/* ---------- the loop ---------- */
const STEP = 1000 / 60;
let acc = 0, last = performance.now(), paused = false, frames = 0, fpsAt = last;
addEventListener("blur", () => { paused = true; });
addEventListener("focus", () => { paused = false; last = performance.now(); });
const dev = new URLSearchParams(location.search).has("dev");
if (dev) {
  document.getElementById("dev").style.display = "block";
  // dev-only state window so automated preflight can read the sim
  window.__BO = function () {
    return { mode, rep, wave, streak, hp: P ? P.hp : null,
      foes: (foes || []).map((f) => ({ x: f.x - P.x + vw / 2, y: f.y - P.y + vh / 2, heavy: f.heavy })) };
  };
}
function frame(now) {
  requestAnimationFrame(frame);
  if (paused) return;
  acc += Math.min(120, now - last); last = now;
  const cmds = readInput();
  while (acc >= STEP) { if (mode === "play") { update(STEP, cmds); runPend(); } acc -= STEP; }
  render();
  if (dev) {
    frames++;
    if (now - fpsAt >= 500) {
      document.getElementById("dev").textContent = Math.round(frames * 1000 / (now - fpsAt)) + " fps · " +
        ((foes ? foes.length : 0) + (bullets ? bullets.length : 0)) + " ents";
      frames = 0; fpsAt = now;
    }
  }
}
paintPanel("title");
requestAnimationFrame(frame);
</script>
