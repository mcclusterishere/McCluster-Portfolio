<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Your E⤴ Card · Equity Uprise</title>
  <meta name="description" content="Your profile IS your E⤴ Card — face, name, colors, street credit — plus the mirror to edit it. The menus live in the bar.">
  <meta name="robots" content="noindex,follow">
  <link rel="icon" type="image/png" href="assets/img/eu-favicon.png">
  <link rel="preload" href="assets/fonts/anton-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=c8fb10b51488">
  <style>
    .pf { min-height: 100dvh; padding: clamp(4.6rem, 9vh, 6rem) clamp(1rem, 4vw, 2rem) 9rem; max-width: 30rem; margin: 0 auto; }
    .pf h1 { font-family: var(--sig); text-transform: uppercase; line-height: 0.95; font-size: clamp(2.2rem, 9vw, 3.4rem); }
    .pf__sub { color: var(--cream-dim); line-height: 1.7; margin-top: 0.7rem; font-size: 0.95rem; }
    .pf__sub b { color: var(--cream); }
    .pf__card { border: 1px solid rgba(244,239,230,0.14); border-radius: 16px; background: rgba(20,16,14,0.7); padding: 1.1rem 1.15rem; margin-top: 1rem; }
    /* ---- THE CARD: the profile IS the E⤴ Card ---- */
    .crd { position: relative; aspect-ratio: 1.586 / 1; border-radius: 22px; margin-top: 1.2rem; overflow: hidden;
      background: linear-gradient(135deg, var(--cc, #c99d45) 0%, #17110d 58%, #0a0807 100%);
      border: 1px solid rgba(244,239,230,0.25); box-shadow: 0 18px 60px rgba(0,0,0,0.55), inset 0 0 60px rgba(0,0,0,0.35);
      padding: 1.05rem 1.15rem; display: flex; flex-direction: column; color: #f4efe6; }
    .crd__top { display: flex; align-items: center; gap: 0.5rem; }
    .crd__top img { width: 1.3rem; height: 1.3rem; }
    .crd__top b { font-size: 0.74rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 800; }
    .crd__cred { margin-left: auto; text-align: right; }
    .crd__cred b { display: block; font-family: var(--display); font-size: 1.3rem; letter-spacing: 0; font-variant-numeric: tabular-nums; }
    .crd__cred small { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.75; }
    .crd__chip { width: 2.6rem; height: 1.9rem; border-radius: 6px; margin-top: 0.7rem;
      background: linear-gradient(160deg, #e8c877, #b8862f); border: 1px solid rgba(0,0,0,0.4);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25); position: relative; }
    .crd__chip::after { content: ""; position: absolute; inset: 30% 12%; border: 1px solid rgba(0,0,0,0.35); border-radius: 3px; }
    .crd__name { margin-top: auto; font-family: var(--display); font-weight: 400; text-transform: uppercase;
      font-size: clamp(1.3rem, 6.4vw, 1.8rem); line-height: 1.05; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .crd__name span { color: #e8c877; font-size: 0.62em; vertical-align: 0.25em; margin-left: 0.35em; }
    .crd__paths { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 800; opacity: 0.85; margin-top: 0.25rem; }
    .crd__nums { display: flex; gap: 1.1rem; margin-top: 0.55rem; font-variant-numeric: tabular-nums; }
    .crd__n b { display: block; font-family: var(--display); font-size: 1.05rem; }
    .crd__n small { font-size: 0.58rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.75; }
    .crd__n--gold b { color: #e8c877; }
    .crd__n--green b { color: #00c805; }
    .crd__face { position: absolute; right: 1rem; top: 2.9rem; width: 3.6rem; height: 3.6rem; border-radius: 50%;
      object-fit: cover; border: 2px solid rgba(244,239,230,0.5); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
    /* ---- THE MIRROR: edit what the card says ---- */
    .pf__lab { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cream-dim); font-weight: 800;
      display: block; margin-top: 0.85rem; }
    .pf__in { width: 100%; box-sizing: border-box; background: rgba(244,239,230,0.06); color: var(--cream);
      border: 1px solid rgba(244,239,230,0.22); border-radius: 10px; padding: 0.7rem 0.85rem; font: inherit;
      font-size: 0.98rem; margin-top: 0.35rem; }
    .pf__in:focus { outline: none; border-color: #e8c877; }
    .pf__links { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .pf__msg { min-height: 1.2em; margin-top: 0.8rem; font-size: 0.9rem; color: #2fbf71; }
    .pf__doors { display: grid; gap: 0.55rem; margin-top: 1rem; }
    .pf__door { display: flex; align-items: center; gap: 0.75rem; border: 1px solid rgba(244,239,230,0.14); border-radius: 14px;
      background: rgba(18,14,11,0.85); padding: 0.95rem 1rem; text-decoration: none; color: var(--cream);
      border-left: 3px solid var(--dc, #c99d45); transition: transform 0.12s; font: inherit; text-align: left; cursor: pointer; }
    .pf__door:active { transform: scale(0.98); }
    .pf__door b { display: block; font-size: 0.96rem; }
    .pf__door small { display: block; color: var(--cream-dim); font-size: 0.84rem; margin-top: 0.15rem; line-height: 1.45; }
    .pf__door .ic { flex: none; font-size: 1.15rem; }
    .pf__door .go { flex: none; color: var(--dc, #c99d45); font-weight: 800; }
    .pf__arch { display: inline-flex; align-items: center; gap: 0.45em; border: 1px solid rgba(201,157,69,0.55); color: #e8c877;
      border-radius: 100px; padding: 0.3em 0.85em; font-size: 0.84rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .pf__out { background: none; border: 1px solid rgba(244,239,230,0.22); border-radius: 100px; color: var(--cream-dim);
      font: inherit; font-size: 0.84rem; padding: 0.4em 1em; cursor: pointer; margin-top: 1.6rem; }
  </style>
</head>
<body class="songpage">
  <div class="grain" aria-hidden="true"></div>
  <main class="pf" id="pfMain"><p class="pf__sub">Dealing your card…</p></main>

  <script src="js/analytics.js?v=c8fb10b51488"></script>
  <script src="js/polish.js?v=c8fb10b51488"></script>
  <script src="js/backend.js?v=c8fb10b51488"></script>
  <script src="js/guide.js?v=c8fb10b51488"></script>
  <script src="js/network.js?v=c8fb10b51488"></script>
  <script src="js/door.js?v=c8fb10b51488"></script>
  <script src="js/chaser.js?v=c8fb10b51488"></script>
  <script>
    (function () {
      "use strict";
      function $(id) { return document.getElementById(id); }
      function esc(s) { var d = document.createElement("i"); d.textContent = s == null ? "" : s; return d.innerHTML; }
      function track(n, p) { if (window.MCC_TRACK) window.MCC_TRACK(n, p); }
      var main = $("pfMain");
      var S = window.MCC_SUPA;

      var PATH_META = {
        signal: ["Signal", "#45b6ff"], infra: ["Infrastructure", "#c99d45"],
        capital: ["Capital", "#00c805"], culture: ["Culture", "#e5383b"],
        justice: ["Justice", "#8b5cf6"], access: ["Access", "#a3e635"],
        proof: ["Proof", "#2aa8a0"], command: ["Command", "#ff7a00"] };
      var rise = null;
      try { rise = JSON.parse(localStorage.getItem("mcc_rise")); } catch (e) {}
      var myPaths = (rise && rise.arch) || [];

      function rpc(name) {
        return S.token().then(function (t) {
          return fetch(S.url + "/rest/v1/rpc/" + name, { method: "POST",
            headers: { "Content-Type": "application/json", apikey: S.key, Authorization: "Bearer " + (t || S.key) },
            body: "{}" }).then(function (r) { return r.ok ? r.json() : null; });
        }).catch(function () { return null; });
      }

      function paintOut() {
        main.innerHTML = '<p class="kicker"><img class="kicker__mark" src="assets/img/eu-favicon.png" alt="" style="filter:none"> Your E&#10548; Card</p>' +
          "<h1>Your<br>Profile.</h1>" +
          '<p class="pf__sub"><b>Your profile IS your card:</b> your face, your name, your colors, your street credit — ' +
          "one piece of plastic the whole house reads. It starts with the deal.</p>" +
          '<div class="pf__card card-call"><p class="pf__sub" style="margin-top:0"><a href="rise.html" style="color:#e8c877;font-weight:800">🃏 GET YOUR CARD — play WHAT MAKES YOU RISE? (2 min) &#8594;</a><br>' +
          '<span style="font-size:0.9rem">It deals your E⤴ Card and shapes everything in here to your path.</span></p></div>' +
          '<div class="pf__card"><div id="pfDoor"></div></div>';
        if (window.MCC_DOOR && window.MCC_DOOR.mount) {
          window.MCC_DOOR.mount($("pfDoor"), { ticker: true, context: "profile", onDone: function () { location.reload(); } });
        }
      }

      /* THE CARD: the profile is the E⤴ Card, big — the menus live in
         the bar now (double-tap Profile), so this room holds only the
         card and the mirror that edits it */
      function paintIn(mine) {
        var ADMIN = (S.email && S.email()) === "matthew@mccluster.org";
        var name = (mine && mine.name) || "Chaser";
        var slug = mine && mine.slug;
        var tick = mine && mine.ticker ? "$" + String(mine.ticker).toUpperCase() : "";
        var CH = window.MCC_CHASER;
        var prim = CH && CH.primary && CH.primary();
        var cc = prim && PATH_META[prim] ? PATH_META[prim][1] : "#c99d45";
        var links = (mine && mine.terms && mine.terms.links) || {};
        /* THE PRESSED MIRROR: once a member presses their thing into the
           card, the mirror folds away — a dressed card (or the pressed
           flag) means the editor waits behind one door until needed */
        var pressed = false;
        try { pressed = !!localStorage.getItem("mcc_pressed"); } catch (e) {}
        if (!pressed && mine && (mine.headline || mine.photo)) pressed = true;
        var pathsLine = myPaths.length
          ? myPaths.map(function (p) { return PATH_META[p] ? PATH_META[p][0] : p; }).join(" × ")
          : "";

        main.innerHTML = '<p class="kicker"><img class="kicker__mark" src="assets/img/eu-favicon.png" alt="" style="filter:none"> Your E&#10548; Card</p>' +
          "<h1>The<br>Card.</h1>" +
          '<p class="pf__sub">Low key your credit card: your price and street cred are tied to it, and services get paid through it. ' +
          "The rooms live in the bar — <b>double-tap Profile down there</b> and the menu comes to you.</p>" +

          '<div class="crd" style="--cc:' + cc + '" id="pfCard">' +
          '<div class="crd__top"><img src="assets/img/eu-favicon.png" alt=""><b>E&#10548; Card</b>' +
          '<span class="crd__cred"><b id="pfCred">—</b><small>street credit</small></span></div>' +
          '<div class="crd__chip" aria-hidden="true"></div>' +
          (mine && mine.photo ? '<img class="crd__face" src="' + esc(mine.photo) + '" alt="" id="pfFaceImg">' : "") +
          '<div class="crd__name" id="pfCardName">' + esc(name) + (tick ? "<span>" + esc(tick) + "</span>" : "") + "</div>" +
          '<div class="crd__paths">' + (pathsLine ? "🃏 " + esc(pathsLine) : '<a href="rise.html" style="color:#e8c877;text-decoration:none">🃏 Undealt — play RISE &#8594;</a>') + "</div>" +
          '<div class="crd__nums">' +
          '<span class="crd__n"><b id="pfPrice">—</b><small>your price</small></span>' +
          '<span class="crd__n crd__n--gold" id="pfGoldWrap" style="display:none"><b id="pfGold">—</b><small>gold · spends w/ house</small></span>' +
          '<span class="crd__n crd__n--green" id="pfGreenWrap" style="display:none"><b id="pfGreen">—</b><small>green · cashes out</small></span>' +
          '<span class="crd__n"><b id="pfPts">—</b><small>game points</small></span>' +
          "</div></div>" +

          '<div class="pf__card" id="pfStreet">' +
          '<p class="pf__lab" style="margin-top:0">Street credit — the number behind the card</p>' +
          '<div id="pfStreetNums" style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.6rem"></div>' +
          '<p class="pf__sub" style="font-size:0.9rem;margin-top:0.55rem">Earned by showing up: clean deals, verified accounts, votes, receipts. Every point pays 2 game points into your price.</p>' +
          '<a class="pf__door" href="civic.html" style="--dc:#2fbf71;margin-top:0.6rem"><span class="ic">🪪</span><span style="flex:1"><b>The Street Cred Portal</b><small>Raise it: connect accounts, file your card, vote, keep showing up.</small></span><span class="go">&#8594;</span></a>' +
          "</div>" +

          (pressed ? '<div class="pf__doors" style="margin-top:1rem"><button class="pf__door" type="button" id="pfMirrorOpen" style="--dc:#45b6ff"><span class="ic">🪞</span><span style="flex:1"><b>The mirror</b><small>Your press is in the card. Open this only when something changes.</small></span><span class="go">&#8594;</span></button></div>' : "") +
          '<div class="pf__card" id="pfMirror"' + (pressed ? " hidden" : "") + ">" +
          '<p class="pf__lab" style="margin-top:0">The mirror — what the card says</p>' +
          '<label class="pf__lab" for="pfEName">Name on the card</label><input class="pf__in" id="pfEName" value="' + esc((mine && mine.name) || "") + '" placeholder="Your name">' +
          '<label class="pf__lab" for="pfEHead">One line — what you do</label><input class="pf__in" id="pfEHead" value="' + esc((mine && mine.headline) || "") + '" placeholder="Photographer · producer · driver…">' +
          '<label class="pf__lab" for="pfEArea">Where you run</label><input class="pf__in" id="pfEArea" value="' + esc((mine && mine.area) || "") + '" placeholder="Bridgeport, CT">' +
          '<label class="pf__lab" for="pfEPhoto">Face</label><input class="pf__in" id="pfEPhoto" value="' + esc((mine && mine.photo) || "") + '" placeholder="https://…jpg — or use the button">' +
          '<input type="file" id="pfEPhotoFile" accept="image/*" hidden>' +
          '<button class="btn btn--ghost" id="pfFaceBtn" type="button" style="margin-top:0.45rem;font-size:0.85rem">📸 Drop a photo from this phone</button>' +
          '<p class="pf__lab">The links — your followership feeds the chart</p>' +
          '<div class="pf__links">' +
          '<input class="pf__in" id="pfLyt" value="' + esc(links.yt || "") + '" placeholder="YouTube">' +
          '<input class="pf__in" id="pfLig" value="' + esc(links.ig || "") + '" placeholder="Instagram">' +
          '<input class="pf__in" id="pfLtt" value="' + esc(links.tt || "") + '" placeholder="TikTok">' +
          '<input class="pf__in" id="pfLx" value="' + esc(links.x || "") + '" placeholder="X / Twitter">' +
          "</div>" +
          '<div class="finale__actions" style="margin-top:1rem"><button class="btn btn--ruby" id="pfSave" type="button">Press it into the card &#8594;</button></div>' +
          '<p class="pf__msg" id="pfMsg"></p></div>' +

          '<div class="pf__doors">' +
          (slug
            ? '<a class="pf__door" href="page.html?who=' + esc(slug) + '" style="--dc:#e8c877"><span class="ic">📄</span><span style="flex:1"><b>Your public page</b><small>What any visitor sees when your card gets shared.</small></span><span class="go">&#8594;</span></a>' +
              '<button class="pf__door" type="button" id="pfShare" style="--dc:#45b6ff"><span class="ic">🔗</span><span style="flex:1"><b>Share your card</b><small id="pfShareNote">One link carries all of it.</small></span><span class="go">&#8594;</span></button>'
            : '<a class="pf__door" href="welcome.html" style="--dc:#e8c877"><span class="ic">🚪</span><span style="flex:1"><b>Finish the walk-in</b><small>Your public page, ticker and chart go up together.</small></span><span class="go">&#8594;</span></a>') +
          '<a class="pf__door" href="index.html" style="--dc:#c99d45"><span class="ic">🌇</span><span style="flex:1"><b>The Penthouse</b><small>What a built-out card looks like — the desk’s own floor.</small></span><span class="go">&#8594;</span></a>' +
          (ADMIN ? '<a class="pf__door" href="mission.html" style="--dc:#e5383b"><span class="ic">🎛</span><span style="flex:1"><b>Mission Control</b><small>The whole system — the admin desk.</small></span><span class="go">&#8594;</span></a>' : "") +
          "</div>" +
          '<button class="pf__out" id="pfSignOut" type="button">Sign out</button>';

        /* the numbers: price + points off the engine, colors off the wall */
        rpc("my_score").then(function (sc) {
          if (!sc) return;
          if (sc.price != null) $("pfPrice").textContent = "$" + (+sc.price).toFixed(2);
          if (sc.points != null) $("pfPts").textContent = Math.round(+sc.points).toLocaleString();
          if (sc.score != null) $("pfCred").textContent = sc.score;
          /* the street panel: the same read the portal shows, in the room */
          function cel(n, l, col) {
            return '<div style="border:1px solid rgba(244,239,230,0.13);border-radius:12px;padding:0.65rem;text-align:center;flex:1;min-width:88px">' +
              '<b style="display:block;font-size:1.25rem;font-variant-numeric:tabular-nums;color:' + (col || "#2fbf71") + '">' + n + "</b>" +
              '<small style="color:rgba(244,239,230,0.7);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase">' + l + "</small></div>";
          }
          var trust = sc.game && sc.game.trust != null ? Math.round(+sc.game.trust) : null;
          $("pfStreetNums").innerHTML =
            cel(sc.score != null ? sc.score + " / 1000" : "—", "street credit") +
            cel(sc.price != null ? "$" + (+sc.price).toFixed(2) : "—", "your price", "#e8c877") +
            (trust != null ? cel(trust.toLocaleString() + " pts", "credit paying your price", "#e8c877") : "");
        });
        rpc("my_colors").then(function (c) {
          if (!c) return;
          $("pfGoldWrap").style.display = "";
          $("pfGreenWrap").style.display = "";
          $("pfGold").textContent = (+c.gold || 0).toLocaleString();
          $("pfGreen").textContent = (+c.green || 0).toLocaleString();
        });

        /* the mirror presses into the listing — the card repaints live */
        $("pfSave").addEventListener("click", function () {
          var btn = $("pfSave");
          btn.disabled = true; btn.textContent = "Pressing…";
          var terms = (mine && mine.terms) || {};
          var lk = {};
          if ($("pfLyt").value.trim()) lk.yt = $("pfLyt").value.trim();
          if ($("pfLig").value.trim()) lk.ig = $("pfLig").value.trim();
          if ($("pfLtt").value.trim()) lk.tt = $("pfLtt").value.trim();
          if ($("pfLx").value.trim()) lk.x = $("pfLx").value.trim();
          terms.links = lk;
          var fields = {
            name: $("pfEName").value.trim() || name,
            headline: $("pfEHead").value.trim(),
            area: $("pfEArea").value.trim(),
            photo: $("pfEPhoto").value.trim() || null,
            terms: terms,
          };
          window.MCC_NET.saveListing(fields).then(function (row) {
            try { localStorage.setItem("mcc_pressed", "1"); } catch (e) {}
            $("pfMsg").textContent = "✓ Pressed — the card remembers, and Our Street reads it.";
            $("pfCardName").innerHTML = esc(fields.name) + (tick ? "<span>" + esc(tick) + "</span>" : "");
            if (window.MCC_FLOOR && window.MCC_FLOOR.invalidate) window.MCC_FLOOR.invalidate();
            track("card_pressed", {});
            if (row && !slug) setTimeout(function () { location.reload(); }, 900);
          }).catch(function () {
            $("pfMsg").style.color = "#ff5000";
            $("pfMsg").textContent = "The press slipped — try again.";
          }).then(function () { btn.disabled = false; btn.innerHTML = "Press it into the card &#8594;"; });
        });

        /* the face drop: pick → shrink → the field fills itself */
        $("pfFaceBtn").addEventListener("click", function () { $("pfEPhotoFile").click(); });
        $("pfEPhotoFile").addEventListener("change", function () {
          var f = this.files && this.files[0];
          if (!f) return;
          $("pfFaceBtn").textContent = "Loading the face…";
          window.MCC_FACE.shrink(f).then(function (uri) {
            $("pfEPhoto").value = uri;
            $("pfFaceBtn").textContent = "✓ Face loaded — now press it into the card";
          }).catch(function () { $("pfFaceBtn").textContent = "That photo slipped — try another"; });
        });

        var mo = $("pfMirrorOpen");
        if (mo) mo.addEventListener("click", function () {
          $("pfMirror").hidden = false;
          mo.parentNode.removeChild(mo);
          $("pfEName").focus();
        });

        var sh = $("pfShare");
        if (sh) sh.addEventListener("click", function () {
          var link = location.origin + location.pathname.replace(/[^/]*$/, "") + "page.html?who=" + slug;
          (navigator.clipboard ? navigator.clipboard.writeText(link) : Promise.reject()).then(function () {
            $("pfShareNote").textContent = "✓ Copied — send it anywhere.";
          }).catch(function () { $("pfShareNote").textContent = link; });
          track("profile_share", {});
        });
        $("pfSignOut").addEventListener("click", function () {
          window.MCC_AUTH.signOut().then(function () { location.reload(); });
        });
      }

      if (window.MCC_AUTH && window.MCC_AUTH.user && window.MCC_AUTH.user()) {
        window.MCC_NET.myListing().then(paintIn).catch(function () { paintIn(null); });
      } else {
        paintOut();
      }
      track("profile_view", {});
    })();
  </script>
</body>
</html>
