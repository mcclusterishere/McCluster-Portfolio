<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Inside the Jet · Vaunt VR · McCluster</title>
  <meta name="description" content="Step inside the Vaunt jet in full 360. Drag to look anywhere, or move your phone and the cabin moves with you.">
  <link rel="icon" type="image/png" href="assets/img/m-mark.png">
  <link rel="preload" href="assets/fonts/anton-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=__STAMP__">
  <style>
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
    /* 100lvh = the LARGE viewport: sized as if Safari's bars are hidden, so
       the stage NEVER resizes while the toolbar animates mid-drag — that
       resize storm was the portrait-iPhone glitch. Bars simply overlap the
       bottom edge of the film when shown, which a full-bleed 360 absorbs. */
    .vr { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100lvh; background: #0a0807; }
    .vr__canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; }
    .vr__canvas:active { cursor: grabbing; }
    .vr__top {
      position: absolute; top: 0; left: 0; right: 0; z-index: 5;
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(0.9rem + env(safe-area-inset-top)) 1.2rem 0.9rem;
      background: linear-gradient(180deg, rgba(10,8,7,0.85), transparent);
    }
    .vr__brand { display: flex; align-items: center; gap: 0.6rem; color: var(--cream); text-decoration: none; }
    .vr__brand img { width: 26px; }
    .vr__brand b { font-family: var(--display); font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.9rem; }
    .vr__badge { font-size: 0.56rem; letter-spacing: 0.24em; text-transform: uppercase; color: #fff;
      background: linear-gradient(120deg, var(--ruby), var(--ruby-hot)); border-radius: 100px; padding: 0.45em 1em; }
    .vr__hud {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 5; text-align: center;
      padding: 1rem 1.2rem calc(1.2rem + env(safe-area-inset-bottom));
      background: linear-gradient(0deg, rgba(10,8,7,0.85), transparent);
    }
    .vr__hint { color: var(--cream-dim); font-size: 0.86rem; letter-spacing: 0.04em; margin-bottom: 0.7rem; }
    .vr__hint b { color: var(--cream); }
    .vr__actions { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }
    .vr__btn {
      border: 1px solid rgba(244, 239, 230, 0.35); border-radius: 100px; background: rgba(10,8,7,0.6);
      color: var(--cream); font: inherit; font-size: 0.66rem; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 0.6em 1.3em; cursor: pointer; transition: border-color 0.25s, background 0.25s;
    }
    .vr__btn:hover { border-color: var(--ruby-hot); background: rgba(193, 18, 31, 0.25); }
    .vr__btn.is-on { border-color: var(--ruby-hot); color: var(--ruby-hot); }
    /* first-touch coach mark */
    .vr__coach {
      position: absolute; inset: 0; z-index: 4; display: grid; place-items: center; pointer-events: none;
      opacity: 1; transition: opacity 0.6s ease;
    }
    .vr__coach.is-gone { opacity: 0; }
    .vr__coach-in { text-align: center; background: rgba(10,8,7,0.55); border-radius: 18px; padding: 1.4rem 1.8rem; backdrop-filter: blur(6px); }
    .vr__coach-in svg { width: 54px; height: 54px; stroke: var(--cream); fill: none; stroke-width: 1.6; stroke-linecap: round; animation: vrSwipe 2.4s ease-in-out infinite; }
    .vr__coach-in p { margin-top: 0.6rem; font-family: var(--display); text-transform: uppercase; letter-spacing: 0.1em; font-size: 1.05rem; color: var(--cream); }
    @keyframes vrSwipe { 0%, 100% { transform: translateX(-14px); } 50% { transform: translateX(14px); } }
    @media (prefers-reduced-motion: reduce) { .vr__coach-in svg { animation: none; } }

    /* hotspots: tags pinned to things in the scene */
    .vr360-spots { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
    .vr360-spot {
      /* the DOT sits exactly on the pinned point; the label flows right */
      position: absolute; transform: translate(-8px, -50%); pointer-events: auto;
      display: flex; align-items: center; gap: 0.45em; text-decoration: none; color: var(--cream);
      padding: 6px 6px 6px 0; margin: -6px -6px -6px 0;
    }
    .vr360-spot i {
      width: 16px; height: 16px; border-radius: 50%; flex: none; position: relative;
      background: var(--ruby-hot); box-shadow: 0 0 12px rgba(229, 56, 59, 0.9);
    }
    .vr360-spot i::after {
      content: ""; position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid rgba(229, 56, 59, 0.7); animation: vrSpotPing 2s ease-out infinite;
    }
    @keyframes vrSpotPing { 0% { transform: scale(0.7); opacity: 1; } 100% { transform: scale(1.7); opacity: 0; } }
    .vr360-spot span {
      font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; white-space: nowrap;
      background: rgba(10, 8, 7, 0.75); border: 1px solid rgba(229, 56, 59, 0.5);
      border-radius: 100px; padding: 0.45em 0.95em; backdrop-filter: blur(4px);
      transition: background 0.25s, border-color 0.25s;
    }
    .vr360-spot:hover span { background: var(--ruby); border-color: var(--ruby-hot); }
    .vr360-edge {
      position: absolute; display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 50%; pointer-events: none;
      background: rgba(10, 8, 7, 0.72); border: 2px solid #f84c0a;
      box-shadow: 0 0 12px rgba(248, 76, 10, 0.75);
    }
    .vr360-edge svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    @media (prefers-reduced-motion: reduce) { .vr360-spot i::after { animation: none; } }

    /* video transport: play/pause + scrub */
    .vr__transport { display: none; align-items: center; gap: 0.7rem; max-width: 34rem; margin: 0 auto 0.8rem; }
    .vr__transport.is-on { display: flex; }
    .vr__play { flex: none; width: 2.6rem; height: 2.6rem; border-radius: 50%; border: none; cursor: pointer;
      background: linear-gradient(120deg, var(--ruby), var(--ruby-hot)); color: #fff; display: grid; place-items: center;
      box-shadow: 0 6px 22px rgba(229, 56, 59, 0.5); }
    .vr__play svg { width: 45%; height: 45%; fill: currentColor; }
    .vr__scrub { flex: 1; appearance: none; -webkit-appearance: none; height: 5px; border-radius: 5px;
      background: rgba(244, 239, 230, 0.22); outline: none; cursor: pointer; }
    .vr__scrub::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: var(--ruby-hot); box-shadow: 0 0 10px rgba(229, 56, 59, 0.8); }
    .vr__time { flex: none; font-size: 0.66rem; letter-spacing: 0.1em; color: var(--cream-dim); font-variant-numeric: tabular-nums; }

    /* Vaunt brand: their orange carries the whole experience */
    .vr__badge, .vr__play { background: linear-gradient(120deg, #c93a04, #f84c0a); }
    .vr__play { box-shadow: 0 6px 22px rgba(248, 76, 10, 0.5); }
    .vr__btn:hover { border-color: #f84c0a; background: rgba(248, 76, 10, 0.25); }
    .vr__btn.is-on { border-color: #f84c0a; color: #ffb38f; }
    .vr__scrub::-webkit-slider-thumb { background: #f84c0a; box-shadow: 0 0 10px rgba(248, 76, 10, 0.8); }
    .vr360-spot i { background: #f84c0a; box-shadow: 0 0 12px rgba(248, 76, 10, 0.9); }
    .vr360-spot i::after { border-color: rgba(248, 76, 10, 0.7); }
    .vr360-spot span { border-color: rgba(248, 76, 10, 0.55); }
    .vr360-spot:hover span { background: #f84c0a; border-color: #f84c0a; }
  </style>
</head>
<body>
  <div class="vr">
    <canvas class="vr__canvas" id="vrCanvas"></canvas>
    <div class="vr__top">
      <a class="vr__brand" href="vaunt.html"><img src="assets/img/m-mark.png" alt="M"><b>Vaunt · Inside the Jet</b></a>
      <span class="vr__badge">360 &middot; VR</span>
    </div>
    <div class="vr__coach" id="vrCoach">
      <div class="vr__coach-in">
        <svg viewBox="0 0 48 48" aria-hidden="true"><path d="M10 24h28M14 18l-6 6 6 6M34 18l6 6-6 6"/></svg>
        <p>Drag to look around</p>
      </div>
    </div>
    <div class="vr__hud">
      <div class="vr__transport" id="vrTransport">
        <button class="vr__play" id="vrPlay" type="button" aria-label="Play or pause">
          <svg viewBox="0 0 24 24" id="vrPlayIc"><path d="M8 5.14v13.72a1 1 0 0 0 1.53.85l10.79-6.86a1 1 0 0 0 0-1.7L9.53 4.29A1 1 0 0 0 8 5.14z"/></svg>
        </button>
        <input class="vr__scrub" id="vrScrub" type="range" min="0" max="1000" value="0" aria-label="Scrub the film">
        <span class="vr__time" id="vrTime">0:00</span>
      </div>
      <p class="vr__hint" id="vrHint"><b>Drag</b> to look · <b>pinch</b> to zoom · <b>tap a red dot</b> to open what it's pinned to</p>
      <div class="vr__actions">
        <button class="vr__btn" id="vrGyro" type="button">Use motion &middot; move the phone to look</button>
        <button class="vr__btn" id="vrFull" type="button">Fullscreen</button>
        <a class="vr__btn" href="book-video.html" data-cta="vr-book">Want this for your brand?</a>
        <a class="vr__btn" href="vaunt.html">&#8592; The Vaunt universe</a>
      </div>
    </div>
  </div>

  <script src="js/analytics.js?v=__STAMP__"></script>
  <script src="js/vr360.js?v=__STAMP__"></script>
  <script>
    (function () {
      "use strict";
      /* swap src to the exported equirectangular MP4 when it lands:
         { src: "assets/video/vaunt-360.mp4", video: true, spots: SPOTS } */
      var SPOTS = [
        // yaw/pitch in degrees; add from/to (seconds) to time-gate a tag on video
        { yaw: 71, pitch: -56, label: "Zakir · the six-string", href: "profile-zakir.html" },
        { yaw: -140, pitch: -40, label: "McCluster · the artist", href: "profile-mccluster.html" },
        { yaw: -77, pitch: -13, label: "The cockpit · fly with Vaunt", href: "https://vauntapi.flyvaunt.com/referral/nuao1K", blank: true },
        { yaw: 111, pitch: -32, label: "The camera · book photography", href: "book-photo.html" },
        { yaw: 131, pitch: -29, label: "The bag · M Pay", href: "pay.html" },
      ];
      var IS_VIDEO = true; // the real inside-the-jet 360 film
      // touch devices get the 1600×800 cut — half the pixels per GPU upload,
      // and iOS pays for every one of them on the CPU
      var TOUCH = "ontouchstart" in window || navigator.maxTouchPoints > 0;
      var viewer = VR360.mount(document.getElementById("vrCanvas"), {
        src: TOUCH ? "assets/video/vaunt-360-m.mp4" : "assets/video/vaunt-360.mp4",
        poster: "assets/img/vaunt-360-poster.jpg",
        video: IS_VIDEO,
        yaw: -140, pitch: -32, // open facing McCluster in his seat
        spots: SPOTS,
      });
      if (window.MCC_TRACK) window.MCC_TRACK("vr_view", { page: "vr-vaunt" });

      /* ---- the watchdog: a black cabin is never the answer. If the film
             hasn't produced a frame in 8 seconds (or errors), the poster
             steps in with a retry — a clear state instead of a void. ---- */
      (function () {
        var shown = false;
        function fallback(msg) {
          if (shown) return;
          shown = true;
          var ov = document.createElement("div");
          ov.id = "vrFallback";
          ov.style.cssText = "position:absolute;inset:0;z-index:4;display:grid;place-items:center;text-align:center;" +
            "background:url(assets/img/vaunt-360-poster.jpg) center/cover no-repeat;";
          ov.innerHTML =
            '<div style="background:rgba(10,8,7,0.78);backdrop-filter:blur(6px);border-radius:18px;padding:1.6rem 1.5rem;max-width:22rem">' +
            '<p style="font-family:var(--display);text-transform:uppercase;font-size:1.3rem">' + msg + "</p>" +
            '<p style="color:var(--cream-dim);font-size:0.85rem;line-height:1.5;margin:0.5rem 0 1rem">The 360 film is a heavy lift on slow connections — the cabin is still real.</p>' +
            '<button class="vr__btn" id="vrRetry" type="button">Try again</button> ' +
            '<a class="vr__btn" href="vaunt.html" style="text-decoration:none">The Vaunt universe</a></div>';
          document.querySelector(".vr").appendChild(ov);
          document.getElementById("vrRetry").addEventListener("click", function () {
            shown = false; ov.remove();
            try { viewer.media.load(); viewer.media.play().catch(function () {}); } catch (e) {}
            setTimeout(check, 8000);
          });
          if (window.MCC_TRACK) window.MCC_TRACK("vr_fallback", { why: msg.slice(0, 40) });
        }
        function check() {
          var m = viewer && viewer.media;
          if (!m || m.readyState < 2) fallback("Loading the cabin… it's a big one");
        }
        if (viewer && viewer.media) {
          viewer.media.addEventListener("error", function () { fallback("The film hit turbulence"); });
        }
        setTimeout(check, 8000);
      })();

      var coach = document.getElementById("vrCoach");
      var seen = false;
      document.getElementById("vrCanvas").addEventListener("pointerdown", function () {
        if (!seen) { seen = true; coach.classList.add("is-gone"); }
      });

      document.getElementById("vrGyro").addEventListener("click", function () {
        viewer.enableGyro();
        this.classList.add("is-on");
        this.textContent = "Motion on · move the phone";
        if (window.MCC_TRACK) window.MCC_TRACK("vr_gyro_on", { page: "vr-vaunt" });
      });
      document.getElementById("vrFull").addEventListener("click", function () {
        var el = document.documentElement;
        if (document.fullscreenElement) document.exitFullscreen();
        else if (el.requestFullscreen) el.requestFullscreen();
      });

      /* ---- transport: play, pause, scrub (video mode only) ---- */
      if (IS_VIDEO) {
        var m = viewer.media;
        var bar = document.getElementById("vrTransport");
        var play = document.getElementById("vrPlay");
        var ic = document.getElementById("vrPlayIc");
        var scrub = document.getElementById("vrScrub");
        var time = document.getElementById("vrTime");
        var PLAY = "M8 5.14v13.72a1 1 0 0 0 1.53.85l10.79-6.86a1 1 0 0 0 0-1.7L9.53 4.29A1 1 0 0 0 8 5.14z";
        var PAUSE = "M7 5h4v14H7zM13 5h4v14h-4z";
        bar.classList.add("is-on");
        function fmt(s) { s = Math.max(0, s | 0); return (s / 60 | 0) + ":" + String(s % 60).padStart(2, "0"); }
        play.addEventListener("click", function () {
          if (m.paused) { m.play(); ic.firstChild.setAttribute("d", PAUSE); }
          else { m.pause(); ic.firstChild.setAttribute("d", PLAY); }
        });
        var scrubbing = false;
        scrub.addEventListener("input", function () {
          scrubbing = true;
          if (m.duration) m.currentTime = scrub.value / 1000 * m.duration;
        });
        scrub.addEventListener("change", function () { scrubbing = false; });
        setInterval(function () {
          if (!m.duration) return;
          if (!scrubbing) scrub.value = m.currentTime / m.duration * 1000;
          time.textContent = fmt(m.currentTime) + " / " + fmt(m.duration);
          ic.firstChild.setAttribute("d", m.paused ? PLAY : PAUSE);
        }, 250);
      }

      /* ---- authoring mode: open vr-vaunt.html?author, tap the scene,
             and the exact { yaw, pitch, t } config is logged + copied ---- */
      if (new URLSearchParams(location.search).has("author")) {
        var hint = document.getElementById("vrHint");
        hint.innerHTML = "<b>Authoring:</b> tap anything in the scene to copy its position for a hotspot";
        var downAt = null;
        var cv = document.getElementById("vrCanvas");
        cv.addEventListener("pointerdown", function (e) { downAt = [e.clientX, e.clientY]; });
        cv.addEventListener("pointerup", function (e) {
          if (!downAt || Math.hypot(e.clientX - downAt[0], e.clientY - downAt[1]) > 6) return;
          var p = viewer.pick(e.clientX, e.clientY);
          var line = '{ yaw: ' + p.yaw + ', pitch: ' + p.pitch + ', from: ' + p.t + ', label: "…", href: "…" },';
          console.log("VR SPOT:", line);
          if (navigator.clipboard) navigator.clipboard.writeText(line).catch(function(){});
          hint.innerHTML = "Copied: <b>yaw " + p.yaw + "° · pitch " + p.pitch + "° · t " + p.t + "s</b>";
        });
      }
    })();
  </script>
</body>
</html>
