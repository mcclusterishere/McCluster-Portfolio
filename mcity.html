<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>M City — the open world · M Network</title>
  <meta name="description" content="M City: the open-world game where the missions are real. Play a track, close a deal, claim your back end — real-life moves unlock the map, pay tokens, and build your rank.">
  <meta name="robots" content="noindex,follow">
  <link rel="icon" type="image/png" href="assets/img/m-mark.png">
  <link rel="preload" href="assets/fonts/anton-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=__STAMP__">
  <style>
    html, body { overscroll-behavior: none; }
    body { background: #0a0807; overflow: hidden; }
    .mc { position: fixed; inset: 0; }
    #mcCv { display: block; width: 100%; height: 100%; touch-action: none; }

    /* HUD: the living wallet */
    .mc__hud { position: fixed; top: calc(0.7rem + env(safe-area-inset-top)); left: 0.8rem; right: 0.8rem; z-index: 40;
      display: flex; align-items: center; gap: 0.7rem; pointer-events: none; }
    .mc__brand { display: flex; align-items: center; gap: 0.45rem; background: rgba(12,9,8,0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(244,239,230,0.16); border-radius: 100px; padding: 0.4rem 0.9rem 0.4rem 0.5rem; pointer-events: auto; }
    .mc__brand img { width: 22px; }
    .mc__brand b { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 0.95rem; letter-spacing: 0.06em; }
    .mc__stats { margin-left: auto; display: flex; gap: 0.45rem; }
    .mc__stat { background: rgba(12,9,8,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(244,239,230,0.16);
      border-radius: 100px; padding: 0.4rem 0.85rem; font-size: 0.66rem; font-weight: 800; color: var(--cream); }
    .mc__stat small { color: var(--cream-dim); font-weight: 700; letter-spacing: 0.1em; margin-right: 0.35em; }
    .mc__hint { position: fixed; bottom: calc(5.6rem + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      z-index: 40; background: rgba(12,9,8,0.88); border: 1px solid rgba(244,239,230,0.18); border-radius: 100px;
      padding: 0.5rem 1.2rem; font-size: 0.7rem; color: var(--cream-dim); pointer-events: none; white-space: nowrap;
      transition: opacity 0.4s; }
    .mc__hint b { color: var(--cream); }

    /* the mission sheet */
    .mc__veil { position: fixed; inset: 0; background: rgba(5,4,3,0.72); backdrop-filter: blur(4px); opacity: 0;
      pointer-events: none; transition: opacity 0.25s; z-index: 110; }
    .mc__sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 120; max-width: 32rem; margin: 0 auto;
      background: #14100e; border: 1px solid rgba(244,239,230,0.16); border-bottom: 0; border-radius: 22px 22px 0 0;
      padding: 1.2rem 1.3rem calc(1.6rem + env(safe-area-inset-bottom)); transform: translateY(105%);
      transition: transform 0.32s cubic-bezier(0.2,0.9,0.2,1); max-height: 80dvh; overflow-y: auto; }
    body.mc-open .mc__veil { opacity: 1; pointer-events: auto; }
    body.mc-open .mc__sheet { transform: translateY(0); }
    .mc__x { position: absolute; top: 0.8rem; right: 1rem; width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid rgba(244,239,230,0.25); background: rgba(10,8,7,0.6); color: var(--cream-dim); font: inherit; cursor: pointer; }
    .mc__sheet .k { font-size: 0.56rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--dc, var(--ruby-hot)); font-weight: 800; }
    .mc__sheet h2 { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 1.5rem; margin-top: 0.2rem; }
    .mc__sheet .d { color: var(--cream-dim); font-size: 0.82rem; line-height: 1.6; margin-top: 0.4rem; }
    .mc__ms { display: grid; gap: 0.5rem; margin-top: 1rem; }
    .mc__m { display: flex; align-items: center; gap: 0.7rem; border: 1px solid rgba(244,239,230,0.13);
      border-radius: 12px; padding: 0.7rem 0.85rem; text-decoration: none; color: var(--cream); }
    .mc__m.is-done { border-color: rgba(47,191,113,0.55); background: rgba(47,191,113,0.06); }
    .mc__m-ic { flex: none; width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
      border: 1.5px solid var(--dc, var(--ruby-hot)); color: var(--dc, var(--ruby-hot)); font-size: 0.8rem; font-weight: 800; }
    .mc__m.is-done .mc__m-ic { border-color: #2fbf71; color: #2fbf71; }
    .mc__m-mid { flex: 1; min-width: 0; }
    .mc__m-mid b { display: block; font-size: 0.84rem; }
    .mc__m-mid small { display: block; color: var(--cream-dim); font-size: 0.66rem; margin-top: 0.15rem; line-height: 1.45; }
    .mc__m-go { flex: none; font-size: 0.62rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dc, var(--ruby-hot)); }
    .mc__locknote { margin-top: 0.9rem; border: 1px dashed rgba(216,186,124,0.5); border-radius: 12px;
      background: rgba(216,186,124,0.06); padding: 0.8rem 0.95rem; font-size: 0.78rem; line-height: 1.6; color: var(--cream-dim); }
    .mc__locknote b { color: #d8ba7c; }
  </style>
</head>
<body>
  <div class="mc"><canvas id="mcCv"></canvas></div>

  <div class="mc__hud">
    <span class="mc__brand"><img src="assets/img/m-mark.png" alt="M"><b>M City</b></span>
    <span class="mc__stats">
      <span class="mc__stat"><small>REP</small><span id="mcRep">0</span></span>
      <span class="mc__stat"><small>DISTRICTS</small><span id="mcDist">1/6</span></span>
    </span>
  </div>
  <p class="mc__hint" id="mcHint"><b>Drive with WASD / arrows</b> · tap where you want to go · pull up to a lit door</p>

  <div class="mc__veil" id="mcVeil"></div>
  <div class="mc__sheet" id="mcSheet" role="dialog" aria-modal="true">
    <button class="mc__x" id="mcX" type="button" aria-label="Close">✕</button>
    <p class="k" id="shK"></p>
    <h2 id="shName"></h2>
    <p class="d" id="shDesc"></p>
    <div class="mc__ms" id="shMs"></div>
    <div id="shLock"></div>
  </div>

  <script src="js/analytics.js?v=__STAMP__"></script>
  <script src="js/mgrind.js?v=__STAMP__"></script>
  <script src="js/polish.js?v=__STAMP__"></script>
  <script src="js/heat.js?v=__STAMP__"></script>
  <script>
    (function () {
      "use strict";
      function $(id) { return document.getElementById(id); }
      function esc(s) { var d = document.createElement("i"); d.textContent = s == null ? "" : s; return d.innerHTML; }
      function track(n, p) { if (window.MCC_TRACK) window.MCC_TRACK(n, p); }
      function J(k, fb) { try { return JSON.parse(localStorage.getItem(k)) || fb; } catch (e) { return fb; } }

      /* ---------- the real world feeding the game world ----------
         Missions are REAL moves on the platform. The game reads the same
         stores the engines write — nothing here is game-only make-believe. */
      function worldState() {
        var plays = J("mcc_plays_v1", {}); var playN = 0;
        for (var k in plays) playN += plays[k];
        var hid = J("mcc_plays_hid_v1", {});
        for (var k2 in hid) playN += hid[k2];
        var claims = J("mcc_claimrun_v1", {}); var claimN = Object.keys(claims).length;
        var psmf = J("mcc_psmf_game", { cp: 0 });
        var grind = {}; try { grind = window.MCC_GRIND ? window.MCC_GRIND.state() : {}; } catch (e) {}
        var entered = localStorage.getItem("mcc_app_entered") === "1";
        var visited = J("mcc_mcity_v1", {});
        return { playN: playN, claimN: claimN, cp: psmf.cp || 0, streak: grind.streak || 0,
          E: grind.E || 0, entered: entered, visited: visited };
      }
      function rep(w) { return w.playN * 2 + w.claimN * 15 + w.cp + Math.round(w.E) + w.streak * 5; }

      /* ---------- the city ---------- */
      var DISTRICTS = [
        { id: "studio", name: "The Studio", k: "Music district", c: "#e5383b", x: 300, y: 260, w: 200, h: 150,
          desc: "Where the records live. Every play in the real app is a mission tick here.",
          unlock: function () { return true; }, lockLine: "",
          missions: function (w) { return [
            ["Play 3 tracks in the music house", w.playN >= 3, "app.html#music", "Plays counted: " + w.playN],
            ["Ride the Please Set Me Free run", w.cp >= 10, "song-please-set-me-free.html", "Civic points: " + w.cp],
            ["Run up 10 total plays", w.playN >= 10, "app.html#music", "The Heat is watching"],
          ]; } },
        { id: "exchange", name: "The Exchange", k: "Market district", c: "#00c805", x: 700, y: 220, w: 220, h: 170,
          desc: "The floor that never sleeps. Deals, tickers, the whole economy.",
          unlock: function (w) { return w.playN >= 3; }, lockLine: "Play 3 tracks in the Studio to unlock the Exchange.",
          missions: function (w) { return [
            ["Walk the floor — open a ticker", !!w.visited.exchange_floor, "market.html#floor", "See how the whole city trades"],
            ["Send or request money on the keypad", !!w.visited.exchange_pay, "market.html#pay", "Name a price, pick a person"],
            ["Claim your own ticker", !!w.visited.exchange_claim, "profile.html", "Run your own symbol"],
          ]; } },
        { id: "bureau", name: "The Bureau", k: "Street Credit Bureau", c: "#d8ba7c", x: 520, y: 520, w: 180, h: 140,
          desc: "The institution. Your books, your dial, your record — kept by you.",
          unlock: function (w) { return w.cp >= 10; }, lockLine: "Score 10 civic points on the Please Set Me Free ride to unlock the Bureau.",
          missions: function (w) { return [
            ["Open your file at the Bureau", !!w.visited.bureau_file, "market.html#scb", "The dial reads your books"],
            ["Read the white paper", !!w.visited.bureau_paper, "scb-paper.html", "The model behind the institution"],
          ]; } },
        { id: "backlots", name: "The Back Lots", k: "The claim run", c: "#8b5cf6", x: 150, y: 560, w: 210, h: 150,
          desc: "Every door in the industry with somebody else's name on it — until you run the claim run.",
          unlock: function (w) { return w.playN >= 1; }, lockLine: "Play one track anywhere to wake the Back Lots.",
          missions: function (w) { return [
            ["Make 3 claim-run moves", w.claimN >= 3, "backend.html", "Moves made: " + w.claimN],
            ["Hit Keyholder on the run", w.claimN >= 6, "backend.html", "Own your back end"],
            ["Reach Operator — the run pays 5 tokens", w.claimN >= 14, "backend.html", "The city pays real credit"],
          ]; } },
        { id: "cityhall", name: "City Hall", k: "Equity Uprise", c: "#2f9e62", x: 900, y: 540, w: 190, h: 160,
          desc: "The civic wing. The movement runs on the record — dockets, polls, the fellowship.",
          unlock: function (w) { return w.cp >= 30; }, lockLine: "30 civic points on the ride unlocks City Hall.",
          missions: function (w) { return [
            ["Enter the evidence room", !!w.visited.hall_docket, "docket-516.html", "The public record, exhibit by exhibit"],
            ["Visit the Equity Uprise page", !!w.visited.hall_eu, "equity-uprise.html", "$EU trades on this city's floor"],
          ]; } },
        { id: "vault", name: "The Vault", k: "The M Chain", c: "#45b6ff", x: 1090, y: 260, w: 170, h: 140,
          desc: "The cryptographic record. Everything this city makes, hashed and chained.",
          unlock: function (w) { return w.claimN >= 6; }, lockLine: "Reach Keyholder on the claim run to open the Vault.",
          missions: function (w) { return [
            ["Verify the chain in your own browser", !!w.visited.vault_verify, "chain.html", "Don't trust — verify"],
          ]; } },
      ];
      /* out-going doors mark themselves visited so missions complete on return */
      var DOOR_KEYS = { "market.html#floor": "exchange_floor", "market.html#pay": "exchange_pay", "profile.html": "exchange_claim",
        "market.html#scb": "bureau_file", "scb-paper.html": "bureau_paper", "docket-516.html": "hall_docket",
        "equity-uprise.html": "hall_eu", "chain.html": "vault_verify" };

      /* ---------- the engine: a small honest top-down city ---------- */
      var cv = $("mcCv"), cx = cv.getContext("2d");
      var W = 1400, H = 900; // world units
      var player = J("mcc_mcity_pos", { x: 430, y: 430 });
      var target = null, keys = {}, nearDoor = null, tPrev = 0;
      var dpr = 1, scale = 1, offX = 0, offY = 0;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        cv.width = innerWidth * dpr; cv.height = innerHeight * dpr;
        scale = Math.max(innerWidth / W, innerHeight / H) * 1.15;
      }
      window.addEventListener("resize", resize); resize();

      addEventListener("keydown", function (e) { keys[e.key.toLowerCase()] = true; if (e.key === "Enter" && nearDoor) openDistrict(nearDoor); });
      addEventListener("keyup", function (e) { keys[e.key.toLowerCase()] = false; });
      cv.addEventListener("pointerdown", function (e) {
        var r = cv.getBoundingClientRect();
        target = {
          x: (e.clientX - r.left) * dpr / scale + offX,
          y: (e.clientY - r.top) * dpr / scale + offY,
        };
      });

      function step(dt) {
        var sp = 0.32 * dt;
        var dx = 0, dy = 0;
        if (keys.w || keys.arrowup) dy -= 1;
        if (keys.s || keys.arrowdown) dy += 1;
        if (keys.a || keys.arrowleft) dx -= 1;
        if (keys.d || keys.arrowright) dx += 1;
        if (dx || dy) { target = null; var n = Math.hypot(dx, dy); player.x += dx / n * sp; player.y += dy / n * sp; }
        else if (target) {
          var tx = target.x - player.x, ty = target.y - player.y, d = Math.hypot(tx, ty);
          if (d < 6) target = null;
          else { player.x += tx / d * sp; player.y += ty / d * sp; }
        }
        player.x = Math.max(30, Math.min(W - 30, player.x));
        player.y = Math.max(30, Math.min(H - 30, player.y));
        // buildings are solid — slide off their walls
        DISTRICTS.forEach(function (b) {
          if (player.x > b.x - 16 && player.x < b.x + b.w + 16 && player.y > b.y - 16 && player.y < b.y + b.h + 16) {
            var l = player.x - (b.x - 16), r2 = (b.x + b.w + 16) - player.x,
                t2 = player.y - (b.y - 16), bo = (b.y + b.h + 16) - player.y;
            var m = Math.min(l, r2, t2, bo);
            if (m === l) player.x = b.x - 16; else if (m === r2) player.x = b.x + b.w + 16;
            else if (m === t2) player.y = b.y - 16; else player.y = b.y + b.h + 16;
          }
        });
        // door proximity: each building's door is mid-bottom
        nearDoor = null;
        DISTRICTS.forEach(function (b) {
          var doorX = b.x + b.w / 2, doorY = b.y + b.h + 16;
          if (Math.hypot(player.x - doorX, player.y - doorY) < 42) nearDoor = b;
        });
        var w = WORLD;
        $("mcHint").innerHTML = nearDoor
          ? (nearDoor.unlock(w) ? "<b>" + esc(nearDoor.name) + "</b> · tap the door / press Enter" : "<b>" + esc(nearDoor.name) + "</b> · 🔒 locked — tap to see the key")
          : "<b>Drive with WASD / arrows</b> · tap where you want to go · pull up to a lit door";
        try { localStorage.setItem("mcc_mcity_pos", JSON.stringify(player)); } catch (e) {}
      }

      function draw(now) {
        var dt = Math.min(40, now - tPrev || 16); tPrev = now;
        step(dt);
        offX = player.x - (cv.width / scale) / 2; offY = player.y - (cv.height / scale) / 2;
        offX = Math.max(0, Math.min(W - cv.width / scale, offX));
        offY = Math.max(0, Math.min(H - cv.height / scale, offY));
        cx.setTransform(scale, 0, 0, scale, -offX * scale, -offY * scale);
        // the ground
        cx.fillStyle = "#141010"; cx.fillRect(offX, offY, cv.width / scale, cv.height / scale);
        // streets: a loose grid
        cx.strokeStyle = "#241c18"; cx.lineWidth = 46; cx.lineCap = "round";
        [[60, 430, 1340, 430], [430, 60, 430, 840], [980, 60, 980, 840], [60, 720, 1340, 720], [60, 140, 1340, 140]].forEach(function (s) {
          cx.beginPath(); cx.moveTo(s[0], s[1]); cx.lineTo(s[2], s[3]); cx.stroke();
        });
        cx.strokeStyle = "rgba(244,239,230,0.14)"; cx.lineWidth = 2; cx.setLineDash([14, 18]);
        [[60, 430, 1340, 430], [430, 60, 430, 840], [980, 60, 980, 840], [60, 720, 1340, 720], [60, 140, 1340, 140]].forEach(function (s) {
          cx.beginPath(); cx.moveTo(s[0], s[1]); cx.lineTo(s[2], s[3]); cx.stroke();
        });
        cx.setLineDash([]);
        var w = WORLD;
        // the districts
        DISTRICTS.forEach(function (b) {
          var open = b.unlock(w);
          cx.fillStyle = open ? "#1d1613" : "#15100d";
          cx.strokeStyle = open ? b.c : "rgba(244,239,230,0.14)";
          cx.lineWidth = 3;
          cx.beginPath(); cx.roundRect(b.x, b.y, b.w, b.h, 14); cx.fill(); cx.stroke();
          if (open) { cx.save(); cx.shadowColor = b.c; cx.shadowBlur = 26; cx.stroke(); cx.restore(); }
          // the door
          var doorX = b.x + b.w / 2;
          cx.fillStyle = open ? b.c : "rgba(244,239,230,0.2)";
          cx.fillRect(doorX - 14, b.y + b.h - 5, 28, 10);
          // the name
          cx.fillStyle = open ? "#f4efe6" : "rgba(244,239,230,0.35)";
          cx.font = "700 17px system-ui";
          cx.textAlign = "center";
          cx.fillText((open ? "" : "🔒 ") + b.name, b.x + b.w / 2, b.y + b.h / 2 + 3);
          cx.fillStyle = open ? b.c : "rgba(244,239,230,0.25)";
          cx.font = "800 9px system-ui";
          cx.fillText(b.k.toUpperCase(), b.x + b.w / 2, b.y + b.h / 2 + 22);
        });
        // the player: the M whip
        cx.save();
        cx.translate(player.x, player.y);
        cx.fillStyle = "#e5383b";
        cx.shadowColor = "#e5383b"; cx.shadowBlur = 18;
        cx.beginPath(); cx.roundRect(-13, -8, 26, 16, 6); cx.fill();
        cx.shadowBlur = 0;
        cx.fillStyle = "#f4efe6"; cx.font = "800 11px system-ui"; cx.textAlign = "center";
        cx.fillText("M", 0, 4);
        cx.restore();
        requestAnimationFrame(draw);
      }

      /* ---------- the mission sheet ---------- */
      function openDistrict(b) {
        var w = WORLD;
        var open = b.unlock(w);
        document.documentElement.style.setProperty("--dc", b.c);
        $("mcSheet").style.setProperty("--dc", b.c);
        $("shK").textContent = b.k; $("shK").style.color = b.c;
        $("shName").textContent = b.name;
        $("shDesc").textContent = b.desc;
        if (!open) {
          $("shMs").innerHTML = "";
          $("shLock").innerHTML = '<div class="mc__locknote"><b>🔒 District locked.</b> ' + esc(b.lockLine) +
            " Every key is a real move on the platform — the city only opens for work.</div>";
        } else {
          $("shLock").innerHTML = "";
          $("shMs").innerHTML = b.missions(w).map(function (m) {
            var visitKey = DOOR_KEYS[m[2]];
            return '<a class="mc__m' + (m[1] ? " is-done" : "") + '" href="' + esc(m[2]) + '"' +
              (visitKey ? ' data-visit="' + visitKey + '"' : "") + ' style="--dc:' + b.c + '">' +
              '<span class="mc__m-ic">' + (m[1] ? "✓" : "!") + "</span>" +
              '<span class="mc__m-mid"><b>' + esc(m[0]) + "</b><small>" + esc(m[3]) + "</small></span>" +
              '<span class="mc__m-go">' + (m[1] ? "done" : "go &#8594;") + "</span></a>";
          }).join("");
          $("shMs").querySelectorAll("[data-visit]").forEach(function (a) {
            a.addEventListener("click", function () {
              var v = J("mcc_mcity_v1", {});
              v[a.getAttribute("data-visit")] = 1;
              try { localStorage.setItem("mcc_mcity_v1", JSON.stringify(v)); } catch (e) {}
            });
          });
        }
        document.body.classList.add("mc-open");
        track("mcity_district", { d: b.id, open: open });
      }
      $("mcVeil").addEventListener("click", function () { document.body.classList.remove("mc-open"); });
      $("mcX").addEventListener("click", function () { document.body.classList.remove("mc-open"); });
      cv.addEventListener("pointerup", function (e) {
        if (nearDoor) {
          var r = cv.getBoundingClientRect();
          var wx = (e.clientX - r.left) * dpr / scale + offX, wy = (e.clientY - r.top) * dpr / scale + offY;
          var b = nearDoor;
          var doorX = b.x + b.w / 2, doorY = b.y + b.h + 10;
          if (Math.hypot(wx - doorX, wy - doorY) < 70) { target = null; openDistrict(b); }
        }
      });

      /* ---------- HUD ---------- */
      var WORLD = worldState();
      function refreshHUD() {
        WORLD = worldState();
        $("mcRep").textContent = rep(WORLD).toLocaleString();
        $("mcDist").textContent = DISTRICTS.filter(function (b) { return b.unlock(WORLD); }).length + "/" + DISTRICTS.length;
      }
      refreshHUD();
      setInterval(refreshHUD, 4000);
      document.addEventListener("visibilitychange", function () { if (!document.hidden) refreshHUD(); });

      requestAnimationFrame(draw);
      track("mcity_view", { rep: rep(WORLD) });
    })();
  </script>
</body>
</html>
