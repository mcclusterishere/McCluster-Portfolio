  <style>
    html, body { overscroll-behavior: none; }
    body { background: #0a0807; overflow: hidden; }
    .mc { position: fixed; inset: 0; }
    #mcCv { display: block; width: 100%; height: 100%; touch-action: none; }

    /* ---- the door: you ENTER this city ---- */
    .mc__door { position: fixed; inset: 0; z-index: 300; display: grid; place-items: center;
      background: rgba(8, 6, 5, 0.94); backdrop-filter: blur(8px); transition: opacity 0.5s; }
    .mc__door.is-gone { opacity: 0; pointer-events: none; }
    .mc__door-in { text-align: center; max-width: 26rem; padding: 1.5rem; }
    .mc__door-in img { width: 60px; margin-bottom: 0.8rem; filter: drop-shadow(0 0 18px rgba(229,56,59,0.7)); }
    .mc__door-in h1 { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 2.6rem; line-height: 0.95; }
    .mc__door-in .tag { color: #d8ba7c; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 800; margin-top: 0.4rem; }
    .mc__door-in p { color: var(--cream-dim); font-size: 0.85rem; line-height: 1.65; margin: 0.9rem 0 0; }
    .mc__door-in p b { color: var(--cream); }
    .mc__ctl { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .mc__ctl span { border: 1px solid rgba(244,239,230,0.25); border-radius: 10px; padding: 0.5em 0.9em;
      font-size: 0.68rem; color: var(--cream-dim); }
    .mc__ctl b { color: var(--cream); }

    /* ---- HUD ---- */
    .mc__hud { position: fixed; top: calc(0.7rem + env(safe-area-inset-top)); left: 0.8rem; right: 0.8rem; z-index: 40;
      display: flex; align-items: center; gap: 0.5rem; pointer-events: none; }
    .mc__brand { display: flex; align-items: center; gap: 0.45rem; background: rgba(12,9,8,0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(244,239,230,0.16); border-radius: 100px; padding: 0.4rem 0.9rem 0.4rem 0.5rem; }
    .mc__brand img { width: 20px; }
    .mc__brand b { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.06em; }
    .mc__stats { margin-left: auto; display: flex; gap: 0.4rem; }
    .mc__stat { background: rgba(12,9,8,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(244,239,230,0.16);
      border-radius: 100px; padding: 0.4rem 0.8rem; font-size: 0.62rem; font-weight: 800; color: var(--cream); white-space: nowrap; }
    .mc__stat small { color: var(--cream-dim); font-weight: 700; letter-spacing: 0.08em; margin-right: 0.3em; }
    .mc__hint { position: fixed; bottom: calc(5.6rem + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      z-index: 40; background: rgba(12,9,8,0.88); border: 1px solid rgba(244,239,230,0.18); border-radius: 100px;
      padding: 0.5rem 1.2rem; font-size: 0.7rem; color: var(--cream-dim); pointer-events: none; white-space: nowrap; max-width: 92vw;
      overflow: hidden; text-overflow: ellipsis; }
    .mc__hint b { color: var(--cream); }

    /* the stick: thumb-driving for touch */
    .mc__stick { position: fixed; left: 1.1rem; bottom: calc(8.2rem + env(safe-area-inset-bottom)); z-index: 50;
      width: 108px; height: 108px; border-radius: 50%; border: 1.5px solid rgba(244,239,230,0.22);
      background: rgba(12,9,8,0.55); backdrop-filter: blur(6px); touch-action: none; display: none; }
    .mc__stick i { position: absolute; left: 50%; top: 50%; width: 46px; height: 46px; border-radius: 50%;
      background: rgba(229,56,59,0.75); box-shadow: 0 0 18px rgba(229,56,59,0.5); transform: translate(-50%, -50%); }
    @media (hover: none) { .mc__stick { display: block; } }

    /* ---- the mission sheet ---- */
    .mc__veil { position: fixed; inset: 0; background: rgba(5,4,3,0.72); backdrop-filter: blur(4px); opacity: 0;
      pointer-events: none; transition: opacity 0.25s; z-index: 110; }
    .mc__sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 120; max-width: 32rem; margin: 0 auto;
      background: #14100e; border: 1px solid rgba(244,239,230,0.16); border-bottom: 0; border-radius: 22px 22px 0 0;
      padding: 1.2rem 1.3rem calc(1.6rem + env(safe-area-inset-bottom)); transform: translateY(105%);
      transition: transform 0.32s cubic-bezier(0.2,0.9,0.2,1); max-height: 82dvh; overflow-y: auto; }
    body.mc-open .mc__veil { opacity: 1; pointer-events: auto; }
    body.mc-open .mc__sheet { transform: translateY(0); }
    .mc__x { position: absolute; top: 0.8rem; right: 1rem; width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid rgba(244,239,230,0.25); background: rgba(10,8,7,0.6); color: var(--cream-dim); font: inherit; cursor: pointer; }
    .mc__sheet .k { font-size: 0.56rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--dc, var(--ruby-hot)); font-weight: 800; }
    .mc__sheet h2 { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 1.5rem; margin-top: 0.2rem; }
    .mc__sheet .d { color: var(--cream-dim); font-size: 0.82rem; line-height: 1.6; margin-top: 0.4rem; }
    .mc__arc { margin-top: 0.9rem; font-size: 0.58rem; letter-spacing: 0.24em; text-transform: uppercase; color: #d8ba7c; font-weight: 800; }
    .mc__ms { display: grid; gap: 0.5rem; margin-top: 0.6rem; }
    .mc__m { display: flex; align-items: center; gap: 0.7rem; border: 1px solid rgba(244,239,230,0.13);
      border-radius: 12px; padding: 0.7rem 0.85rem; text-decoration: none; color: var(--cream); }
    .mc__m.is-done { border-color: rgba(47,191,113,0.55); background: rgba(47,191,113,0.06); }
    .mc__m.is-locked { opacity: 0.45; pointer-events: none; }
    .mc__m-ic { flex: none; width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
      border: 1.5px solid var(--dc, var(--ruby-hot)); color: var(--dc, var(--ruby-hot)); font-size: 0.8rem; font-weight: 800; }
    .mc__m.is-done .mc__m-ic { border-color: #2fbf71; color: #2fbf71; }
    .mc__m-mid { flex: 1; min-width: 0; }
    .mc__m-mid b { display: block; font-size: 0.84rem; }
    .mc__m-mid small { display: block; color: var(--cream-dim); font-size: 0.66rem; margin-top: 0.15rem; line-height: 1.45; }
    .mc__m-go { flex: none; font-size: 0.62rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dc, var(--ruby-hot)); }
    .mc__locknote { margin-top: 0.9rem; border: 1px dashed rgba(216,186,124,0.5); border-radius: 12px;
      background: rgba(216,186,124,0.06); padding: 0.8rem 0.95rem; font-size: 0.78rem; line-height: 1.6; color: var(--cream-dim); }
    .mc__locknote b { color: #d8ba7c; }
  </style>
</head>

  <script src="js/analytics.js?v=__STAMP__"></script>

  <script>
    (function () {
      "use strict";
      function $(id) { return document.getElementById(id); }
      function esc(s) { var d = document.createElement("i"); d.textContent = s == null ? "" : s; return d.innerHTML; }
      function track(n, p) { if (window.MCC_TRACK) window.MCC_TRACK(n, p); }
      function J(k, fb) { try { return JSON.parse(localStorage.getItem(k)) || fb; } catch (e) { return fb; } }

      /* ---------- the real world feeding the game ---------- */
      function worldState() {
        var plays = J("mcc_plays_v1", {}); var playN = 0;
        for (var k in plays) playN += plays[k];
        var hid = J("mcc_plays_hid_v1", {});
        for (var k2 in hid) playN += hid[k2];
        var claims = J("mcc_claimrun_v1", {}); var claimN = Object.keys(claims).length;
        var psmf = J("mcc_psmf_game", { cp: 0 });
        var grind = {}; try { grind = window.MCC_GRIND ? window.MCC_GRIND.state() : {}; } catch (e) {}
        return { playN: playN, claimN: claimN, cp: psmf.cp || 0, streak: grind.streak || 0,
          E: grind.E || 0, v: J("mcc_mcity_v1", {}) };
      }
      function rep(w) {
        var visits = Object.keys(w.v).length;
        return w.playN * 2 + w.claimN * 15 + w.cp + Math.round(w.E) + w.streak * 5 + visits * 8;
      }
      var RANKS = [[0, "Visitor"], [60, "Resident"], [160, "Runner"], [320, "Operator"], [560, "Boss"], [900, "Mayor"]];
      function rankOf(r) { var out = RANKS[0]; RANKS.forEach(function (x) { if (r >= x[0]) out = x; }); return out[1]; }

      /* ---------- nine districts, real arcs ----------
         Mission: [title, doneCondition, href, flavor]. Arcs run in order —
         a mission stays dark until the one before it is done. */
      var D = [
        { id: "studio", name: "The Studio", k: "Music district", arc: "ARC · THE SOUND", c: "#e5383b", x: 300, y: 240, w: 200, h: 150,
          desc: "Where the records live. The booth is open — the city hears everything you play.",
          unlock: function () { return true; }, lockLine: "",
          missions: function (w) { return [
            ["First spin", w.playN >= 1, "app.html#music", "Play one record in the music house. The Heat hears it."],
            ["Three deep", w.playN >= 3, "app.html#music", "Three plays. The tape starts moving. (" + w.playN + " so far)"],
            ["Study the charts", !!w.v.studio_heat, "app.html#music", "Watch The Heat — see what the whole city runs back."],
            ["Heavy rotation", w.playN >= 10, "app.html#music", "Ten total plays. Now the Exchange takes your calls."],
          ]; } },
        { id: "lot", name: "The Lot", k: "Whip Equipped", arc: "ARC · DEALER PLATES", c: "#ff7a00", x: 640, y: 180, w: 200, h: 140,
          desc: "Dealer plates on everything. The series, the films, the jet — the come-up on wheels.",
          unlock: function (w) { return w.playN >= 1; }, lockLine: "One play in the Studio starts the engine.",
          missions: function (w) { return [
            ["Episode one", !!w.v.lot_a, "song-dealer-plates.html", "Ride the A-side with the bars on screen."],
            ["The B-side film", !!w.v.lot_b, "song-dealer-plates-b.html", "The scene-by-scene ride. Watch the cut."],
            ["Board the jet", !!w.v.lot_jet, "vr-vaunt.html", "The 360 cabin. Stand in it, look around, land it."],
          ]; } },
        { id: "exchange", name: "The Exchange", k: "The market floor", arc: "ARC · THE COME-UP", c: "#00c805", x: 1000, y: 220, w: 220, h: 170,
          desc: "The floor that never sleeps. Everybody in this city trades on their own name.",
          unlock: function (w) { return w.playN >= 3; }, lockLine: "Three plays in the Studio and the floor opens.",
          missions: function (w) { return [
            ["Walk the floor", !!w.v.exchange_floor, "market.html#floor", "Open a ticker. Watch a chart breathe."],
            ["Touch the money", !!w.v.exchange_pay, "market.html#pay", "The keypad — name a price, pick a person."],
            ["Claim your name", !!w.v.exchange_claim, "profile.html", "Your own ticker on this floor. Claim it."],
            ["Watch the program run", !!w.v.exchange_eu, "market.html#floor", "$EU moves when the crowd moves. See a program trade."],
          ]; } },
        { id: "backlots", name: "The Back Lots", k: "The claim run", arc: "ARC · OWN YOUR BACK END", c: "#8b5cf6", x: 140, y: 540, w: 210, h: 150,
          desc: "Every door in the industry with somebody else's name on it — until you run the run.",
          unlock: function (w) { return w.playN >= 1; }, lockLine: "One play anywhere wakes the Back Lots.",
          missions: function (w) { return [
            ["Case the block", w.claimN >= 3, "backend.html", "Three claim-run moves. (" + w.claimN + " made)"],
            ["Keyholder", w.claimN >= 6, "backend.html", "Six moves. You can get in the building now."],
            ["Operator", w.claimN >= 14, "backend.html", "Fourteen moves — and the run pays 5 real tokens."],
          ]; } },
        { id: "bureau", name: "The Bureau", k: "Street Credit Bureau", arc: "ARC · THE DIAL", c: "#d8ba7c", x: 520, y: 500, w: 180, h: 140,
          desc: "The institution. Marble, gold, and a dial that only answers to your own books.",
          unlock: function (w) { return w.cp >= 10; }, lockLine: "Ten civic points on the Please Set Me Free ride open the Bureau.",
          missions: function (w) { return [
            ["Open your file", !!w.v.bureau_file, "market.html#scb", "The 300–850 dial, your five books, your next move."],
            ["Read the doctrine", !!w.v.bureau_paper, "scb-paper.html", "The white paper the whole institution stands on."],
            ["Check the vault door", !!w.v.vault_verify, "chain.html", "The Bureau's records are chained. Verify them yourself."],
          ]; } },
        { id: "cityhall", name: "City Hall", k: "The political district", arc: "ARC · THE DOCKET FILES", c: "#2f9e62", x: 880, y: 520, w: 200, h: 160,
          desc: "Power, paper, and the public record. Something's wrong in this city — and it's documented.",
          unlock: function (w) { return w.cp >= 10; }, lockLine: "Ten civic points on the ride get you past the front desk.",
          missions: function (w) { return [
            ["The tip", w.cp >= 10, "song-please-set-me-free.html", "The song is the testimony. Ride it — every bar is a case file."],
            ["Enter the evidence room", !!w.v.hall_docket, "docket-516.html", "Docket 516. The monopoles, the money, the record — exhibit by exhibit."],
            ["Follow the movement", !!w.v.hall_eu, "equity-uprise.html", "Equity Uprise — the org that took it to the record. $EU trades on this floor."],
            ["Deep testimony", w.cp >= 60, "song-please-set-me-free.html", "Sixty civic points. Deep mode. The full 36 bars on the record."],
            ["Take the oath", !!w.v.hall_fellow, "fellowship.html", "The Policy Fellowship — from witness to advocate."],
          ]; } },
        { id: "blocks", name: "The Blocks", k: "Spaces district", arc: "ARC · KEYS TO THE CITY", c: "#45b6ff", x: 320, y: 830, w: 220, h: 150,
          desc: "Studios, stages, rooms with a pulse — the real estate wing of the city.",
          unlock: function (w) { return !!w.v.exchange_floor; }, lockLine: "Walk the Exchange floor once and the Blocks open up.",
          missions: function (w) { return [
            ["Scout the rooms", !!w.v.blocks_browse, "spaces.html", "Walk the floor of rooms — studios, stages, the works."],
            ["Case a room", !!w.v.blocks_room, "spaces.html", "Open a room's scheduler. Dates, windows, rates."],
            ["Put YOUR name on a door", !!w.v.blocks_list, "list-your-space.html", "Got a room? List it. The city pays landlords too."],
          ]; } },
        { id: "tower", name: "The Tower", k: "The social district", arc: "ARC · THE FACE", c: "#f472b6", x: 900, y: 830, w: 180, h: 170,
          desc: "Every name in this city has a page in the Tower — the vibe, the feed, the supporters.",
          unlock: function (w) { return w.playN >= 3; }, lockLine: "Three plays and the Tower doorman knows your face.",
          missions: function (w) { return [
            ["Visit the penthouse", !!w.v.tower_page, "page.html?who=mccluster", "The flagship page — what a face in this city looks like."],
            ["Pick a side", !!w.v.tower_persona, "psychology-markers.html", "The duality scan — present, or lost in the scroll?"],
            ["Get on the door list", !!w.v.tower_onboard, "onboard.html", "Get on the platform — your own page, your own hustle."],
          ]; } },
        { id: "vault", name: "The Vault", k: "The M Chain", arc: "ARC · PROOF BEATS PROMISES", c: "#2aa8a0", x: 1280, y: 560, w: 170, h: 140,
          desc: "Under the city: every record, every badge, every master — hashed, chained, verifiable forever.",
          unlock: function (w) { return w.claimN >= 6; }, lockLine: "Keyholder on the claim run opens the Vault.",
          missions: function (w) { return [
            ["Verify the chain", !!w.v.vault_verify, "chain.html", "Your browser recomputes every hash. Don't trust — verify."],
            ["Read the doctrine", !!w.v.vault_paper, "scb-paper.html", "The blueprint, mapped to the city that built it."],
          ]; } },
      ];
      var DOOR_KEYS = {
        "app.html#music": "studio_heat",
        "song-dealer-plates.html": "lot_a", "song-dealer-plates-b.html": "lot_b", "vr-vaunt.html": "lot_jet",
        "market.html#floor": "exchange_floor", "market.html#pay": "exchange_pay", "profile.html": "exchange_claim",
        "market.html#scb": "bureau_file", "scb-paper.html": "bureau_paper",
        "docket-516.html": "hall_docket", "equity-uprise.html": "hall_eu", "fellowship.html": "hall_fellow",
        "spaces.html": "blocks_browse", "list-your-space.html": "blocks_list",
        "page.html?who=mccluster": "tower_page", "psychology-markers.html": "tower_persona", "onboard.html": "tower_onboard",
        "chain.html": "vault_verify",
      };
      // one visit can satisfy two flavors of the same door
      var TWINS = { blocks_browse: "blocks_room", exchange_floor: "exchange_eu" };

      /* ---------- engine ---------- */
      var cv = $("mcCv"), cx = cv.getContext("2d");
      var W = 1600, H = 1140;
      var STREETS = [[60, 430, 1540, 430], [60, 760, 1540, 760], [60, 120, 1540, 120], [60, 1060, 1540, 1060],
        [430, 60, 430, 1080], [820, 60, 820, 1080], [1200, 60, 1200, 1080]];
      var player = J("mcc_mcity_pos", { x: 430, y: 430 });
      var heading = 0, speed = 0;
      var target = null, keys = {}, stick = { x: 0, y: 0 }, nearDoor = null, tPrev = 0;
      var dpr = 1, scale = 1, offX = 0, offY = 0;
      var entered = false;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        cv.width = innerWidth * dpr; cv.height = innerHeight * dpr;
        scale = Math.max(innerWidth / W, innerHeight / H) * 1.35 * dpr;
      }
      window.addEventListener("resize", resize); resize();

      /* NPC traffic: the city drives itself */
      var NPC = [];
      for (var n = 0; n < 8; n++) {
        var s = STREETS[n % STREETS.length];
        NPC.push({ s: s, t: Math.random(), dir: n % 2 ? 1 : -1, sp: 0.00004 + Math.random() * 0.00005,
          c: ["#4a7fb5", "#6b7280", "#7c5c3e", "#3f6212"][n % 4] });
      }

      addEventListener("keydown", function (e) {
        keys[e.key.toLowerCase()] = true;
        if (e.key === "Enter" && nearDoor && entered) openDistrict(nearDoor);
      });
      addEventListener("keyup", function (e) { keys[e.key.toLowerCase()] = false; });
      cv.addEventListener("pointerdown", function (e) {
        if (!entered) return;
        var r = cv.getBoundingClientRect();
        target = { x: (e.clientX - r.left) * dpr / scale + offX, y: (e.clientY - r.top) * dpr / scale + offY };
      });
      cv.addEventListener("pointerup", function (e) {
        if (!entered || !nearDoor) return;
        var r = cv.getBoundingClientRect();
        var wx = (e.clientX - r.left) * dpr / scale + offX, wy = (e.clientY - r.top) * dpr / scale + offY;
        var b = nearDoor, doorX = b.x + b.w / 2, doorY = b.y + b.h + 10;
        if (Math.hypot(wx - doorX, wy - doorY) < 80) { target = null; openDistrict(b); }
      });

      /* the stick */
      (function () {
        var el = $("mcStick"), nub = $("mcStickNub"), on = false, cxp = 0, cyp = 0;
        el.addEventListener("pointerdown", function (e) {
          on = true; var r = el.getBoundingClientRect(); cxp = r.left + r.width / 2; cyp = r.top + r.height / 2;
          el.setPointerCapture(e.pointerId); move(e);
        });
        el.addEventListener("pointermove", move);
        el.addEventListener("pointerup", function () { on = false; stick.x = 0; stick.y = 0; nub.style.transform = "translate(-50%,-50%)"; });
        function move(e) {
          if (!on) return;
          var dx = e.clientX - cxp, dy = e.clientY - cyp, d = Math.hypot(dx, dy), m = Math.min(d, 38);
          if (d > 4) { stick.x = dx / d; stick.y = dy / d; target = null; } else { stick.x = 0; stick.y = 0; }
          nub.style.transform = "translate(calc(-50% + " + (d ? dx / d * m : 0) + "px), calc(-50% + " + (d ? dy / d * m : 0) + "px))";
        }
      })();

      function step(dt) {
        var maxSp = 0.34;
        var dx = 0, dy = 0;
        if (keys.w || keys.arrowup) dy -= 1;
        if (keys.s || keys.arrowdown) dy += 1;
        if (keys.a || keys.arrowleft) dx -= 1;
        if (keys.d || keys.arrowright) dx += 1;
        if (stick.x || stick.y) { dx = stick.x; dy = stick.y; }
        var want = 0;
        if (dx || dy) {
          target = null;
          heading = Math.atan2(dy, dx);
          want = maxSp;
        } else if (target) {
          var tx = target.x - player.x, ty = target.y - player.y, d = Math.hypot(tx, ty);
          if (d < 8) { target = null; }
          else { heading = Math.atan2(ty, tx); want = Math.min(maxSp, d / 90); }
        }
        // the whip eases in and brakes — it drives, it doesn't teleport
        speed += (want - speed) * Math.min(1, dt / 140);
        player.x += Math.cos(heading) * speed * dt;
        player.y += Math.sin(heading) * speed * dt;
        player.x = Math.max(30, Math.min(W - 30, player.x));
        player.y = Math.max(30, Math.min(H - 30, player.y));
        D.forEach(function (b) {
          if (player.x > b.x - 16 && player.x < b.x + b.w + 16 && player.y > b.y - 16 && player.y < b.y + b.h + 16) {
            var l = player.x - (b.x - 16), r2 = (b.x + b.w + 16) - player.x,
                t2 = player.y - (b.y - 16), bo = (b.y + b.h + 16) - player.y;
            var m = Math.min(l, r2, t2, bo);
            if (m === l) player.x = b.x - 16; else if (m === r2) player.x = b.x + b.w + 16;
            else if (m === t2) player.y = b.y - 16; else player.y = b.y + b.h + 16;
            speed *= 0.6;
          }
        });
        nearDoor = null;
        D.forEach(function (b) {
          var doorX = b.x + b.w / 2, doorY = b.y + b.h + 16;
          if (Math.hypot(player.x - doorX, player.y - doorY) < 46) nearDoor = b;
        });
        NPC.forEach(function (c) {
          c.t += c.sp * dt * c.dir;
          if (c.t > 1 || c.t < 0) { c.dir *= -1; c.t = Math.max(0, Math.min(1, c.t)); }
        });
        if (entered) {
          var w = WORLD;
          $("mcHint").innerHTML = nearDoor
            ? (nearDoor.unlock(w) ? "<b>" + esc(nearDoor.name) + "</b> · tap the door / press Enter"
              : "🔒 <b>" + esc(nearDoor.name) + "</b> · tap to see the key")
            : "<b>" + esc(rankOf(rep(w))) + "</b> in the city · find a lit door";
        }
        try { localStorage.setItem("mcc_mcity_pos", JSON.stringify(player)); } catch (e) {}
      }

      /* day/night: the city keeps the app's clock */
      var hour = new Date().getHours();
      var NIGHT = hour < 6 || hour >= 19;
      var GROUND = NIGHT ? "#131010" : "#1b1714";
      var ROAD = NIGHT ? "#231b17" : "#2a221d";

      function draw(now) {
        var dt = Math.min(40, now - tPrev || 16); tPrev = now;
        if (entered) step(dt);
        offX = player.x - (cv.width / scale) / 2; offY = player.y - (cv.height / scale) / 2;
        offX = Math.max(0, Math.min(W - cv.width / scale, offX));
        offY = Math.max(0, Math.min(H - cv.height / scale, offY));
        cx.setTransform(scale, 0, 0, scale, -offX * scale, -offY * scale);
        cx.fillStyle = GROUND; cx.fillRect(offX, offY, cv.width / scale, cv.height / scale);
        cx.strokeStyle = ROAD; cx.lineWidth = 48; cx.lineCap = "round";
        STREETS.forEach(function (s) { cx.beginPath(); cx.moveTo(s[0], s[1]); cx.lineTo(s[2], s[3]); cx.stroke(); });
        cx.strokeStyle = "rgba(244,239,230,0.13)"; cx.lineWidth = 2; cx.setLineDash([14, 18]);
        STREETS.forEach(function (s) { cx.beginPath(); cx.moveTo(s[0], s[1]); cx.lineTo(s[2], s[3]); cx.stroke(); });
        cx.setLineDash([]);
        // traffic
        NPC.forEach(function (c) {
          var x = c.s[0] + (c.s[2] - c.s[0]) * c.t, y = c.s[1] + (c.s[3] - c.s[1]) * c.t;
          var ang = Math.atan2((c.s[3] - c.s[1]) * c.dir, (c.s[2] - c.s[0]) * c.dir);
          cx.save(); cx.translate(x, y); cx.rotate(ang);
          cx.fillStyle = c.c; cx.beginPath(); cx.roundRect(-11, -6, 22, 12, 4); cx.fill();
          if (NIGHT) { cx.fillStyle = "rgba(255,240,180,0.8)"; cx.fillRect(9, -5, 3, 3); cx.fillRect(9, 2, 3, 3); }
          cx.restore();
        });
        var w = WORLD;
        D.forEach(function (b) {
          var open = b.unlock(w);
          cx.fillStyle = open ? (NIGHT ? "#1d1613" : "#241d18") : "#15100d";
          cx.strokeStyle = open ? b.c : "rgba(244,239,230,0.14)";
          cx.lineWidth = 3;
          cx.beginPath(); cx.roundRect(b.x, b.y, b.w, b.h, 14); cx.fill(); cx.stroke();
          if (open && NIGHT) { cx.save(); cx.shadowColor = b.c; cx.shadowBlur = 26; cx.stroke(); cx.restore(); }
          var doorX = b.x + b.w / 2;
          cx.fillStyle = open ? b.c : "rgba(244,239,230,0.2)";
          cx.fillRect(doorX - 14, b.y + b.h - 5, 28, 10);
          cx.fillStyle = open ? "#f4efe6" : "rgba(244,239,230,0.35)";
          cx.font = "700 17px system-ui"; cx.textAlign = "center";
          cx.fillText((open ? "" : "🔒 ") + b.name, b.x + b.w / 2, b.y + b.h / 2 + 3);
          cx.fillStyle = open ? b.c : "rgba(244,239,230,0.25)";
          cx.font = "800 9px system-ui";
          cx.fillText(b.k.toUpperCase(), b.x + b.w / 2, b.y + b.h / 2 + 22);
          // mission pips: green for done, district color for waiting
          if (open) {
            var ms = b.missions(w), doneN = ms.filter(function (m) { return m[1]; }).length;
            for (var i = 0; i < ms.length; i++) {
              cx.fillStyle = i < doneN ? "#2fbf71" : "rgba(244,239,230,0.25)";
              cx.beginPath(); cx.arc(b.x + 16 + i * 13, b.y + 14, 4, 0, 7); cx.fill();
            }
          }
        });
        // the whip: rotates into its heading, glows at speed
        cx.save();
        cx.translate(player.x, player.y);
        cx.rotate(heading);
        cx.fillStyle = "#e5383b";
        cx.shadowColor = "#e5383b"; cx.shadowBlur = 12 + speed * 40;
        cx.beginPath(); cx.roundRect(-14, -8, 28, 16, 6); cx.fill();
        cx.shadowBlur = 0;
        cx.fillStyle = "#0a0807"; cx.fillRect(2, -6, 7, 12); // windshield
        if (NIGHT) { cx.fillStyle = "rgba(255,240,180,0.9)"; cx.fillRect(12, -6, 3, 4); cx.fillRect(12, 2, 3, 4); }
        cx.restore();
        cx.setTransform(1, 0, 0, 1, 0, 0);
        cx.fillStyle = "#f4efe6"; cx.font = "800 " + 10 * dpr + "px system-ui"; cx.textAlign = "center";
        requestAnimationFrame(draw);
      }

      /* ---------- the mission sheet ---------- */
      function openDistrict(b) {
        var w = WORLD;
        var open = b.unlock(w);
        $("mcSheet").style.setProperty("--dc", b.c);
        $("shK").textContent = b.k; $("shK").style.color = b.c;
        $("shName").textContent = b.name;
        $("shDesc").textContent = b.desc;
        $("shArc").textContent = open ? b.arc : "";
        if (!open) {
          $("shMs").innerHTML = "";
          $("shLock").innerHTML = '<div class="mc__locknote"><b>🔒 District locked.</b> ' + esc(b.lockLine) +
            " Every key is a real move — the city only opens for work.</div>";
        } else {
          $("shLock").innerHTML = "";
          var prevDone = true;
          $("shMs").innerHTML = b.missions(w).map(function (m) {
            var locked = !prevDone && !m[1];
            var visitKey = DOOR_KEYS[m[2]];
            var row = '<a class="mc__m' + (m[1] ? " is-done" : "") + (locked ? " is-locked" : "") + '" href="' + esc(m[2]) + '"' +
              (visitKey ? ' data-visit="' + visitKey + '"' : "") + ' style="--dc:' + b.c + '">' +
              '<span class="mc__m-ic">' + (m[1] ? "✓" : locked ? "•" : "!") + "</span>" +
              '<span class="mc__m-mid"><b>' + esc(m[0]) + "</b><small>" + esc(m[3]) + "</small></span>" +
              '<span class="mc__m-go">' + (m[1] ? "done" : locked ? "" : "go &#8594;") + "</span></a>";
            prevDone = !!m[1];
            return row;
          }).join("");
          $("shMs").querySelectorAll("[data-visit]").forEach(function (a) {
            a.addEventListener("click", function () {
              var v = J("mcc_mcity_v1", {});
              var key = a.getAttribute("data-visit");
              v[key] = 1;
              if (TWINS[key] && v[key + "_seen"]) v[TWINS[key]] = 1; // second look completes the twin
              v[key + "_seen"] = 1;
              try { localStorage.setItem("mcc_mcity_v1", JSON.stringify(v)); } catch (e) {}
            });
          });
        }
        document.body.classList.add("mc-open");
        track("mcity_district", { d: b.id, open: open });
      }
      $("mcVeil").addEventListener("click", function () { document.body.classList.remove("mc-open"); });
      $("mcX").addEventListener("click", function () { document.body.classList.remove("mc-open"); });

      /* ---------- HUD + boot ---------- */
      var WORLD = worldState();
      function refreshHUD() {
        WORLD = worldState();
        var r = rep(WORLD);
        $("mcRep").textContent = r.toLocaleString();
        $("mcRank").textContent = rankOf(r);
        $("mcDist").textContent = D.filter(function (b) { return b.unlock(WORLD); }).length + "/" + D.length;
      }
      refreshHUD();
      setInterval(refreshHUD, 4000);
      document.addEventListener("visibilitychange", function () { if (!document.hidden) refreshHUD(); });

      var touch = matchMedia("(hover: none)").matches;
      $("mcCtl").innerHTML = touch
        ? "<span><b>Left thumb</b> · the stick drives</span><span><b>Tap</b> anywhere · drive there</span><span><b>Tap a lit door</b> · missions</span>"
        : "<span><b>WASD / arrows</b> · drive</span><span><b>Click</b> · drive there</span><span><b>Enter at a door</b> · missions</span>";
      $("mcEnter").addEventListener("click", function () {
        entered = true;
        $("mcDoor").classList.add("is-gone");
        setTimeout(function () { $("mcDoor").remove(); }, 600);
        track("mcity_enter", { rep: rep(WORLD), touch: touch });
      });

      requestAnimationFrame(draw);
      track("mcity_view", { rep: rep(WORLD) });
    })();
  </script>
</body>
</html>
