    /* ---- the door: you ENTER this city ---- */
    .mc__door { position: fixed; inset: 0; z-index: 300; display: grid; place-items: center;
      background: rgba(8, 6, 5, 0.94); backdrop-filter: blur(8px); transition: opacity 0.5s; }
    .mc__door.is-gone { opacity: 0; pointer-events: none; }
    .mc__door-in { text-align: center; max-width: 26rem; padding: 1.5rem; }

    .mc__door-in h1 { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 2.6rem; line-height: 0.95; }
    .mc__door-in .tag { color: #d8ba7c; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 800; margin-top: 0.4rem; }
    .mc__door-in p { color: var(--cream-dim); font-size: 0.85rem; line-height: 1.65; margin: 0.9rem 0 0; }

    .mc__ctl { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .mc__ctl span { border: 1px solid rgba(244,239,230,0.25); border-radius: 10px; padding: 0.5em 0.9em;
      font-size: 0.68rem; color: var(--cream-dim); }
    .mc__ctl b { color: var(--cream); }

    /* ---- HUD ---- */
    .mc__hud { position: fixed; top: calc(0.7rem + env(safe-area-inset-top)); left: 0.8rem; right: 0.8rem; z-index: 40;
      display: flex; align-items: center; gap: 0.5rem; pointer-events: none; }
    .mc__brand { display: flex; align-items: center; gap: 0.45rem; background: rgba(12,9,8,0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(244,239,230,0.16); border-radius: 100px; padding: 0.4rem 0.9rem 0.4rem 0.5rem; }
    .mc__brand img { width: 20px; }
    .mc__brand b { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.06em; }
    .mc__stats { margin-left: auto; display: flex; gap: 0.4rem; }
    .mc__stat { background: rgba(12,9,8,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(244,239,230,0.16);
      border-radius: 100px; padding: 0.4rem 0.8rem; font-size: 0.62rem; font-weight: 800; color: var(--cream); white-space: nowrap; }
    .mc__stat small { color: var(--cream-dim); font-weight: 700; letter-spacing: 0.08em; margin-right: 0.3em; }
    .mc__hint { position: fixed; bottom: calc(5.6rem + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      z-index: 40; background: rgba(12,9,8,0.88); border: 1px solid rgba(244,239,230,0.18); border-radius: 100px;
      padding: 0.5rem 1.2rem; font-size: 0.7rem; color: var(--cream-dim); pointer-events: none; white-space: nowrap; max-width: 92vw;
      overflow: hidden; text-overflow: ellipsis; }
    .mc__hint b { color: var(--cream); }

    /* the stick: thumb-driving for touch */
    .mc__stick { position: fixed; left: 1.1rem; bottom: calc(8.2rem + env(safe-area-inset-bottom)); z-index: 50;
      width: 108px; height: 108px; border-radius: 50%; border: 1.5px solid rgba(244,239,230,0.22);
      background: rgba(12,9,8,0.55); backdrop-filter: blur(6px); touch-action: none; display: none; }
    .mc__stick i { position: absolute; left: 50%; top: 50%; width: 46px; height: 46px; border-radius: 50%;

    @media (hover: none) { .mc__stick { display: block; } }

    /* ---- the mission sheet ---- */
    .mc__veil { position: fixed; inset: 0; background: rgba(5,4,3,0.45); backdrop-filter: blur(3px); opacity: 0;
      pointer-events: none; transition: opacity 0.25s; z-index: 110; }
    .mc__sheet { position: fixed; left: 0; right: 0; bottom: 0; z-index: 120; max-width: 32rem; margin: 0 auto;
      background: #14100e; border: 1px solid rgba(244,239,230,0.16); border-bottom: 0; border-radius: 22px 22px 0 0;
      padding: 1.2rem 1.3rem calc(1.6rem + var(--appbar-h, 3.7rem) + env(safe-area-inset-bottom)); transform: translateY(105%);
      transition: transform 0.32s cubic-bezier(0.2,0.9,0.2,1); max-height: 78dvh; overflow-y: auto; }
    body.mc-open .mc__veil { opacity: 1; pointer-events: auto; }

    .mc__sheet .k { font-size: 0.56rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--dc, var(--ruby-hot)); font-weight: 800; }
    .mc__sheet h2 { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 1.5rem; margin-top: 0.2rem; }
    .mc__sheet .d { color: var(--cream-dim); font-size: 0.82rem; line-height: 1.6; margin-top: 0.4rem; }
    .mc__arc { margin-top: 0.9rem; font-size: 0.58rem; letter-spacing: 0.24em; text-transform: uppercase; color: #d8ba7c; font-weight: 800; }
    .mc__ms { display: grid; gap: 0.5rem; margin-top: 0.6rem; }
    .mc__m { display: flex; align-items: center; gap: 0.7rem; border: 1px solid rgba(244,239,230,0.13);
      border-radius: 12px; padding: 0.7rem 0.85rem; text-decoration: none; color: var(--cream); }
    .mc__m.is-done { border-color: rgba(47,191,113,0.55); background: rgba(47,191,113,0.06); }
    .mc__m.is-locked { opacity: 0.45; pointer-events: none; }
    .mc__m-ic { flex: none; width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;

    .mc__m.is-done .mc__m-ic { border-color: #2fbf71; color: #2fbf71; }
    .mc__m-mid { flex: 1; min-width: 0; }
    .mc__m-mid b { display: block; font-size: 0.84rem; }
    .mc__m-mid small { display: block; color: var(--cream-dim); font-size: 0.66rem; margin-top: 0.15rem; line-height: 1.45; }
    .mc__m-go { flex: none; font-size: 0.62rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dc, var(--ruby-hot)); }
    .mc__locknote { margin-top: 0.9rem; border: 1px dashed rgba(216,186,124,0.5); border-radius: 12px;
      background: rgba(216,186,124,0.06); padding: 0.8rem 0.95rem; font-size: 0.78rem; line-height: 1.6; color: var(--cream-dim); }
    .mc__locknote b { color: #d8ba7c; }
    .mc__toast { position: fixed; top: calc(3.6rem + env(safe-area-inset-top)); left: 50%; transform: translate(-50%, -140%);
      z-index: 260; max-width: min(92vw, 26rem); border: 1px solid rgba(216,186,124,0.55); border-radius: 14px;
      background: rgba(16,12,10,0.96); color: var(--cream-dim); padding: 0.75rem 1rem; font-size: 0.8rem; line-height: 1.5;
      box-shadow: 0 12px 34px rgba(0,0,0,0.5); transition: transform 0.35s cubic-bezier(0.2,0.9,0.2,1); }
    .mc__toast b { color: #d8ba7c; }
    .mc__toast.is-in { transform: translate(-50%, 0); }

        var el = $("mcStick"), nub = $("mcStickNub"), on = false, cxp = 0, cyp = 0;
        el.addEventListener("pointerdown", function (e) {
          on = true; var r = el.getBoundingClientRect(); cxp = r.left + r.width / 2; cyp = r.top + r.height / 2;
          el.setPointerCapture(e.pointerId); move(e);
        });
        el.addEventListener("pointermove", move);
        el.addEventListener("pointerup", function () { on = false; stick.x = 0; stick.y = 0; nub.style.transform = "translate(-50%,-50%)"; });
        function move(e) {
          if (!on) return;
          var dx = e.clientX - cxp, dy = e.clientY - cyp, d = Math.hypot(dx, dy), m = Math.min(d, 38);
          if (d > 4) { stick.x = dx / d; stick.y = dy / d; target = null; } else { stick.x = 0; stick.y = 0; }
          nub.style.transform = "translate(calc(-50% + " + (d ? dx / d * m : 0) + "px), calc(-50% + " + (d ? dy / d * m : 0) + "px))";
        }
      })();

      function step(dt) {
        var maxSp = 0.30 + (TSTATE.hustle / 100) * 0.14;  // HUSTLE drives the whip's top speed
        var dx = 0, dy = 0;
        if (keys.w || keys.arrowup) dy -= 1;
        if (keys.s || keys.arrowdown) dy += 1;
        if (keys.a || keys.arrowleft) dx -= 1;
        if (keys.d || keys.arrowright) dx += 1;
        if (stick.x || stick.y) { dx = stick.x; dy = stick.y; }
        var want = 0;
        if (dx || dy) {
          target = null;
          heading = Math.atan2(dy, dx);
          want = maxSp;
        } else if (target) {
          var tx = target.x - player.x, ty = target.y - player.y, d = Math.hypot(tx, ty);
          if (d < 8) { target = null; }
          else { heading = Math.atan2(ty, tx); want = Math.min(maxSp, d / 90); }
        }
        // the whip eases in and brakes — it drives, it doesn't teleport
        speed += (want - speed) * Math.min(1, dt / 140);
        player.x += Math.cos(heading) * speed * dt;
        player.y += Math.sin(heading) * speed * dt;
        player.x = Math.max(30, Math.min(W - 30, player.x));
        player.y = Math.max(30, Math.min(H - 30, player.y));
        D.forEach(function (b) {
          if (player.x > b.x - 16 && player.x < b.x + b.w + 16 && player.y > b.y - 16 && player.y < b.y + b.h + 16) {
            var l = player.x - (b.x - 16), r2 = (b.x + b.w + 16) - player.x,
                t2 = player.y - (b.y - 16), bo = (b.y + b.h + 16) - player.y;
            var m = Math.min(l, r2, t2, bo);
            if (m === l) player.x = b.x - 16; else if (m === r2) player.x = b.x + b.w + 16;
            else if (m === t2) player.y = b.y - 16; else player.y = b.y + b.h + 16;
            speed *= 0.6;
          }
        });
        // every member building is a solid boundary too — you drive the streets
        LOTS.forEach(function (b) {
          if (player.x > b.x - 15 && player.x < b.x + b.w + 15 && player.y > b.y - 15 && player.y < b.y + b.h + 15) {
            var l = player.x - (b.x - 15), r2 = (b.x + b.w + 15) - player.x, t2 = player.y - (b.y - 15), bo = (b.y + b.h + 15) - player.y;
            var m = Math.min(l, r2, t2, bo);
            if (m === l) player.x = b.x - 15; else if (m === r2) player.x = b.x + b.w + 15;
            else if (m === t2) player.y = b.y - 15; else player.y = b.y + b.h + 15;
            speed *= 0.6;
          }
        });
        nearDoor = null;
        D.forEach(function (b) {
          var doorX = b.x + b.w / 2, doorY = b.y + b.h + 16;
          if (Math.hypot(player.x - doorX, player.y - doorY) < 46) nearDoor = b;
        });
        nearLot = null;
        if (!nearDoor) LOTS.forEach(function (l) {
          if (Math.hypot(player.x - (l.x + l.w / 2), player.y - (l.y - 3)) < 42) nearLot = l;
        });
        NPC.forEach(function (c) {
          c.t += c.sp * dt * c.dir;
          if (c.t > 1 || c.t < 0) { c.dir *= -1; c.t = Math.max(0, Math.min(1, c.t)); }
        });
        if (entered) {
          var w = WORLD;
          $("mcHint").innerHTML = nearDoor
            ? (nearDoor.unlock(w) ? "<b>" + esc(nearDoor.name) + "</b> · tap the door / press Enter"
              : "🔒 <b>" + esc(nearDoor.name) + "</b> · tap to see the key")
            : nearLot
              ? "<b>" + esc(nearLot.name) + "</b>" + (nearLot.mine ? " · your space" : "") + " · tap to enter"
              : "<b>" + esc((curSector && curSector.name) || "Our World") + "</b> · " + esc(rankOf(rep(w))) + (MP.count() ? " · " + MP.count() + " live" : " · find a lit door");
          var sec = sectorAt(player.x, player.y);
          if (sec !== curSector) { curSector = sec; showPlace(sec); }
          collectMarkers();
        }
        try { localStorage.setItem("mcc_mcity_pos", JSON.stringify(player)); } catch (e) {}
      }

      /* day/night: the city keeps the app's clock */
      var hour = new Date().getHours();
      var NIGHT = hour < 6 || hour >= 19;
      /* night must still READ: a new player's city is all locked, and a
         locked block painted the color of the ground is a screen that
         looks off. The dark stays; the shapes stay visible. */
      var GROUND = NIGHT ? "#171312" : "#1b1714";
      var ROAD = NIGHT ? "#2b211b" : "#2a221d";

      function draw(now) {
        var dt = Math.min(40, now - tPrev || 16); tPrev = now;
        if (entered) step(dt);
        offX = player.x - (cv.width / scale) / 2; offY = player.y - (cv.height / scale) / 2;
        offX = Math.max(0, Math.min(W - cv.width / scale, offX));
        offY = Math.max(0, Math.min(H - cv.height / scale, offY));
        cx.setTransform(scale, 0, 0, scale, -offX * scale, -offY * scale);
        var visW = cv.width / scale, visH = cv.height / scale;
        if (mapReady) {
          // paint only the visible slice of the big map — cheap at any resolution
          var mx = mapImg.width / W, my = mapImg.height / H;
          cx.drawImage(mapImg, offX * mx, offY * my, visW * mx, visH * my, offX, offY, visW, visH);
          // day/night colour grade laid over the painted city
          cx.fillStyle = NIGHT ? "rgba(8,10,26,0.44)" : "rgba(24,12,6,0.12)";
          cx.fillRect(offX, offY, visW, visH);
        } else {
          cx.fillStyle = GROUND; cx.fillRect(offX, offY, visW, visH);
          cx.strokeStyle = ROAD; cx.lineWidth = 48; cx.lineCap = "round";
          STREETS.forEach(function (s) { cx.beginPath(); cx.moveTo(s[0], s[1]); cx.lineTo(s[2], s[3]); cx.stroke(); });
          cx.strokeStyle = "rgba(244,239,230,0.13)"; cx.lineWidth = 2; cx.setLineDash([14, 18]);
          STREETS.forEach(function (s) { cx.beginPath(); cx.moveTo(s[0], s[1]); cx.lineTo(s[2], s[3]); cx.stroke(); });
          cx.setLineDash([]);
        }
        // traffic
        NPC.forEach(function (c) {
          var x = c.s[0] + (c.s[2] - c.s[0]) * c.t, y = c.s[1] + (c.s[3] - c.s[1]) * c.t;
          var ang = Math.atan2((c.s[3] - c.s[1]) * c.dir, (c.s[2] - c.s[0]) * c.dir);
          cx.save(); cx.translate(x, y); cx.rotate(ang);
          cx.fillStyle = c.c; cx.beginPath(); cx.roundRect(-11, -6, 22, 12, 4); cx.fill();
          if (NIGHT) { cx.fillStyle = "rgba(255,240,180,0.8)"; cx.fillRect(9, -5, 3, 3); cx.fillRect(9, 2, 3, 3); }
          cx.restore();
        });
        var w = WORLD;
        D.forEach(function (b) {
          var open = b.unlock(w);
          // over the painted map, districts are translucent neon mission-zones
          // (a solid block would bury the art); on the fallback they're lit blocks
          if (mapReady) cx.fillStyle = open ? hexA(b.c, 0.13) : "rgba(6,5,4,0.52)";
          else cx.fillStyle = open ? (NIGHT ? "#1d1613" : "#241d18") : (NIGHT ? "#1e1815" : "#15100d");
          cx.strokeStyle = open ? b.c : "rgba(244,239,230,0.3)";
          cx.lineWidth = mapReady ? 3.5 : 3;
          cx.beginPath(); cx.roundRect(b.x, b.y, b.w, b.h, 14); cx.fill(); cx.stroke();
          if (open && (NIGHT || mapReady)) { cx.save(); cx.shadowColor = b.c; cx.shadowBlur = 26; cx.stroke(); cx.restore(); }
          // night windows only on the procedural fallback — the map paints its own
          if (NIGHT && !mapReady) {
            for (var wi = b.x + 14; wi < b.x + b.w - 14; wi += 22) {
              for (var wj = b.y + 26; wj < b.y + b.h - 18; wj += 20) {
                if (((wi * 7 + wj * 13) | 0) % 3 === 0) {
                  cx.fillStyle = open ? "rgba(255,236,170,0.5)" : "rgba(255,236,170,0.16)";
                  cx.fillRect(wi, wj, 5, 7);
                }
              }
            }
          }
          var doorX = b.x + b.w / 2;
          cx.fillStyle = open ? b.c : "rgba(244,239,230,0.35)";
          cx.fillRect(doorX - 14, b.y + b.h - 5, 28, 10);
          cx.fillStyle = open ? "#f4efe6" : "rgba(244,239,230,0.6)";
          cx.font = "700 17px system-ui"; cx.textAlign = "center";
          cx.fillText((open ? "" : "🔒 ") + b.name, b.x + b.w / 2, b.y + b.h / 2 + 3);
          cx.fillStyle = open ? b.c : "rgba(244,239,230,0.45)";
          cx.font = "800 9px system-ui";
          cx.fillText(b.k.toUpperCase(), b.x + b.w / 2, b.y + b.h / 2 + 22);
          // mission pips: green for done, district color for waiting
          if (open) {
            var ms = b.missions(w), doneN = ms.filter(function (m) { return m[1]; }).length;
            for (var i = 0; i < ms.length; i++) {
              cx.fillStyle = i < doneN ? "#2fbf71" : "rgba(244,239,230,0.25)";
              cx.beginPath(); cx.arc(b.x + 16 + i * 13, b.y + 14, 4, 0, 7); cx.fill();
            }
            // the seal: a cleared arc wears its badge on the roof
            if (myBadges()[b.id]) {
              cx.font = "16px system-ui";
              cx.fillText(BADGE[b.id][0], b.x + b.w - 18, b.y + 20);
            }
          }
        });
        // member spaces: every profile is a building with a face at the door
        LOTS.forEach(function (l) {
          if (mapReady) cx.fillStyle = hexA(l.color, 0.17); else cx.fillStyle = "#241d18";
          cx.beginPath(); cx.roundRect(l.x, l.y, l.w, l.h, 11); cx.fill();
          if (l.mine) { cx.save(); cx.shadowColor = "#c99d45"; cx.shadowBlur = 20; cx.strokeStyle = "#c99d45"; cx.lineWidth = 3.5; cx.stroke(); cx.restore(); }
          cx.strokeStyle = l.color; cx.lineWidth = 2.2; cx.stroke();
          cx.fillStyle = mapReady ? "rgba(9,7,6,0.72)" : "#15100d";
          cx.fillRect(l.x, l.y + l.h - 17, l.w, 17);
          cx.fillStyle = "#f4efe6"; cx.font = "800 9px system-ui"; cx.textAlign = "center";
          cx.fillText((l.mine ? "★ " : "$") + (l.ticker || l.name.slice(0, 9)).toUpperCase(), l.x + l.w / 2, l.y + l.h - 5);
          drawToken(l.x + l.w / 2, l.y - 3, 15, l.slug, l.color, (l.name[0] || "?").toUpperCase());
        });

        // the markers: your psychology, glowing on the street
        MARKERS.forEach(function (m) {
          var got = TSTATE.got.indexOf(m.id) !== -1;
          var pul = got ? 0 : (0.5 + 0.5 * Math.sin(now / 300));
          cx.save(); cx.globalAlpha = got ? 0.3 : 1;
          cx.shadowColor = m.c; cx.shadowBlur = got ? 3 : (9 + pul * 14);
          cx.beginPath(); cx.arc(m.x, m.y, got ? 7 : 11, 0, 7); cx.fillStyle = hexA(m.c, 0.92); cx.fill();
          cx.shadowBlur = 0; cx.fillStyle = "#0a0807"; cx.font = "800 12px system-ui";
          cx.textAlign = "center"; cx.textBaseline = "middle"; cx.fillText(got ? "✓" : m.icon, m.x, m.y + 1); cx.textBaseline = "alphabetic";
          cx.restore();
        });

        // every other driver on the channel, live
        MP.render();

        // the whip: rotates into its heading, glows at speed
        // a soft ground shadow reads on the painted street either way
        cx.save();
        cx.translate(player.x, player.y);
        cx.rotate(heading);
        cx.fillStyle = "rgba(0,0,0,0.45)";
        cx.beginPath(); cx.ellipse(0, 0, 20, 12, 0, 0, 7); cx.fill();
        cx.restore();
        cx.save();
        cx.translate(player.x, player.y);
        if (carReady) {
          cx.rotate(heading + CAR_FACE);
          var cs = 46;
          cx.shadowColor = "#e5383b"; cx.shadowBlur = 8 + speed * 34;
          cx.drawImage(carImg, -cs / 2, -cs / 2, cs, cs);
          cx.shadowBlur = 0;
        } else {
          cx.rotate(heading);
          cx.fillStyle = "#e5383b";
          cx.shadowColor = "#e5383b"; cx.shadowBlur = 12 + speed * 40;
          cx.beginPath(); cx.roundRect(-14, -8, 28, 16, 6); cx.fill();
          cx.shadowBlur = 0;
          cx.fillStyle = "#0a0807"; cx.fillRect(2, -6, 7, 12); // windshield
          if (NIGHT) { cx.fillStyle = "rgba(255,240,180,0.9)"; cx.fillRect(12, -6, 3, 4); cx.fillRect(12, 2, 3, 4); }
        }
        cx.restore();
        // the player's own face rides the whip — you drive as your character
        if (PLAYER && faceCache[PLAYER.slug] && faceCache[PLAYER.slug].ok) {
          drawToken(player.x, player.y, 9, PLAYER.slug, "#c99d45", "★");
        }
        cx.setTransform(1, 0, 0, 1, 0, 0);
        cx.fillStyle = "#f4efe6"; cx.font = "800 " + 10 * dpr + "px system-ui"; cx.textAlign = "center";
        requestAnimationFrame(draw);
      }

      /* ---------- the mission sheet ---------- */
      function openDistrict(b) {
        var w = WORLD;
        var open = b.unlock(w);
        $("mcSheet").style.setProperty("--dc", b.c);

        var worn = myBadges()[b.id];
        $("shArc").innerHTML = open

          $("shMs").innerHTML = b.missions(w).map(function (m) {

              (visitKey ? ' data-visit="' + visitKey + '"' : "") + ' style="--dc:' + b.c + '">' +

        /* the proof door: real-world missions stop running on the honor

          pf.innerHTML = '<div class="mc__locknote" style="margin-top:0.7rem">📸 <b>Ran a mission in the real world?</b> ' +

      $("mcCtl").innerHTML = touch
        ? "<span><b>Left thumb</b> · the stick drives</span><span><b>Tap</b> anywhere · drive there</span><span><b>Tap a lit door</b> · missions</span>"
        : "<span><b>WASD / arrows</b> · drive</span><span><b>Click</b> · drive there</span><span><b>Enter at a door</b> · missions</span>";
      $("mcEnter").addEventListener("click", function () {
        entered = true;
        $("mcDoor").classList.add("is-gone");
        setTimeout(function () { $("mcDoor").remove(); }, 600);
        MP.connect();                    // go live — see everyone else driving
        track("mcity_enter", { rep: rep(WORLD), touch: touch });
      });

      requestAnimationFrame(draw);
      track("mcity_view", { rep: rep(WORLD) });
    })();
  </script>
</body>
</html>
