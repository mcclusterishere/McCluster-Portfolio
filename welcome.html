<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Welcome to Equity Uprise · the walk-in</title>
  <meta name="description" content="The Chaser walk-in: claim what you are, dress your card, drop your links, and learn exactly how you get paid (and never eat a processing fee) and how the game pays you to show up.">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/png" href="assets/img/eu-favicon.png">
  <link rel="preload" href="assets/fonts/anton-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=__STAMP__">
  <style>
    .wl { min-height: 100dvh; padding: clamp(5.4rem, 10vh, 7rem) clamp(1rem, 4vw, 2.4rem) 9rem; max-width: 34rem; margin: 0 auto; }
    .wl__kick { font-family: var(--micro); font-size: 0.78rem; letter-spacing: 0.24em; text-transform: uppercase; color: #c99d45; }
    .wl h1 { font-family: var(--sig); text-transform: uppercase; line-height: 0.95; font-size: clamp(2.2rem, 9vw, 3.6rem); margin-top: 0.3rem; }
    .wl__dots { display: flex; gap: 0.35rem; margin: 1.1rem 0 0.4rem; flex-wrap: wrap; }
    .wl__dot { width: 20px; height: 4px; border-radius: 100px; background: rgba(244,239,230,0.15); transition: background 0.3s; }
    .wl__dot.is-on { background: linear-gradient(90deg, var(--ruby), var(--ruby-hot)); }
    .wl__card { border: 1px solid rgba(244,239,230,0.14); border-radius: 18px; background: rgba(20,16,14,0.65);
      padding: 1.3rem 1.2rem 1.4rem; margin-top: 0.9rem; }
    .wl__card h2 { font-family: var(--display); font-weight: 400; text-transform: uppercase; font-size: 1.35rem; line-height: 1.05; }
    .wl__card p { color: var(--cream-dim); font-size: 0.88rem; line-height: 1.65; margin-top: 0.5rem; }
    .wl__card p b { color: var(--cream); }
    .wl__chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.9rem; }
    .wl__card p { font-size: 1.12rem; line-height: 1.8; color: rgba(244,239,230,0.94); }
    .wl__card h2 { font-size: 1.85rem; }
    .wl__lbl { font-size: 0.95rem !important; font-weight: 800; color: rgba(244,239,230,0.9) !important; }
    .wl__in { font-size: 1.08rem !important; font-weight: 600; }
    .wl__chip { border: 1.5px solid rgba(244,239,230,0.45); border-radius: 100px; cursor: pointer; background: rgba(10,8,7,0.5);
      color: var(--cream); font: inherit; font-size: 0.9rem; font-weight: 700; padding: 0.65em 1.25em;
      transition: border-color 0.2s, background 0.2s; -webkit-tap-highlight-color: transparent;
      font-size: 1.04rem; font-weight: 800; }
    .wl__chip.is-on { border-color: var(--ruby-hot); background: rgba(193,18,31,0.35); color: #fff; }
    /* the attract pattern: untouched options breathe in a staggered wave so
       the eye knows exactly what to tap; first tap stills the room */
    @keyframes wlGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(229,56,59,0); }
      50% { box-shadow: 0 0 16px rgba(229,56,59,0.6); border-color: var(--ruby-hot); } }
    .wl__chips:not(.is-touched) .wl__chip { animation: wlGlow 2.2s ease-in-out infinite; }
    .wl__chips:not(.is-touched) .wl__chip:nth-child(3n+2) { animation-delay: 0.35s; }
    .wl__chips:not(.is-touched) .wl__chip:nth-child(3n) { animation-delay: 0.7s; }
    @media (prefers-reduced-motion: reduce) { .wl__chips:not(.is-touched) .wl__chip { animation: none; } }
    /* the voice door: say it instead of tapping it */
    .wl__mic { display: block; width: 100%; margin-top: 0.7rem; border: 2px dashed rgba(244,239,230,0.4);
      border-radius: 14px; background: rgba(10,8,7,0.5); color: var(--cream); font: inherit;
      font-size: 1.02rem; font-weight: 800; padding: 0.85em 1em; cursor: pointer;
      -webkit-tap-highlight-color: transparent; }
    .wl__mic.is-live { border-color: var(--ruby-hot); color: #fff; animation: wlGlow 1.1s ease-in-out infinite; }
    .wl__heard { min-height: 1.3em; text-align: center; color: var(--cream-dim); font-size: 0.95rem; margin-top: 0.4rem; font-style: italic; }
    .wl__lbl { display: block; font-size: 0.84rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--cream-dim); margin: 0.9rem 0 -0.2rem; }
    .wl__in { width: 100%; background: rgba(10,8,7,0.75); border: 1px solid rgba(244,239,230,0.3); border-radius: 12px;
      color: var(--cream); font: inherit; font-size: max(16px, 1rem); padding: 0.85em 1em; margin-top: 0.7rem; }
    .wl__in:focus { outline: none; border-color: var(--ruby-hot); }
    textarea.wl__in { min-height: 4.6em; resize: vertical; }
    .wl__ex { border-left: 3px solid #c99d45; padding: 0.15rem 0 0.15rem 0.9rem; margin-top: 0.9rem; }
    .wl__ex b { color: var(--cream); display: block; font-size: 0.9rem; }
    .wl__ex small { color: var(--cream-dim); font-size: 0.9rem; line-height: 1.55; display: block; margin-top: 0.15rem; }
    .wl__big { font-family: var(--display); font-weight: 400; text-transform: uppercase; color: var(--ruby-hot);
      font-size: 1.6rem; line-height: 1; margin: 0.3rem 0 0.2rem; }
    .wl__go { display: block; width: 100%; border: 0; border-radius: 12px; cursor: pointer; font: inherit; font-weight: 800;
      font-size: 0.95rem; letter-spacing: 0.05em; text-transform: uppercase; padding: 1.05em; color: #fff; margin-top: 1.1rem;
      background: linear-gradient(120deg, var(--ruby), var(--ruby-hot)); box-shadow: 0 8px 26px rgba(229,56,59,0.35); }
    .wl__skip { display: block; width: 100%; background: none; border: 0; cursor: pointer; font: inherit; font-size: 0.84rem;
      color: rgba(244,239,230,0.7); text-decoration: underline; padding: 0.7em; margin-top: 0.2rem; }
    .wl__back { border: 1px solid rgba(244,239,230,0.35); border-radius: 100px; background: rgba(10,8,7,0.55);
      cursor: pointer; font: inherit; font-size: 0.92rem; font-weight: 700; color: var(--cream);
      padding: 0.85em 1.6em; display: inline-flex; align-items: center; gap: 0.4em;
      -webkit-tap-highlight-color: transparent; }
    .wl__back--old { background: none; border: 0; cursor: pointer; font: inherit; font-size: 0.84rem; color: rgba(244,239,230,0.7);
      padding: 0.3em 0; margin-top: 0.6rem; }
    .wl__msg { min-height: 1.2em; color: var(--cream); font-size: 0.9rem; margin-top: 0.5rem; }
  </style>
</head>
<body class="songpage">
  <div class="grain" aria-hidden="true"></div>
  <header class="site-head">
    <a class="brand" href="index.html"><img class="brand__mark" src="assets/img/m-mark.png" alt="M"><span class="brand__rest">cCluster</span></a>
  </header>

  <main class="wl">
    <p class="wl__kick">Equity Uprise · the walk-in</p>
    <h1 id="wlTitle">You're a<br>Chaser now.</h1>
    <div class="wl__dots" id="wlDots"></div>
    <div id="wlStage"></div>
  </main>

  <script src="js/analytics.js?v=__STAMP__"></script>
  <script src="js/polish.js?v=__STAMP__"></script>
  <script src="js/backend.js?v=__STAMP__"></script>
  <script src="js/guide.js?v=__STAMP__"></script>
  <script src="js/network.js?v=__STAMP__"></script>
  <script src="js/door.js?v=__STAMP__"></script>
  <script src="js/chaser.js?v=__STAMP__"></script>
  <script>
    (function () {
      "use strict";
      function $(id) { return document.getElementById(id); }
      function track(n, p) { if (window.MCC_TRACK) window.MCC_TRACK(n, p || {}); }
      function esc(s) { return String(s || "").replace(/"/g, "&quot;"); }
      function escT(s) { return String(s || "").replace(/</g, "&lt;"); }
      var stage = $("wlStage");
      var A = { roles: [], goals: [], area: "", headline: "", blurb: "", rate: "", yt: "",
                ig: "", music: "", web: "",
                spaceType: "", capacity: "", amen: [], reg: "", issue: "", district: "" };
      try {
        var ob = JSON.parse(localStorage.getItem("mcc_onboard") || "{}") || {};
        A.headline = ob.headline || ""; A.area = ob.area || ""; A.blurb = ob.blurb || "";
        A.ig = ob.ig || ""; A.music = ob.music || ""; A.web = ob.web || "";
        if (ob.roles && ob.roles.length) A.roles = ob.roles.slice();
        // the intent door: ?as=space|artist|civic — they told us why they came
        var AS = new URLSearchParams(location.search).get("as") || "";
        if (!A.roles.length) {
          if (AS === "space") A.roles = ["Studios", "Stages"];
          if (AS === "artist") A.roles = ["Music"];
        }
      } catch (e) {}

      // signed out? the door stands here too — then the walk begins
      if (!(window.MCC_AUTH && window.MCC_AUTH.user && window.MCC_AUTH.user())) {
        stage.innerHTML = '<div class="wl__card"><h2>First, the door.</h2>' +
          '<p>The walk-in starts the moment your account opens — one tap, no email needed.</p><div id="wlDoor" style="margin-top:0.9rem"></div></div>';
        window.MCC_DOOR.mount($("wlDoor"), { ticker: true, context: "welcome", onDone: function () { location.reload(); } });
        return;
      }

      var ROLES = [["Music", "Artist / Music"], ["Beats", "Producer"], ["Photo", "Photographer"], ["Social", "Creator / Social"], ["Rides", "Driver / Rides"],
        ["Video", "Videographer"], ["Web", "Web / Software"], ["Studios", "Studio"],
        ["Stages", "Venue / Space"], ["Brand", "Brand / Business"], ["Programs", "Civic / Community"]];
      var GOALS = [["booked", "Get booked & paid"], ["music", "Put my music on"], ["collab", "Find collaborators"],
        ["credit", "Build my street credit"], ["back", "Back artists I believe in"], ["sell", "Sell my own drops"]];
      var GOALS_SPACE = [["rent", "Rent out my space"], ["calendar", "Fill my calendar"], ["events", "Host events"], ["credit", "Build my reputation"]];
      var GOALS_CIVIC = [["organize", "Organize my community"], ["register", "Register & move voters"], ["seat", "Take a seat in my city"], ["policy", "Move policy"]];
      var AMENITIES = [["seating", "Seating"], ["sound", "Sound system"], ["piano", "Piano / keys"], ["stage", "Stage"],
        ["screens", "Screens / AV"], ["parking", "Parking"], ["kitchen", "Kitchen"], ["recording", "Recording"], ["wifi", "Wi-Fi"]];
      // the persona drives which questionnaire the Chaser sees
      function persona() {
        var r = A.roles;
        if (r.indexOf("Studios") !== -1 || r.indexOf("Stages") !== -1) return "space";
        if (r.indexOf("Programs") !== -1 && r.indexOf("Music") === -1 && r.indexOf("Beats") === -1) return "civic";
        return "creative";
      }
      // MULTI-PATH: the questionnaire is additive. Every path you claim
      // stacks its own question step, so the load grows with the paths.
      function flags() {
        var r = A.roles;
        return {
          creative: r.some(function (x) { return ["Music", "Beats", "Photo", "Video", "Web", "Brand"].indexOf(x) !== -1; }),
          space: r.some(function (x) { return ["Studios", "Stages"].indexOf(x) !== -1; }),
          civic: r.indexOf("Programs") !== -1,
        };
      }
      function goalsFor() {
        var out = [], seen = {}, f = flags();
        function add(list) { list.forEach(function (g) { if (!seen[g[0]]) { seen[g[0]] = 1; out.push(g); } }); }
        if (f.creative) add(GOALS);
        if (f.space) add(GOALS_SPACE);
        if (f.civic) add(GOALS_CIVIC);
        if (!out.length) add(GOALS);
        return out;
      }

      function sWelcome() {
        /* ONE FLOW: RISE finds your path, the walk-in dresses the card.
           Carrying a card, the walk greets you by it; without one, the
           game is offered first — never forced. */
        var rise = null;
        try { rise = JSON.parse(localStorage.getItem("mcc_rise")); } catch (e) {}
        var riseLine = rise && rise.arch
          ? (window.MCC_CHASER ? '<div style="margin:0.4rem 0 0.8rem">' + window.MCC_CHASER.banner(rise.arch[0]) + "</div>" : "") +
            '<p style="color:#e8c877;font-weight:800;font-size:0.92rem">🃏 Your E⤴ Card came with you: <b>' +
            esc(rise.arch.join(" × ")) + "</b> — your answers below start pre-picked from it.</p>"
          : '<p class="card-call" style="font-size:0.92rem;padding:0.7rem 0.85rem"><a href="rise.html" style="color:#e8c877;font-weight:800">🃏 GET YOUR CARD — play WHAT MAKES YOU RISE? (2 min) &#8594;</a><br>' +
            '<span style="color:var(--cream-dim);font-size:0.9rem">It deals your E⤴ Card, pre-fills this walk, and pays your first game points.</span></p>';
        card('<h2>Welcome, Chaser.</h2>' +
          '<p><b>You&rsquo;re in.</b> Real deals, real records, your own ticker — moved by real work.<br>' +
          'A few taps dress your card, then Our Street is yours.</p>' +
          riseLine + goBtn("Walk me in"));
      }
      function sClaim() {
        var AS = new URLSearchParams(location.search).get("as") || "";
        if (AS === "driver") {
          if (A.roles.indexOf("Rides") === -1) A.roles.push("Rides");
          card('<h2>Driving on your own terms.</h2><p><b>We pre-picked the Rides lane</b> — adjust anything. ' +
            'Name your rate about 10% over the meter apps: the rider taps your phone, pays through the desk, and <b>your whole fare arrives — no 25–40% cut.</b></p>' +
            chiprow(ROLES, A.roles, true) + goBtn("That\u2019s me — keep walking"));
          wireChips(A.roles, true);
          return;
        }
        if (AS === "space") {
          card('<h2>Listing your space.</h2><p><b>We pre-picked the space paths for you</b> — the glowing picks are yours to adjust. ' +
            'Run something else too (music, photo, video)? Tap it on and the walk adds those questions.</p>' +
            chiprow(ROLES, A.roles, true) + goBtn("That\u2019s me — keep walking"));
          wireChips(A.roles, true);
          return;
        }
        card('<h2>What do you do? <span style="color:#e8c877">All of it.</span></h2>' +
          '<p>Tap <b>every</b> lane you run — music AND social AND stages, whatever the mix. ' +
          '<b>The walk bends to your combination:</b> each pick adds its own questions and unlocks its own tools.</p>' +
          chiprow(ROLES, A.roles, true) + goBtn());
        wireChips(A.roles, true);
      }
      function sCard() {
        card('<h2>The card Our Street sees.</h2><p>One line on what you do, where you work, and your rate if you have one.</p>' +
          '<span class="wl__lbl">Your one-liner</span>' +
          '<input class="wl__in" id="wlHead" type="text" placeholder="e.g. CT artist — Leader by Voice" value="' + esc(A.headline) + '">' +
          '<span class="wl__lbl">Where you work</span>' +
          '<input class="wl__in" id="wlArea" type="text" placeholder="e.g. Connecticut · travels" value="' + esc(A.area) + '">' +
          '<span class="wl__lbl">Your rate in E⤴︎ — per job or hour (optional)</span>' +
          '<input class="wl__in" id="wlRate" type="number" min="0" placeholder="e.g. 500" value="' + esc(A.rate) + '">' +
          '<span class="wl__lbl">The pitch (optional)</span>' +
          '<textarea class="wl__in" id="wlBlurb" placeholder="Your sound, your style, what working with you feels like">' + escT(A.blurb) + '</textarea>' + goBtn());
      }
      function sLinks() {
        card('<h2>Drop your links.</h2><p>Where your people already are. <b>The machine reads these</b> — your followership feeds your tape and shows on your card on Our Street.</p>' +
          '<span class="wl__lbl">Instagram / socials</span>' +
          '<input class="wl__in" id="wlIg" type="text" placeholder="@yourhandle or a link" value="' + esc(A.ig) + '">' +
          '<span class="wl__lbl">Music / portfolio — Spotify, reel, site</span>' +
          '<input class="wl__in" id="wlMusic" type="text" placeholder="Link to your work" value="' + esc(A.music) + '">' +
          '<span class="wl__lbl">YouTube / TikTok (optional)</span>' +
          '<input class="wl__in" id="wlYt" type="text" placeholder="@channel or a link" value="' + esc(A.yt) + '">' +
          '<span class="wl__lbl">Website / Linktree (optional)</span>' +
          '<input class="wl__in" id="wlWeb" type="text" placeholder="linktr.ee/you or your site" value="' + esc(A.web) + '">' + goBtn());
      }
      function sSpace() {
        card('<h2>About your space.</h2><p>The room people book — tell us what it is and what’s inside.</p>' +
          '<span class="wl__lbl">What kind of space</span>' +
          '<input class="wl__in" id="wlSpaceType" type="text" placeholder="e.g. Sanctuary & event hall / studio" value="' + esc(A.spaceType) + '">' +
          '<span class="wl__lbl">How many it holds</span>' +
          '<input class="wl__in" id="wlCap" type="number" min="0" placeholder="capacity — e.g. 150" value="' + esc(A.capacity) + '">' +
          '<span class="wl__lbl">What’s inside — tap all you’ve got</span>' +
          chiprow(AMENITIES, A.amen, true) + goBtn());
        wireChips(A.amen, true);
      }
      function sCivic() {
        card('<h2>Your civic lane.</h2><p>The Uprise gives you a real seat — you can file your full E⤴ Card later.</p>' +
          '<span class="wl__lbl">What you care about most</span>' +
          '<input class="wl__in" id="wlIssue" type="text" placeholder="e.g. housing, youth, environmental justice" value="' + esc(A.issue) + '">' +
          '<span class="wl__lbl">Your district / city</span>' +
          '<input class="wl__in" id="wlDistrict" type="text" placeholder="e.g. Bridgeport, District 130" value="' + esc(A.district) + '">' +
          '<span class="wl__lbl">Registered to vote?</span>' +
          chiprow([["yes", "Yes"], ["no", "Not yet"]], A.reg ? [A.reg] : [], false) + goBtn());
        stage.querySelectorAll(".wl__chip").forEach(function (bn) {
          bn.addEventListener("click", function () {
            A.reg = bn.getAttribute("data-c");
            stage.querySelectorAll(".wl__chip").forEach(function (x) { x.classList.remove("is-on"); });
            bn.classList.add("is-on");
          });
        });
      }
      function sGoals() {
        card('<h2>What are you here for?</h2><p>This tunes what Our Street shows you first.</p>' +
          chiprow(goalsFor(), A.goals, true) + goBtn());
        wireChips(A.goals, true);
      }
      function sMoney() {
        card('<h2>How you get paid.</h2>' +
          '<p class="wl__big">You keep 100%.</p>' +
          '<p>Name your rate. When someone books you, <b>they pay one price and you receive your full rate — whole.</b> ' +
          'The platform\'s cut is baked into the buyer\'s number on the back end, so <b>you never eat a processing fee. Ever.</b> ' +
          'Not on a booking, not on a beat, not on a drop.</p>' +
          '<div class="wl__ex"><b>E⤴︎ credit — earned, then cashed out</b><small>1 E⤴︎ = $1, backed by the Equity Reserve. ' +
          'Finish a deal and you earn credit on top of your pay. Credit you <b>earned by work cashes out</b>; credit you buy or get gifted spends on Our Street. Nothing is fake — nothing mints unbacked.</small></div>' +
          '<div class="wl__ex"><b>The equity pool — a stake for building the house</b><small>Every real deal draws 1% into a pool, and you accrue a stake that grows the more you move. It\'s a membership benefit, not a bill — it never comes out of your rate.</small></div>' +
          '<div class="wl__ex"><b>Buying E⤴︎ — base price + 10% mint fee</b><small>100 E⤴︎ costs $110. Same law your own customers live by when they pay you through the desk: the fee rides on top, and your ask arrives whole.</small></div>' +
          goBtn("Next — the two colors →"));
      }
      function sTwoColor() {
        card('<h2>The Two-Color Law.</h2>' +
          '<p><b>In plain legal terms</b> — your wallet holds one currency in two classes, and the class decides if it can leave:</p>' +
          '<div class="wl__ex" style="border-left:3px solid #e8c877"><b style="color:#e8c877">GOLD — granted credit</b><small><b>Promotional credit</b> the platform issues you free (your opening stake, T.R.A.P.S. payouts, awards). Legally: it has <b>no cash value</b>, cannot be withdrawn, refunded, or transferred for cash — it is <b>redeemable only for goods, services and ads inside the network</b>. Think store credit: real buying power, spends everywhere here, never leaves.</small></div>' +
          '<div class="wl__ex" style="border-left:3px solid #00c805"><b style="color:#00c805">GREEN — earned credit</b><small><b>Marketplace balance</b>: credit another member actually paid you for goods or services. Legally: it is <b>yours to cash out</b> — every cash-out is reviewed and approved by the desk, like any marketplace payout — or to spend anywhere gold spends.</small></div>' +
          '<p style="font-size:0.95rem"><b>One wallet, two colors. The color answers one question: can it leave?</b> Gold spends, green spends OR cashes out.</p>' +
          goBtn("Got it — what\u2019s T.R.A.P.S.? →"));
      }
      function sTraps() {
        card('<h2>T.R.A.P.S.</h2>' +
          '<p class="wl__big" style="letter-spacing:0.04em"><b>T</b>ake <b>R</b>isk <b>A</b>nd <b>P</b>rosper — <b>S</b>ystem.</p>' +
          '<p>You start holding <b style="color:#e8c877">50 E⤴︎ of gold</b> — the stake. These walk-in answers top you off up to <b style="color:#e8c877">250</b>. Running the whole system pays up to <b style="color:#e8c877">1,000 more</b>. All gold — leverage, not cash.</p>' +
          '<p><b>The flip is the whole game:</b> gold can\u2019t cash out — but what gold BUYS can earn green. The play:</p>' +
          '<div class="wl__ex"><b>1 · Put your name on Our Street</b><small>Your listing goes live — your rate, your work, bookable by everybody.</small></div>' +
          '<div class="wl__ex"><b>2 · Spend gold on reach</b><small>Ads, features, placement — the network working for you (next step).</small></div>' +
          '<div class="wl__ex"><b>3 · Take the deal</b><small>Somebody books you. They pay one price; your ask arrives whole — <b style="color:#00c805">green</b>.</small></div>' +
          '<div class="wl__ex"><b>4 · Repeat until the flip is real</b><small>50 gold &#8594; reach &#8594; deals &#8594; <b style="color:#00c805">1,000+ green</b> — earned off other members, cashable, yours.</small></div>' +
          '<div class="wl__ex" style="border-left:3px solid #e5383b"><b style="color:#e5383b">The risk is real — this is a LOAN, not a gift</b><small>Make one real move inside <b>30 days</b> — your listing live, or your first earn — or the house calls the <b>whole stake back</b>. One stake per lifetime: no restarts, no re-deals, no second walk-in stake. Take Risk And Prosper — or hand it back.</small></div>' +
          goBtn("Show me the ads →"));
      }
      function sBillboard() {
        card('<h2>The Billboard.</h2>' +
          '<p><b>Advertise YOURSELF on the whole network</b> — Our Street, Uprise Nation, the game, and our outside embassies (Reddit and beyond). Not a banner on one page: the network itself carrying your name.</p>' +
          '<div class="wl__ex"><b>Ad packages — around 1,200 E⤴︎ each</b><small>A standalone run: your card, your drop, or your room pushed across the network. In cash that\u2019s roughly a third more — <b>E⤴︎ always runs cheaper than dollars, on everything.</b></small></div>' +
          '<div class="wl__ex"><b>This is what gold is FOR</b><small>The house stakes you; you turn stake into reach, reach into deals, deals into <b style="color:#00c805">green</b>. Book a slot from your desk — the deal goes on the record like everything else.</small></div>' +
          goBtn("Last step →"));
      }
      function sGame() {
        card('<h2>The game pays you to show up.</h2>' +
          '<p>Equity Uprise runs like a city, and it rewards real moves — not clout, <b>action</b>.</p>' +
          '<div class="wl__ex"><b>T.R.A.P.S. — up to 1,000 E⤴︎</b><small>Take Risk And Prosper, System-wide: run the app for real and every verified move pays. The whole list lives on your desk.</small></div>' +
          '<div class="wl__ex"><b>Badges & Uprise Nation — level up your profile</b><small>Clear missions in the open world, earn badges that ' +
          'light up your card and unlock archetypes. Your daily value goes up when you play.</small></div>' +
          '<div class="wl__ex"><b>The Plug — get paid for life</b><small>Every Chaser has a share link. Bring 3 real signups and earn 1 E⤴︎ — ' +
          'plus a <b>lifetime 1%</b> of everything the people you bring ever earn here. Build your team, eat forever.</small></div>' +
          goBtn("Save my card & open Our Street") +
          '<button class="wl__skip" type="button" data-tour>…or take the guided tour first</button>' +
          '<p class="wl__msg" id="wlMsg"></p>');
      }
      function buildSteps() {
        var f = flags(), s = [sWelcome, sClaim, sCard];
        s.push(sLinks);
        if (f.space) s.push(sSpace);
        if (f.civic) s.push(sCivic);
        s.push(sGoals, sMoney, sTwoColor, sTraps, sBillboard, sGame);
        return s;
      }
      var steps = buildSteps(), STEPS = steps.length, at = 0;
      /* T.R.A.P.S. OPENING STAKE: signed-in answers bank real gold —
         50 on arrival, 25 per paid answer, 250 ceiling; the ledger's
         unique key means replays never double-pay */
      var STAKE_KEY = new Map([[sClaim, "roles"], [sLinks, "links"], [sGoals, "goals"],
        [sMoney, "money"], [sTwoColor, "twocolor"], [sTraps, "traps"], [sBillboard, "billboard"]]);
      function stakeCall(key) {
        if (!(window.MCC_AUTH && window.MCC_AUTH.user && window.MCC_AUTH.user())) return;
        window.MCC_SUPA.token().then(function (t) {
          return fetch(window.MCC_SUPA.url + "/rest/v1/rpc/stake_mark", { method: "POST",
            headers: { "Content-Type": "application/json", apikey: window.MCC_SUPA.key, Authorization: "Bearer " + t },
            body: JSON.stringify({ p_key: key }) });
        }).then(function (r) { return r && r.ok ? r.json() : null; }).then(function (j) {
          if (j && j.ok && +j.paid > 0) track("stake_paid", { k: key, amt: +j.paid });
        }).catch(function () {});
      }
      function stakePay(fn) { var k = STAKE_KEY.get(fn); if (k) stakeCall(k); }
      stakeCall("opening");
      try { if (JSON.parse(localStorage.getItem("mcc_rise") || "null")) stakeCall("card"); } catch (eSK) {}
      function refresh() { steps = buildSteps(); STEPS = steps.length; }

      function dots() {
        $("wlDots").innerHTML = "";
        for (var i = 0; i < STEPS; i++) {
          var d = document.createElement("span");
          d.className = "wl__dot" + (i <= at ? " is-on" : "");
          $("wlDots").appendChild(d);
        }
      }
      function chiprow(list, picked) {
        return '<div class="wl__chips">' + list.map(function (c) {
          return '<button class="wl__chip' + (picked.indexOf(c[0]) !== -1 ? " is-on" : "") + '" type="button" data-c="' + c[0] + '">' + c[1] + "</button>";
        }).join("") + "</div>";
      }
      function wireChips(arr, multi) {
        stage.querySelectorAll(".wl__chip").forEach(function (b) {
          b.addEventListener("click", function () {
            var row = b.closest(".wl__chips"); if (row) row.classList.add("is-touched");
            var v = b.getAttribute("data-c");
            var i = arr.indexOf(v);
            if (i === -1) { if (!multi) { arr.length = 0; stage.querySelectorAll(".wl__chip").forEach(function (x) { x.classList.remove("is-on"); }); } arr.push(v); b.classList.add("is-on"); }
            else { arr.splice(i, 1); b.classList.remove("is-on"); }
          });
        });
      }
      function card(html) {
        stage.innerHTML = '<div class="wl__card">' + html + "</div>" +
          (at > 0 ? '<div style="text-align:center;margin-top:0.9rem"><button class="wl__back" type="button" data-back>&#8592; Fix the last answer</button></div>' : "");
        dots(); window.scrollTo(0, 0);
      }
      function goBtn(label) { return '<button class="wl__go" type="button" data-next>' + (label || "Next") + '</button>'; }

      function harvest() {
        var map = { wlHead: "headline", wlArea: "area", wlRate: "rate", wlBlurb: "blurb",
                    wlIg: "ig", wlMusic: "music", wlWeb: "web", wlYt: "yt",
                    wlSpaceType: "spaceType", wlCap: "capacity", wlIssue: "issue", wlDistrict: "district" };
        Object.keys(map).forEach(function (id) { var el = $(id); if (el) A[map[id]] = el.value.trim(); });
      }
      function save(then) {
        var fields = { headline: A.headline || null, area: A.area || null, blurb: A.blurb || null };
        if (A.roles.length) fields.roles = A.roles;
        $("wlMsg") && ($("wlMsg").textContent = "Dressing your card…");
        // the answers ride the listing: goals, rate, and links merge into terms so
        // the desk (and the owner's People room) can read them later
        window.MCC_NET.myListing().catch(function () { return null; }).then(function (mine) {
          var terms = (mine && mine.terms) || {};
          if (A.rate) terms.rate = +A.rate;
          if (A.goals.length) terms.goals = A.goals;
          var links = {};
          if (A.ig) links.ig = A.ig;
          if (A.music) links.music = A.music;
          if (A.yt) links.yt = A.yt;
          if (A.web) links.web = A.web;
          if (A.ig || A.music || A.yt || A.web) terms.links = links;
          // space operators: the room IS the listing — file the space object
          if (A.spaceType || A.capacity || A.amen.length) {
            fields.space = { type: A.spaceType || null, rate: A.rate ? +A.rate : null,
                             capacity: A.capacity ? +A.capacity : null, amenities: A.amen.slice() };
          }
          // civic Chasers: park their lane so the E⤴ Card can pick it up
          if (A.issue || A.district || A.reg) {
            terms.civic = { issue: A.issue || null, district: A.district || null, registered: A.reg || null };
          }
          // the whole interview rides to the desk's command room, verbatim
          terms.intake = { roles: A.roles.slice(), goals: A.goals.slice(), headline: A.headline || null,
            area: A.area || null, rate: A.rate || null, spaceType: A.spaceType || null,
            capacity: A.capacity || null, issue: A.issue || null, district: A.district || null,
            reg: A.reg || null, at: new Date().toISOString().slice(0, 10) };
          fields.terms = terms;
          return window.MCC_NET.saveListing(fields);
        }).catch(function () {}).then(function () {
          try {
            localStorage.removeItem("mcc_welcome_pending");
            localStorage.setItem("mcc_walk", JSON.stringify({ done: true, t: Date.now() }));
            try { var cW = JSON.parse(localStorage.getItem("mcc_cart") || "null"); if (cW && cW.kind === "walk") localStorage.removeItem("mcc_cart"); } catch (eW) {}
            localStorage.setItem("mcc_goals", JSON.stringify(A.goals));
          } catch (e) {}
          track("welcome_done", { roles: A.roles.join(","), goals: A.goals.join(",") });
          then();
        });
      }
      function paint() {
        refresh();
        if (at >= STEPS) at = STEPS - 1;
        steps[at]();
        var nx = stage.querySelector("[data-next]");
        if (nx) nx.addEventListener("click", function () {
          harvest();
          stakePay(steps[at]);
          if (at === STEPS - 1) { save(function () { location.href = "market.html#yours"; }); return; }
          at++; track("welcome_step", { step: at }); paint();
          try { localStorage.setItem("mcc_walk", JSON.stringify({ at: at, t: Date.now() })); } catch (eS) {}
        });
        var bk = stage.querySelector("[data-back]");
        if (bk) bk.addEventListener("click", function () {
          harvest(); at--; paint();
          try { localStorage.setItem("mcc_walk", JSON.stringify({ at: at, t: Date.now() })); } catch (eS2) {}
        });
        /* the voice door: on steps with options, the member can just SAY it —
           "I'm an artist and I do photo" lights the matching chips */
        (function voice() {
          var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          var chips = stage.querySelectorAll(".wl__chip");
          if (!SR || !chips.length) return;
          var next = stage.querySelector("[data-next]");
          var mb = document.createElement("button");
          mb.type = "button"; mb.className = "wl__mic";
          mb.innerHTML = "&#127908; Or just say it out loud";
          var heard = document.createElement("p"); heard.className = "wl__heard";
          next.parentNode.insertBefore(mb, next);
          next.parentNode.insertBefore(heard, next);
          mb.addEventListener("click", function () {
            try {
              var rec = new SR();
              rec.lang = "en-US"; rec.interimResults = false; rec.maxAlternatives = 1;
              mb.classList.add("is-live"); mb.innerHTML = "&#127908; Listening&hellip; say what you are";
              rec.onresult = function (e) {
                var t = ((e.results[0] && e.results[0][0].transcript) || "").toLowerCase();
                heard.textContent = "\u201C" + t + "\u201D";
                stage.querySelectorAll(".wl__chip").forEach(function (ch) {
                  var words = (ch.textContent + " " + (ch.getAttribute("data-c") || "")).toLowerCase().split(/[^a-z]+/);
                  var hit = words.some(function (w) { return w.length > 2 && t.indexOf(w) !== -1; });
                  if (hit && !ch.classList.contains("is-on")) ch.click();
                });
              };
              rec.onend = function () { mb.classList.remove("is-live"); mb.innerHTML = "&#127908; Or just say it out loud"; };
              rec.onerror = rec.onend;
              rec.start();
            } catch (e) { mb.style.display = "none"; }
          });
        })();
        var tr = stage.querySelector("[data-tour]");
        if (tr) tr.addEventListener("click", function () {
          harvest();
          save(function () { location.href = "market.html?tour=1#floor"; });
        });
      }
      function paintWalked() {
        stage.innerHTML = '<div class="wl__step" style="text-align:left">' +
          '<p class="kicker" style="color:#2fbf71">Walk-in complete &#10003;</p>' +
          '<h2 style="font-family:var(--display);font-weight:400;text-transform:uppercase;font-size:1.7rem;margin-top:0.4rem">You already walked in.</h2>' +
          '<p style="color:var(--cream-dim);line-height:1.7;margin-top:0.7rem;font-size:1rem">Your interview is on the record and the desk knows you — no need to run it twice. Your points for this are already paid.</p>' +
          '<div class="finale__actions" style="margin-top:1.2rem">' +
          '<a class="btn btn--ruby" href="mymission.html">Your Mission Control &#8594;</a>' +
          '<a class="btn btn--ghost" href="market.html#yours">Open your desk</a>' +
          '<button class="btn btn--ghost" id="wlAgain" type="button">Walk it again</button></div></div>';
        var ag = document.getElementById("wlAgain");
        if (ag) ag.addEventListener("click", function () {
          try { localStorage.removeItem("mcc_walk"); } catch (e) {}
          at = 0; track("welcome_rewalk", {}); paint();
        });
      }
      track("welcome_start", {});
      var wk = null;
      try { wk = JSON.parse(localStorage.getItem("mcc_walk")); } catch (e) {}
      if (wk && wk.done) {
        paintWalked();
      } else {
        if (wk && wk.at > 0 && wk.at < STEPS) at = wk.at;
        paint();
        // cross-device: a finished interview lives on the listing itself
        if (window.MCC_AUTH && window.MCC_AUTH.user && window.MCC_AUTH.user() && window.MCC_NET && window.MCC_NET.myListing) {
          window.MCC_NET.myListing().then(function (row) {
            if (row && row.terms && row.terms.intake) {
              try { localStorage.setItem("mcc_walk", JSON.stringify({ done: true, t: Date.now() })); } catch (e2) {}
              if (at === 0) paintWalked();
            }
          }).catch(function () {});
        }
      }
    })();
  </script>
</body>
</html>
