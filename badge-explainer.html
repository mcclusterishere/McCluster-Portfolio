<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Badge Explainer — M-Verified · McCluster</title>
  <meta name="description" content="The six M-Verified badges — who you are on the network. What each one means, what it takes to earn it, and how it's proven. Not to be confused with amenities, which are what a space offers.">
  <link rel="icon" type="image/png" href="assets/img/eu-favicon.png">
  <link rel="preload" href="assets/fonts/anton-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=c8fb10b51488">
</head>
<body class="songpage">
  <div class="grain" aria-hidden="true"></div>
  <header class="site-head">
    <a class="brand" href="index.html"><img class="brand__mark" src="assets/img/m-mark.png" alt="M"><span class="brand__rest">cCluster</span></a>
    <nav class="site-head__nav">
      <a href="index.html">← Back to the site</a>
      <a class="head-cta" href="verify.html">Get Verified</a>
    </nav>
  </header>
  <main>
    <section class="bexp" id="bexpRoot">
      <p class="kicker"><img class="kicker__mark" src="assets/img/m-mark.png" alt="M"> Network — The Badge System</p>
      <div id="bexpBody">
        <div class="bexp__hero"><h1>Loading the seal…</h1></div>
      </div>
      <div class="finale__actions" style="margin-top:2rem">
        <a class="btn btn--ruby" href="verify.html" data-cta="badge-apply">Apply for this badge</a>
        <a class="btn btn--ghost" href="list-your-space.html" data-cta="badge-list-space">List your space</a>
      </div>
    </section>
  </main>
  <footer class="site-foot">
    <div class="site-foot__brand"><img class="brand__mark" src="assets/img/m-mark.png" alt="M">cCluster</div>
    <p class="site-foot__note">© 2026 Matthew McCluster · Every badge on this network is earned, never sold.</p>
  </footer>
  <script src="js/analytics.js?v=c8fb10b51488"></script>
  <script src="js/polish.js?v=c8fb10b51488"></script>
  <script src="js/entities.js?v=c8fb10b51488"></script>
  <script>
    (function () {
      "use strict";
      function track(n, p) { if (window.MCC_TRACK) window.MCC_TRACK(n, p); }
      function esc(s) { var d = document.createElement("i"); d.textContent = s; return d.innerHTML; }
      var body = document.getElementById("bexpBody");
      var params = new URLSearchParams(location.search);
      var want = params.get("badge");
      var wantEntity = params.get("entity");

      // entity / org-type badges (M-Verified · Rights Owner, Performer, etc.)
      if (wantEntity && window.MCC_ENTITIES && window.MCC_ENTITIES[wantEntity]) {
        var e = window.MCC_ENTITIES[wantEntity];
        var ids = window.MCC_IDENTIFIERS || {};
        var idLine = function (k) {
          var d = ids[k] || { name: k, what: "" };
          return "<li><b style='color:var(--cream)'>" + esc(d.name) + "</b> — " + esc(d.what || "") + "</li>";
        };
        document.title = e.badge + " — Badge Explainer · McCluster";
        body.innerHTML =
          '<div class="bexp__hero">' +
          '<span class="mbadge" style="--badge-c:' + e.color + '"><img src="assets/img/m-mark.png" alt=""></span>' +
          "<div><p class='bexp__section'>Org-Type Verification · McCluster Approved</p><h1>" + esc(e.badge) + "</h1></div></div>" +
          '<div class="bexp__panel"><h3>What this badge means</h3><p>' + esc(e.desc) +
          " Entities that hold it are verified as <strong>" + esc(e.label) + "</strong> on the McCluster network.</p></div>" +
          '<div class="bexp__panel"><h3>Required to earn it</h3><ul>' + e.required.map(idLine).join("") + "</ul></div>" +
          (e.optional && e.optional.length ? '<div class="bexp__panel"><h3>Strengthens the badge</h3><ul>' + e.optional.map(idLine).join("") + "</ul></div>" : "") +
          '<div class="bexp__panel"><h3>How it\'s proven</h3><p>Every identifier above is checked against its issuer before the seal is granted — document-verified, not self-declared. ' +
          '<a href="identifiers.html" style="color:var(--ruby-hot)">What the identifiers mean &#8594;</a></p>' +
          '<p style="margin-top:0.8rem"><span class="bexp__attest">Document-verified</span></p></div>';
        track("badge_explainer_view", { badge_id: "entity-" + wantEntity, page: "badge-explainer" });
        return;
      }

      // legacy: the amenity-style seals moved to their own page. Send old
      // ?badge= links there so nothing 404s, preserving the id.
      if (want) { location.replace("amenities.html?a=" + encodeURIComponent(want)); return; }

      // the legend: the six M-Verified badges — who you are on the network.
      // All wear the M seal because they all mean the same thing: verified.
      var ents = window.MCC_ENTITIES || {};
      var order = ["venue", "performer", "creator", "rights-owner", "nonprofit", "federal"];
      document.title = "The M-Verified Badges · McCluster";
      body.innerHTML =
        '<div class="bexp__hero"><span class="mbadge" style="--badge-c:#e5383b"><img src="assets/img/m-mark.png" alt=""></span>' +
        '<div><p class="bexp__section">The Badge System</p><h1>Six Seals,<br>One Standard.</h1></div></div>' +
        '<div class="bexp__panel"><p>A <strong style="color:var(--cream)">badge is who you are</strong> on the network — verified identity, checked against the issuer, never bought. ' +
        "There are six, one per kind of member. Tap any seal for what it means, what it takes, and how it's proven.</p>" +
        '<p class="am__note">Looking for lighting, a vocal booth, a green room? Those aren’t badges — they’re ' +
        '<a href="amenities.html">amenities</a>, what a space offers, each with its own emblem.</p></div>' +
        '<div class="bexp__legend">' +
        order.filter(function (k) { return ents[k]; }).map(function (k) {
          var e = ents[k];
          return '<a class="bexp__card" href="badge-explainer.html?entity=' + encodeURIComponent(k) + '">' +
            '<span class="mbadge" style="--badge-c:' + e.color + '"><img src="assets/img/m-mark.png" alt=""></span>' +
            "<span><b>" + esc(e.badge) + "</b><small>" + esc(e.label) + "</small></span></a>";
        }).join("") + "</div>";
      track("badge_explainer_view", { badge_id: "legend", page: "badge-explainer" });
    })();
  </script>
</body>
</html>
