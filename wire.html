<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>The Wire · Equity Uprise</title>
  <meta name="description" content="The Wire: every creator on the floor, one live feed. Post from your page, react from anywhere — ❤️ 🔥 📈 — and watch the whole network talk.">
  <link rel="icon" type="image/png" href="assets/img/m-mark.png">
  <link rel="preload" href="assets/fonts/anton-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/style.css?v=__STAMP__">
  <style>
    .wr { min-height: 100dvh; padding: 0 0 9rem; }
    .wr-hero { position: relative; min-height: 46dvh; display: flex; flex-direction: column; justify-content: flex-end;
      padding: clamp(5.5rem, 11vh, 7rem) clamp(1.1rem, 4.5vw, 2.6rem) clamp(1.6rem, 4vh, 2.4rem); overflow: hidden; }
    .wr-hero__bg { position: absolute; inset: 0; z-index: -2; width: 100%; height: 100%; object-fit: cover; object-position: center 55%; }
    .wr-hero__scrim { position: absolute; inset: 0; z-index: -1; background:
      radial-gradient(110% 70% at 55% 15%, rgba(193,18,31,0.2), transparent 55%),
      linear-gradient(190deg, rgba(6,4,4,0.15) 0%, rgba(6,4,4,0.45) 45%, rgba(6,4,4,0.96) 92%); }
    .wr-hero h1 { font-family: var(--sig); text-transform: uppercase; line-height: 0.92; font-size: clamp(2.6rem, 11vw, 4.6rem); }
    .wr-hero p { color: var(--cream-dim); line-height: 1.65; margin-top: 0.6rem; max-width: 50ch; }
    .wr-hero p b { color: var(--cream); }
    .wr-wrap { max-width: 40rem; margin: 0 auto; padding: 1.4rem clamp(1.1rem, 4.5vw, 2.6rem) 0; }
    .wr-compose { border: 1px solid rgba(244,239,230,0.16); border-radius: 16px; padding: 0.9rem 1rem;
      background: rgba(20,16,14,0.75); margin-bottom: 1.2rem; }
    .wr-compose textarea { width: 100%; min-height: 4.4em; resize: vertical; background: rgba(244,239,230,0.05);
      border: 1px solid rgba(244,239,230,0.2); border-radius: 12px; color: var(--cream); font: inherit;
      font-size: 0.92rem; padding: 0.7rem 0.85rem; }
    .wr-compose .row { display: flex; justify-content: space-between; align-items: center; gap: 0.7rem; margin-top: 0.6rem; }
    .wr-compose .who { font-size: 0.76rem; color: var(--cream-dim); }
    .wr-post { border: 1px solid rgba(244,239,230,0.12); border-radius: 16px; padding: 1rem 1.05rem;
      background: linear-gradient(180deg, rgba(20,16,14,0.8), rgba(9,7,6,0.85)); margin-bottom: 0.9rem; }
    .wr-post__head { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.55rem; text-decoration: none; color: inherit; }
    .wr-post__pic { width: 2.4rem; height: 2.4rem; border-radius: 50%; object-fit: cover; background: rgba(244,239,230,0.08);
      border: 1px solid rgba(244,239,230,0.18); flex: none; display: grid; place-items: center; font-weight: 800; color: var(--ruby-hot); }
    .wr-post__head b { font-family: var(--display); font-weight: 400; text-transform: uppercase; letter-spacing: 0.03em; font-size: 1rem; }
    .wr-post__head small { display: block; color: var(--cream-dim); font-size: 0.7rem; }
    .wr-post__body { color: rgba(244,239,230,0.88); font-size: 0.94rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .wr-acts { display: flex; gap: 0.4rem; margin-top: 0.7rem; }
    .wr-react { border: 1px solid rgba(244,239,230,0.16); background: rgba(244,239,230,0.04); color: var(--cream-dim);
      border-radius: 100px; padding: 0.35em 0.85em; font: inherit; font-size: 0.82rem; cursor: pointer;
      display: inline-flex; align-items: center; gap: 0.35em; transition: border-color 0.2s, background 0.2s, transform 0.15s; }
    .wr-react:active { transform: scale(0.94); }
    .wr-react.is-mine { border-color: rgba(229,56,59,0.7); background: rgba(229,56,59,0.14); color: var(--cream); }
    .wr-react b { font-variant-numeric: tabular-nums; font-weight: 700; }
    .wr-empty { text-align: center; color: var(--cream-dim); padding: 2.5rem 1rem; line-height: 1.7; }
  </style>
</head>
<body class="songpage">
  <div class="grain" aria-hidden="true"></div>
  <header class="site-head">
    <a class="brand" href="index.html"><img class="brand__mark" src="assets/img/m-mark.png" alt="M"><span class="brand__rest">cCluster</span></a>
    <nav class="site-head__nav"><a href="market.html">The Market</a><a href="academy.html">The Academy</a></nav>
  </header>

  <main class="wr">
    <section class="wr-hero">
      <img class="wr-hero__bg" alt="The network, lit up" src="assets/img/wire-scene.png"
        onerror="if(!this.dataset.fb){this.dataset.fb=1;this.src='https://d8j0ntlcm91z4.cloudfront.net/user_3G3F7jiUHPTPLSNf3XP0bAYtQmG/hf_20260710_131208_34a438f0-9cb3-4750-8898-ae8684386028.png';}else{this.style.display='none';}">
      <div class="wr-hero__scrim"></div>
      <p class="kicker"><img class="kicker__mark" src="assets/img/m-mark.png" alt="M"> Equity Uprise · live</p>
      <h1>The Wire.</h1>
      <p><b>Every creator on the floor, one feed.</b> Post from your page, react from anywhere —
        the whole network talks here, and every voice on it runs under a real ticker.</p>
    </section>

    <div class="wr-wrap">
      <div id="wrCompose"></div>
      <div id="wrFeed"><p class="wr-empty">Opening the wire…</p></div>
    </div>
  </main>

  <script src="js/analytics.js?v=__STAMP__"></script>
  <script src="js/polish.js?v=__STAMP__"></script>
  <script src="js/backend.js?v=__STAMP__"></script>
  <script src="js/social.js?v=__STAMP__"></script>
  <script src="js/guide.js?v=__STAMP__"></script>
  <script>
    (function () {
      "use strict";
      var S = window.MCC_SUPA;
      function esc(s) { var d = document.createElement("div"); d.textContent = String(s == null ? "" : s); return d.innerHTML; }
      function ago(t) {
        var s = (Date.now() - new Date(t).getTime()) / 1000;
        if (s < 3600) return Math.max(1, Math.round(s / 60)) + "m";
        if (s < 86400) return Math.round(s / 3600) + "h";
        return Math.round(s / 86400) + "d";
      }
      var KINDS = [["heart", "❤️"], ["fire", "🔥"], ["up", "📈"]];

      function paintFeed() {
        window.MCC_SOCIAL.wire(60).then(function (rows) {
          var host = document.getElementById("wrFeed");
          if (!rows.length) {
            host.innerHTML = '<p class="wr-empty">The wire is quiet — the first word wins the room.<br>' +
              '<span style="font-size:0.8rem">(Admin: the feed opens after one paste — docs/social2-schema.sql.)</span></p>';
            return;
          }
          host.innerHTML = "";
          rows.forEach(function (p) {
            var mine = p.my_reactions || [];
            var el = document.createElement("div");
            el.className = "wr-post";
            el.innerHTML =
              '<a class="wr-post__head" href="page.html?who=' + encodeURIComponent(p.slug) + '">' +
              (p.photo ? '<img class="wr-post__pic" src="' + esc(p.photo) + '" alt="">' :
                '<span class="wr-post__pic">' + esc((p.creator || "?").slice(0, 1).toUpperCase()) + "</span>") +
              "<span><b>" + esc(p.creator) + "</b><small>$" + esc(String(p.slug).toUpperCase()) + " · " + ago(p.created_at) + "</small></span></a>" +
              '<div class="wr-post__body">' + esc(p.body) + "</div>" +
              '<div class="wr-acts">' +
              KINDS.map(function (k) {
                var n = +p[k[0] + "s"] || 0;
                return '<button class="wr-react' + (mine.indexOf(k[0]) !== -1 ? " is-mine" : "") + '" type="button" data-react="' + k[0] + '">' +
                  k[1] + " <b>" + (n || "") + "</b></button>";
              }).join("") +
              '<a class="wr-react" href="page.html?who=' + encodeURIComponent(p.slug) + '">💬 <b>' + (+p.comments || "") + "</b></a>" +
              "</div>";
            el.querySelectorAll("[data-react]").forEach(function (b) {
              b.addEventListener("click", function () {
                var kind = b.dataset.react;
                var countEl = b.querySelector("b");
                var was = +countEl.textContent || 0;
                var on = b.classList.toggle("is-mine");           // optimistic
                countEl.textContent = Math.max(0, was + (on ? 1 : -1)) || "";
                window.MCC_SOCIAL.react(p.id, kind).then(function () {
                  if (window.MCC_TRACK) window.MCC_TRACK("wire_react", { kind: kind });
                }).catch(function () {
                  b.classList.toggle("is-mine");                  // roll it back
                  countEl.textContent = was || "";
                });
              });
            });
            host.appendChild(el);
          });
        });
      }

      /* creators get the composer; everyone else gets the invitation */
      function paintCompose() {
        var host = document.getElementById("wrCompose");
        var u = window.MCC_AUTH && window.MCC_AUTH.user && window.MCC_AUTH.user();
        if (!u) {
          host.innerHTML = '<div class="wr-compose"><p style="color:var(--cream-dim);font-size:0.88rem;line-height:1.6">' +
            'The wire reads free. To speak on it, <a href="market.html#yours" style="color:#c99d45">open your desk</a> — one tap, no email — and post from your page.</p></div>';
          return;
        }
        S.token().then(function (t) {
          return fetch(S.url + "/rest/v1/providers?owner=eq." + S.uid() + "&select=slug,name&limit=1", {
            headers: { apikey: S.key, Authorization: "Bearer " + t },
          });
        }).then(function (r) { return r.ok ? r.json() : []; }).then(function (rows) {
          var me = rows && rows[0];
          if (!me) {
            host.innerHTML = '<div class="wr-compose"><p style="color:var(--cream-dim);font-size:0.88rem;line-height:1.6">' +
              'You\'re in — now claim a listing on <a href="market.html#yours" style="color:#c99d45">your desk</a> and the composer opens here.</p></div>';
            return;
          }
          host.innerHTML = '<div class="wr-compose">' +
            '<textarea id="wrText" maxlength="2000" placeholder="Put it on the wire…"></textarea>' +
            '<div class="row"><span class="who">posting as <b style="color:var(--cream)">' + esc(me.name || me.slug) + "</b></span>" +
            '<button class="btn btn--ruby" id="wrPost" type="button" style="padding:0.7em 1.6em">Post it</button></div>' +
            '<p class="mp__msg" id="wrMsg"></p></div>';
          host.querySelector("#wrPost").addEventListener("click", function () {
            var txt = host.querySelector("#wrText").value.trim();
            var msg = host.querySelector("#wrMsg");
            if (!txt) { msg.textContent = "Say something first."; return; }
            msg.textContent = "Putting it on the wire…";
            window.MCC_SOCIAL.post(me.slug, txt).then(function () {
              msg.textContent = "Live.";
              host.querySelector("#wrText").value = "";
              if (window.MCC_TRACK) window.MCC_TRACK("wire_post", {});
              paintFeed();
            }).catch(function (e) { msg.textContent = String(e && e.message || e); });
          });
        });
      }

      paintCompose();
      paintFeed();
      if (window.MCC_TRACK) window.MCC_TRACK("wire_view", {});
    })();
  </script>
</body>
</html>
