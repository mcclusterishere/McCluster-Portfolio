          var ix = 0, iy = 0;
          if (keys.w || keys.arrowup) iy -= 1;
          if (keys.s || keys.arrowdown) iy += 1;
          if (keys.a || keys.arrowleft) ix -= 1;
          if (keys.d || keys.arrowright) ix += 1;
          if (stick.m) { ix = stick.x * stick.m; iy = stick.y * stick.m; }
          var aim = null, want = 0, nav = NAV.get();
          if (ix || iy) {
            NAV.clear();                                 // hands on the wheel beat the pin
            aim = camH + Math.atan2(ix, -iy) * 180 / Math.PI;
            want = Math.min(1, Math.hypot(ix, iy));
          } else if (nav) {
            var dm = mDist(player, nav);
            if (dm < 16) NAV.clear(true);
            else { aim = mBearing(player, nav); want = Math.min(1, dm / 130); } // eases to a stop
          }
          if (aim != null) {
            var diff = angTo(player.h, aim);
            var rate = (120 + 140 * (1 - Math.min(1, vel / top))) * dt / 1000; // pivots slow, arcs fast
            player.h = (player.h + Math.max(-rate, Math.min(rate, diff)) + 360) % 360;
            want *= Math.max(0.3, Math.cos(Math.min(Math.abs(diff), 120) * Math.PI / 360)); // lifts into hard turns
          }
          vel += (want * top - vel) * Math.min(1, dt / (want ? 320 : 200));
          if (vel > 0.2) {
            var hr = player.h * Math.PI / 180, step = vel * dt / 1000; // meters this frame
            player.lat += Math.cos(hr) * step / 111320;
            player.lng += Math.sin(hr) * step / (111320 * Math.max(0.25, Math.cos(player.lat * Math.PI / 180)));
            player.lat = Math.max(41.06, Math.min(41.89, player.lat));
            player.lng = Math.max(-73.44, Math.min(-72.46, player.lng));
          } else if (!want) vel = 0;
          // the chase cam: trails the whip, breathes with speed
          camH += angTo(camH, player.h) * Math.min(1, dt / 430);
          var f = Math.min(1, vel / top);
          map.jumpTo({ center: [player.lng, player.lat], bearing: camH,
            pitch: 50 + f * 12, zoom: 16.1 - f * 1.0 });
          $("owCar").style.transform = "rotate(" + (90 + angTo(camH, player.h)) + "deg)"; // the whip leans into the lag
          collect();
          var city = nearestCity(player.lng, player.lat);
          if (city !== curCity) { curCity = city; showPlace(city); }
          $("owHint").innerHTML = "<b>" + esc(curCity ? curCity.name : "Connecticut") + "</b>" + NAV.hud() + RUNS.hud() + RUNS.score() + (MP.count() ? " · " + MP.count() + " live" : "");
          try { localStorage.setItem("mcc_ow_pos", JSON.stringify(player)); } catch (e) {}
          MP.tick();
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      /* ---------- live multiplayer (Supabase Realtime broadcast) ---------- */
      var MP = (function () {
        var peers = {}, ws = null, hb = null, bc = null, live = false, t0 = 0;
        var myId = (window.MCC_GRIND && MCC_GRIND.device && MCC_GRIND.device()) || ("g" + Math.random().toString(36).slice(2, 9));
        function connect() {
          if (ws || !window.MCC_SUPA || !MCC_SUPA.url) return;
          try { ws = new WebSocket(MCC_SUPA.url.replace(/^http/, "ws") + "/realtime/v1/websocket?apikey=" + encodeURIComponent(MCC_SUPA.key) + "&vsn=1.0.0"); } catch (e) { return; }
          ws.onopen = function () {
            try { ws.send(JSON.stringify({ topic: "realtime:ourworld", event: "phx_join", payload: { config: { broadcast: { self: false } } }, ref: "1" })); } catch (e) {}
            live = true;
            hb = setInterval(function () { try { ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: "hb" })); } catch (e) {} }, 25000);
          };
          ws.onmessage = function (ev) {
            try { var m = JSON.parse(ev.data);
              if (m.event === "broadcast" && m.payload && m.payload.event === "pos") { var d = m.payload.payload; if (!d || d.id === myId) return; d.t = Date.now(); upsert(d); }
            } catch (e) {}
          };
          ws.onclose = function () { clearInterval(hb); live = false; ws = null; };
          ws.onerror = function () { try { ws.close(); } catch (e) {} };
        }
        function upsert(d) {
          var p = peers[d.id];
          if (!p) { var el = document.createElement("div"); el.className = "ow-peer";
            el.innerHTML = '<div class="car" style="background:' + (d.c || "#c99d45") + ';color:' + (d.c || "#c99d45") + '"></div><div class="nm">' + esc(d.n || "driver") + "</div>";
            p = { el: el, mk: map ? new maplibregl.Marker({ element: el }).setLngLat([d.lng, d.lat]).addTo(map) : null }; peers[d.id] = p; }
          p.t = d.t; if (p.mk) p.mk.setLngLat([d.lng, d.lat]);
          var car = p.el.querySelector(".car"); if (car) car.style.transform = "rotate(" + ((d.h || 0)) + "deg)";
        }
        function tick() {
          var now = Date.now();
          if (live && entered && now - t0 > 160) { t0 = now;
            var d = { id: myId, lng: +player.lng.toFixed(5), lat: +player.lat.toFixed(5), h: Math.round(player.h),
              n: (PLAYER && PLAYER.name) ? String(PLAYER.name).slice(0, 18) : "A driver", c: (curCity && curCity.c) || "#c99d45" };
            try { ws.send(JSON.stringify({ topic: "realtime:ourworld", event: "broadcast", payload: { type: "broadcast", event: "pos", payload: d }, ref: null })); } catch (e) {}
          }
          for (var id in peers) { if (now - peers[id].t > 6000) { if (peers[id].mk) peers[id].mk.remove(); delete peers[id]; } }
          var n = Object.keys(peers).length;
          var live_el = $("owLive"); if (n > 0) { live_el.style.display = ""; live_el.textContent = "● " + n + " driving live"; } else live_el.style.display = "none";
        }
        function count() { return Object.keys(peers).length; }
        return { connect: connect, tick: tick, count: count };
      })();

      /* ---------- boot ---------- */
      var touch = matchMedia("(hover: none)").matches;
      $("owDoor").style.backgroundImage = "linear-gradient(rgba(6,8,15,0.66),rgba(6,8,15,0.9)), url(assets/img/mcity-loading.jpg)";
      $("owCtl").innerHTML = touch
        ? "<span><b>Push the pad</b> · go that way</span><span><b>Tap the street</b> · auto-drive</span><span><b>Tap a face</b> · open it</span>"
        : "<span><b>W/A/S/D</b> · point the whip</span><span><b>Click the street</b> · auto-drive</span><span><b>Click a point</b> · open it</span>";
      paintTraits();

      /* ---------- where do you want to go? the city picker ----------
         Bridgeport is the city we've built; the rest of Connecticut is
         drawn on the door but locked until each one opens. Pick a city and
         you spawn there. */
      var pickedCity = null;
      $("owCities").innerHTML = CITIES.map(function (c) {
        var lock = c.open ? "" : " is-locked";
        return '<button class="ow-city' + lock + '" type="button" data-city="' + c.id + '"' +
          (c.open ? "" : " disabled aria-disabled=\"true\"") + ' style="--cc:' + c.c + '">' +
          (c.open ? "" : '<span class="ow-city__lock">Soon</span>') +
          "<b>" + esc(c.name) + "</b><small>" + esc(c.tag) + "</small></button>";
      }).join("");
      $("owCities").querySelectorAll(".ow-city").forEach(function (b) {
        if (b.disabled) return;
        b.addEventListener("click", function () {
          pickedCity = CITY_BY_ID[b.getAttribute("data-city")];
          $("owCities").querySelectorAll(".ow-city").forEach(function (o) { o.classList.remove("is-on"); });
          b.classList.add("is-on");
          var e = $("owEnter"); e.disabled = false;
          e.innerHTML = "&#9654;&#xFE0E; Go to " + esc(pickedCity.name);
          track("ow_city_pick", { city: pickedCity.id });
        });
      });

      $("owEnter").addEventListener("click", function () {
        if (!pickedCity) return;
        // spawn in the chosen city
        player.lng = pickedCity.lng; player.lat = pickedCity.lat; player.h = 0; camH = 0; vel = 0;
        curCity = pickedCity;
        if (map && ready) { try { map.jumpTo({ center: [player.lng, player.lat], bearing: 0, zoom: 16.1 }); } catch (e) {} }
        showPlace(pickedCity);
        entered = true; $("owCar").classList.remove("hidden");
        $("owDoor").classList.add("is-gone"); setTimeout(function () { $("owDoor").remove(); }, 600);
        MP.connect(); track("ow_enter", { touch: touch, city: pickedCity.id });
      });
      track("ow_view", {});
    })();
  </script>
</body>
